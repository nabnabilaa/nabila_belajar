ang merupakan B, sehingga 'Beberapa B adalah A' pasti benar (asumsi A tidak kosong).","options_id":["All B are A","Some B are A","No A are B","Some A are not B"],"tag":"Logical","level":1},{"id":817,"question":"Three boxes contain fruits:\n- Box 1: only apples\n- Box 2: only oranges\n- Box 3: apples and oranges\nAll labels are WRONG. Box labeled 'Apples & Oranges' actually contains:\nHint: You pick one fruit from the box labeled 'Apples & Oranges'.","question_id":"Tiga kotak berisi buah:\n- Kotak 1: hanya apel\n- Kotak 2: hanya jeruk\n- Kotak 3: apel dan jeruk\nSemua label SALAH. Kotak berlabel 'Apel & Jeruk' sebenarnya berisi:\nHint: Anda mengambil satu buah dari kotak berlabel 'Apel & Jeruk'.","options":["Only apples or only oranges","Both apples and oranges","Only apples","Only oranges"],"correct":0,"explanation":"Since all labels are wrong, the box labeled 'Apples & Oranges' can only contain EITHER only apples OR only oranges.","explanation_id":"Karena semua label salah, kotak berlabel 'Apel & Jeruk' hanya bisa berisi HANYA apel ATAU HANYA jeruk.","options_id":["Only apples or only oranges","Both apples and oranges","Only apples","Only oranges"],"tag":"Logical","level":1},{"id":818,"question":"Critical reasoning: An argument has a premise and a conclusion.\nPremise: Sales increased after the ad campaign.\nConclusion: The ad campaign caused the sales increase.\nWhat is the flaw in this argument?","question_id":"Penalaran kritis: Argumen memiliki premis dan kesimpulan.\nPremis: Penjualan meningkat setelah kampanye iklan.\nKesimpulan: Kampanye iklan menyebabkan peningkatan penjualan.\nApa kelemahan argumen ini?","options":["No flaw - it's valid","Correlation doesn't imply causation","The premise is false","The conclusion is too specific"],"correct":1,"explanation":"Just because B happened after A doesn't mean A caused B. Other factors could have increased sales. This is the 'post hoc' fallacy.","explanation_id":"Hanya karena B terjadi setelah A tidak berarti A menyebabkan B. Faktor lain bisa meningkatkan penjualan. Ini adalah kekeliruan 'post hoc'.","options_id":["No flaw - it's valid","Correlation doesn't imply causation","The premise is false","The conclusion is too specific"],"tag":"Logical","level":1},{"id":819,"question":"In a logic puzzle:\nThere are 3 people: X, Y, Z.\nExactly one of them is telling the truth.\nX says: 'Y is lying.'\nY says: 'Z is lying.'\nZ says: 'X is lying.'\nWho is telling the truth?","question_id":"Dalam teka-teki logika:\nAda 3 orang: X, Y, Z.\nTepat satu dari mereka berkata jujur.\nX berkata: 'Y berbohong.'\nY berkata: 'Z berbohong.'\nZ berkata: 'X berbohong.'\nSiapa yang berkata jujur?","options":["X","Y","Z","Cannot be determined"],"correct":3,"explanation":"If X is truth-teller: Y lies → Y's statement 'Z lies' is false → Z tells truth. Contradiction (two truth-tellers). Same logic applies for Y and Z. The puzzle is inconsistent — cannot be determined.","explanation_id":"Jika X jujur: Y bohong → pernyataan Y bahwa 'Z bohong' salah → Z jujur. Kontradiksi. Tidak dapat ditentukan.","options_id":["X","Y","Z","Cannot be determined"],"tag":"Logical","level":1},{"id":820,"question":"Statement: 'If today is Monday, then tomorrow is Tuesday.'\nToday is NOT Monday.\nWhat can we conclude?","question_id":"Pernyataan: 'Jika hari ini Senin, maka besok adalah Selasa.'\nHari ini BUKAN Senin.\nApa yang bisa kita simpulkan?","options":["Tomorrow is Tuesday","Tomorrow is not Tuesday","We cannot conclude anything about tomorrow","Today might be Sunday"],"correct":2,"explanation":"Denying the antecedent: P→Q, NOT P, does NOT allow us to conclude NOT Q. Tomorrow could still be Tuesday if today is Monday — but today isn't Monday, so we simply don't know.","explanation_id":"Menyangkal anteseden: P→Q, BUKAN P, TIDAK memungkinkan kita menyimpulkan BUKAN Q. Kita tidak tahu apa-apa tentang besok.","options_id":["Tomorrow is Tuesday","Tomorrow is not Tuesday","We cannot conclude anything about tomorrow","Today might be Sunday"],"tag":"Logical","level":1},{"id":821,"question":"Argument: 'We should ban junk food in schools because students who eat junk food get lower grades.'\nWhat assumption does this argument make?","question_id":"Argumen: 'Kita harus melarang makanan tidak sehat di sekolah karena siswa yang makan makanan tidak sehat mendapat nilai lebih rendah.'\nAsumsi apa yang dibuat argumen ini?","options":["All students eat junk food","Junk food causes lower grades, not just correlates","Teachers also eat junk food","Grades are the only measure of success"],"correct":1,"explanation":"The argument assumes causation (junk food CAUSES lower grades) from correlation. This is the key unstated assumption.","explanation_id":"Argumen mengasumsikan kausalitas dari korelasi — bahwa makanan tidak sehat MENYEBABKAN nilai rendah.","options_id":["All students eat junk food","Junk food causes lower grades, not just correlates","Teachers also eat junk food","Grades are the only measure of success"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":822,"question":"Which of the following WEAKENS the argument?\nArgument: 'Exercise improves mental health, so gyms should be subsidized by the government.'","question_id":"Manakah yang MELEMAHKAN argumen ini?\nArgumen: 'Olahraga meningkatkan kesehatan mental, jadi gym harus disubsidi pemerintah.'","options":["Mental health is important for society","Most people cannot afford gym memberships","Outdoor exercise is equally effective and free","Gyms provide employment"],"correct":2,"explanation":"If outdoor exercise works equally well and is free, then subsidizing gyms is unnecessary. This weakens the argument.","explanation_id":"Jika olahraga luar ruangan sama efektifnya dan gratis, maka mensubsidi gym tidak perlu. Ini melemahkan argumen.","options_id":["Mental health is important for society","Most people cannot afford gym memberships","Outdoor exercise is equally effective and free","Gyms provide employment"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":823,"question":"Which of the following STRENGTHENS the argument?\nArgument: 'Reading books regularly improves vocabulary, so schools should assign more reading homework.'","question_id":"Manakah yang MEMPERKUAT argumen ini?\nArgument: 'Membaca buku secara rutin meningkatkan kosakata, jadi sekolah harus memberikan lebih banyak PR membaca.'","options":["Students dislike homework","Students with larger vocabularies perform better academically","Some students prefer digital content","Reading takes time away from other activities"],"correct":1,"explanation":"If better vocabulary leads to better academic performance, it strengthens the case for assigning reading homework.","explanation_id":"Jika kosakata lebih baik meningkatkan performa akademik, ini memperkuat argumen untuk PR membaca.","options_id":["Students dislike homework","Students with larger vocabularies perform better academically","Some students prefer digital content","Reading takes time away from other activities"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":824,"question":"Identify the logical flaw:\n'Everyone I know loves spicy food. Therefore, all people love spicy food.'","question_id":"Identifikasi kekeliruan logis:\n'Semua orang yang aku kenal suka makanan pedas. Oleh karena itu, semua orang suka makanan pedas.'","options":["False analogy","Hasty generalization","Circular reasoning","Straw man"],"correct":1,"explanation":"Generalizing from a small, non-representative sample to 'all people' is hasty generalization.","explanation_id":"Menggeneralisasi dari sampel kecil yang tidak representatif ke 'semua orang' adalah generalisasi terburu-buru.","options_id":["False analogy","Hasty generalization","Circular reasoning","Straw man"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":825,"question":"Identify the logical flaw:\n'You can't trust John's opinion on climate change because he drives a car.'","question_id":"Identifikasi kekeliruan logis:\n'Kamu tidak bisa mempercayai pendapat John tentang perubahan iklim karena dia mengendarai mobil.'","options":["False dichotomy","Ad hominem","Slippery slope","Appeal to authority"],"correct":1,"explanation":"Attacking the person (John drives a car) rather than the argument is ad hominem.","explanation_id":"Menyerang orangnya (John mengendarai mobil) daripada argumennya adalah ad hominem.","options_id":["False dichotomy","Ad hominem","Slippery slope","Appeal to authority"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":826,"question":"Identify the logical flaw:\n'If we allow students to redo one test, next they'll want to redo all tests, then all homework, and eventually nothing will matter.'","question_id":"Identifikasi kekeliruan logis:\n'Jika kita mengizinkan siswa mengulang satu tes, selanjutnya mereka akan ingin mengulang semua tes, lalu semua PR, dan akhirnya tidak ada yang penting.'","options":["Hasty generalization","False analogy","Slippery slope","Circular reasoning"],"correct":2,"explanation":"Assuming one small action inevitably leads to extreme consequences without evidence is the slippery slope fallacy.","explanation_id":"Mengasumsikan satu tindakan kecil pasti mengarah ke konsekuensi ekstrem tanpa bukti adalah kesesatan lereng licin.","options_id":["Hasty generalization","False analogy","Slippery slope","Circular reasoning"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":827,"question":"Identify the logical flaw:\n'This medicine must work because it has been used for thousands of years.'","question_id":"Identifikasi kekeliruan logis:\n'Obat ini pasti bekerja karena telah digunakan selama ribuan tahun.'","options":["Ad hominem","Appeal to tradition","False dichotomy","Circular reasoning"],"correct":1,"explanation":"Justifying something solely because it is old or traditional is the appeal to tradition fallacy.","explanation_id":"Membenarkan sesuatu hanya karena sudah lama atau tradisional adalah kesesatan banding pada tradisi.","options_id":["Ad hominem","Appeal to tradition","False dichotomy","Circular reasoning"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":828,"question":"Which conclusion is BEST supported by the premises?\nP1: All mammals breathe air.\nP2: Whales are mammals.","question_id":"Kesimpulan mana yang PALING didukung oleh premis-premis ini?\nP1: Semua mamalia bernapas dengan udara.\nP2: Paus adalah mamalia.","options":["Whales live in water","Whales breathe air","All air-breathers are mammals","Whales are fish"],"correct":1,"explanation":"From All A are B and C is A, we conclude C is B. Whales breathe air.","explanation_id":"Dari Semua A adalah B dan C adalah A, kita simpulkan C adalah B. Paus bernapas dengan udara.","options_id":["Whales live in water","Whales breathe air","All air-breathers are mammals","Whales are fish"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":829,"question":"Identify the logical flaw:\n'Either you support this policy completely, or you are against progress.'","question_id":"Identifikasi kekeliruan logis:\n'Entah kamu mendukung kebijakan ini sepenuhnya, atau kamu menentang kemajuan.'","options":["Hasty generalization","Slippery slope","False dichotomy","Ad hominem"],"correct":2,"explanation":"Presenting only two options when more exist (e.g., partial support, alternative approaches) is a false dichotomy.","explanation_id":"Menyajikan hanya dua pilihan ketika ada lebih banyak adalah dikotomi palsu.","options_id":["Hasty generalization","Slippery slope","False dichotomy","Ad hominem"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":830,"question":"What is the MAIN flaw in this argument?\n'Most successful entrepreneurs dropped out of college, so dropping out of college leads to success.'","question_id":"Apa KELEMAHAN UTAMA dalam argumen ini?\n'Kebanyakan pengusaha sukses putus kuliah, jadi putus kuliah menyebabkan kesuksesan.'","options":["The sample is too large","Correlation is mistaken for causation","Entrepreneurs are not typical people","College is not useful"],"correct":1,"explanation":"The argument confuses correlation with causation. Dropping out doesn't cause success; other factors are at play.","explanation_id":"Argumen mengacaukan korelasi dengan kausalitas.","options_id":["The sample is too large","Correlation is mistaken for causation","Entrepreneurs are not typical people","College is not useful"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":831,"question":"Premises:\n- If it is raining, Ana brings an umbrella.\n- Ana is bringing an umbrella.\nConclusion: It is raining.\nThis argument is:","question_id":"Premis:\n- Jika hujan, Ana membawa payung.\n- Ana membawa payung.\nKesimpulan: Hujan sedang turun.\nArgumen ini:","options":["Valid","Invalid — affirming the consequent","Valid by contrapositive","Cannot be judged"],"correct":1,"explanation":"Affirming the consequent: P→Q, Q, therefore P. This is INVALID. Ana could bring an umbrella for other reasons.","explanation_id":"Mengafirmasi konsekuensi: P→Q, Q, maka P. Ini TIDAK VALID.","options_id":["Valid","Invalid — affirming the consequent","Valid by contrapositive","Cannot be judged"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":832,"question":"Which statement, if true, would MOST undermine this argument?\nArgument: 'City A has more hospitals than City B, so City A must have a healthier population.'","question_id":"Pernyataan mana yang jika benar akan PALING melemahkan argumen ini?\nArgumen: 'Kota A memiliki lebih banyak rumah sakit dari Kota B, jadi populasi Kota A pasti lebih sehat.'","options":["City A has better doctors","City A has a much larger and older population","City B has fewer doctors","Hospitals are expensive to build"],"correct":1,"explanation":"More hospitals may reflect greater health needs (larger/older population), not better health outcomes.","explanation_id":"Lebih banyak rumah sakit mungkin mencerminkan kebutuhan kesehatan yang lebih besar, bukan populasi yang lebih sehat.","options_id":["City A has better doctors","City A has a much larger and older population","City B has fewer doctors","Hospitals are expensive to build"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":833,"question":"Identify the logical flaw:\n'Scientists said coffee was bad for you 30 years ago. Scientists can't be trusted.'","question_id":"Identifikasi kekeliruan logis:\n'Para ilmuwan mengatakan kopi berbahaya 30 tahun lalu. Para ilmuwan tidak bisa dipercaya.'","options":["Ad hominem","Hasty generalization","Appeal to authority","False analogy"],"correct":1,"explanation":"One past error doesn't mean ALL scientists can NEVER be trusted. This is hasty generalization.","explanation_id":"Satu kesalahan masa lalu tidak berarti SEMUA ilmuwan TIDAK PERNAH bisa dipercaya. Ini generalisasi terburu-buru.","options_id":["Ad hominem","Hasty generalization","Appeal to authority","False analogy"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":834,"question":"An argument is VALID if:","question_id":"Sebuah argumen dikatakan VALID jika:","options":["The premises are true","The conclusion follows logically from the premises","The argument is convincing","Everyone agrees with it"],"correct":1,"explanation":"Validity is about logical structure: if the premises were true, the conclusion must follow. Truth of premises is a separate issue (soundness).","explanation_id":"Validitas adalah tentang struktur logis: jika premis benar, kesimpulan harus mengikuti.","options_id":["The premises are true","The conclusion follows logically from the premises","The argument is convincing","Everyone agrees with it"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":835,"question":"Identify the logical flaw:\n'My grandfather smoked his whole life and lived to 95. Smoking can't be that harmful.'","question_id":"Identifikasi kekeliruan logis:\n'Kakekku merokok sepanjang hidupnya dan hidup sampai 95 tahun. Merokok tidak bisa se-berbahaya itu.'","options":["False dichotomy","Anecdotal evidence","Appeal to authority","Circular reasoning"],"correct":1,"explanation":"Using one personal case to counter large-scale statistical evidence is relying on anecdotal evidence.","explanation_id":"Menggunakan satu kasus pribadi untuk menentang bukti statistik berskala besar adalah bukti anekdotal.","options_id":["False dichotomy","Anecdotal evidence","Appeal to authority","Circular reasoning"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":836,"question":"Premises:\n- No fish are mammals.\n- All sharks are fish.\nWhich conclusion MUST follow?","question_id":"Premis:\n- Tidak ada ikan yang merupakan mamalia.\n- Semua hiu adalah ikan.\nKesimpulan mana yang HARUS mengikuti?","options":["All mammals are sharks","No sharks are mammals","Some sharks are mammals","Mammals can be fish"],"correct":1,"explanation":"No fish are mammals + all sharks are fish → No sharks are mammals.","explanation_id":"Tidak ada ikan yang mamalia + semua hiu adalah ikan → Tidak ada hiu yang mamalia.","options_id":["All mammals are sharks","No sharks are mammals","Some sharks are mammals","Mammals can be fish"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":837,"question":"Identify the flaw:\n'We shouldn't listen to the new manager's ideas about productivity because she used to work at a failing company.'","question_id":"Identifikasi kekeliruan:\n'Kita tidak boleh mendengarkan ide manajer baru tentang produktivitas karena dia dulu bekerja di perusahaan yang gagal.'","options":["Straw man","Ad hominem / guilt by association","False analogy","Circular reasoning"],"correct":1,"explanation":"Dismissing ideas based on where someone worked (not the merit of the ideas) is ad hominem / guilt by association.","explanation_id":"Menolak ide berdasarkan tempat kerja seseorang (bukan manfaat ide) adalah ad hominem.","options_id":["Straw man","Ad hominem / guilt by association","False analogy","Circular reasoning"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":838,"question":"Which of the following is an example of CIRCULAR REASONING?","question_id":"Manakah contoh dari PENALARAN MELINGKAR?","options":["The Bible is true because God wrote it, and we know God exists because the Bible says so","Coffee is good because many people drink it","Exercise is healthy because doctors recommend it","Rain causes floods in low-lying areas"],"correct":0,"explanation":"Circular reasoning uses the conclusion as a premise: Bible is true because God → God exists because Bible says so.","explanation_id":"Penalaran melingkar menggunakan kesimpulan sebagai premis: Alkitab benar karena Tuhan → Tuhan ada karena Alkitab.","options_id":["The Bible is true because God wrote it, and we know God exists because the Bible says so","Coffee is good because many people drink it","Exercise is healthy because doctors recommend it","Rain causes floods in low-lying areas"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":839,"question":"A SOUND argument is one that is:","question_id":"Argumen yang SOUND (sahih) adalah argumen yang:","options":["Valid only","Valid AND has true premises","Persuasive and well-written","Agreed upon by experts"],"correct":1,"explanation":"A sound argument must be (1) valid in logical form AND (2) have all true premises.","explanation_id":"Argumen yang sahih harus (1) valid secara logis DAN (2) memiliki semua premis yang benar.","options_id":["Valid only","Valid AND has true premises","Persuasive and well-written","Agreed upon by experts"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":840,"question":"Premises:\n- Some athletes are vegetarians.\n- All vegetarians eat vegetables.\nWhich conclusion MUST be true?","question_id":"Premis:\n- Beberapa atlet adalah vegetarian.\n- Semua vegetarian makan sayuran.\nKesimpulan mana yang HARUS benar?","options":["All athletes eat vegetables","Some athletes eat vegetables","No athletes eat meat","Vegetarians are athletes"],"correct":1,"explanation":"Some athletes are vegetarians, all vegetarians eat vegetables → Some athletes eat vegetables.","explanation_id":"Beberapa atlet adalah vegetarian, semua vegetarian makan sayuran → Beberapa atlet makan sayuran.","options_id":["All athletes eat vegetables","Some athletes eat vegetables","No athletes eat meat","Vegetarians are athletes"],"tag":"Logical","subtype":"Argument Analysis","level":1},{"id":841,"question":"If A → B and B → C, which of the following MUST be true?","question_id":"Jika A → B dan B → C, manakah yang HARUS benar?","options":["C → A","A → C","NOT A → NOT C","C → B"],"correct":1,"explanation":"Hypothetical syllogism: A→B, B→C, therefore A→C.","explanation_id":"Silogisme hipotetis: A→B, B→C, maka A→C.","options_id":["C → A","A → C","NOT A → NOT C","C → B"],"tag":"Logical","subtype":"Conditional","level":1},{"id":842,"question":"Statement: 'If the store is open, I will buy milk.'\nI did not buy milk.\nWhat can we conclude?","question_id":"Pernyataan: 'Jika toko buka, aku akan membeli susu.'\nAku tidak membeli susu.\nApa yang bisa kita simpulkan?","options":["The store was open","The store was not open","I was out of money","Nothing can be concluded"],"correct":1,"explanation":"Contrapositive: NOT buy milk → NOT store open. Store was not open.","explanation_id":"Kontrapositif: TIDAK beli susu → TIDAK toko buka.","options_id":["The store was open","The store was not open","I was out of money","Nothing can be concluded"],"tag":"Logical","subtype":"Conditional","level":1},{"id":843,"question":"Which is the CONTRAPOSITIVE of 'If P then Q'?","question_id":"Manakah KONTRAPOSITIF dari 'Jika P maka Q'?","options":["If Q then P","If NOT P then NOT Q","If NOT Q then NOT P","If P then NOT Q"],"correct":2,"explanation":"The contrapositive of P→Q is NOT Q → NOT P, which is logically equivalent.","explanation_id":"Kontrapositif dari P→Q adalah BUKAN Q → BUKAN P, yang setara secara logis.","options_id":["If Q then P","If NOT P then NOT Q","If NOT Q then NOT P","If P then NOT Q"],"tag":"Logical","subtype":"Conditional","level":1},{"id":844,"question":"Statement: 'You can enter only if you have a ticket.'\nAdi entered.\nWhat can we conclude?","question_id":"Pernyataan: 'Kamu bisa masuk hanya jika kamu memiliki tiket.'\nAdi masuk.\nApa yang bisa kita simpulkan?","options":["Adi may or may not have a ticket","Adi has a ticket","Adi bought the ticket today","Tickets were free"],"correct":1,"explanation":"'Only if Q, then P' means P→Q. Adi entered (P), so Adi has a ticket (Q).","explanation_id":"'Hanya jika Q, maka P' berarti P→Q. Adi masuk (P), jadi Adi punya tiket (Q).","options_id":["Adi may or may not have a ticket","Adi has a ticket","Adi bought the ticket today","Tickets were free"],"tag":"Logical","subtype":"Conditional","level":1},{"id":845,"question":"P → Q is true. Which of the following is also guaranteed to be true?","question_id":"P → Q benar. Manakah yang juga pasti benar?","options":["Q → P","NOT P → NOT Q","NOT Q → NOT P","P AND Q"],"correct":2,"explanation":"The contrapositive (NOT Q → NOT P) is always logically equivalent to P → Q.","explanation_id":"Kontrapositif (BUKAN Q → BUKAN P) selalu setara logis dengan P → Q.","options_id":["Q → P","NOT P → NOT Q","NOT Q → NOT P","P AND Q"],"tag":"Logical","subtype":"Conditional","level":1},{"id":846,"question":"If it is sunny, Budi goes to the beach.\nIf Budi goes to the beach, he gets a tan.\nIt is sunny.\nWhat can we conclude?","question_id":"Jika cerah, Budi pergi ke pantai.\nJika Budi pergi ke pantai, ia menjadi cokelat.\nHari ini cerah.\nApa yang bisa kita simpulkan?","options":["Budi stays home","Budi gets a tan","Budi does not get a tan","Nothing"],"correct":1,"explanation":"Sunny → beach → tan. It is sunny, so Budi gets a tan.","explanation_id":"Cerah → pantai → cokelat. Hari cerah, jadi Budi menjadi cokelat.","options_id":["Budi stays home","Budi gets a tan","Budi does not get a tan","Nothing"],"tag":"Logical","subtype":"Conditional","level":1},{"id":847,"question":"Which of the following is the INVERSE of 'If P then Q'?","question_id":"Manakah INVERS dari 'Jika P maka Q'?","options":["If Q then P","If NOT P then NOT Q","If NOT Q then NOT P","NOT P and NOT Q"],"correct":1,"explanation":"The inverse of P→Q is NOT P → NOT Q. Note: the inverse is NOT logically equivalent to the original.","explanation_id":"Invers dari P→Q adalah BUKAN P → BUKAN Q. Invers TIDAK setara logis dengan pernyataan asli.","options_id":["If Q then P","If NOT P then NOT Q","If NOT Q then NOT P","NOT P and NOT Q"],"tag":"Logical","subtype":"Conditional","level":1},{"id":848,"question":"Which of the following is the CONVERSE of 'If P then Q'?","question_id":"Manakah KONVERS dari 'Jika P maka Q'?","options":["If Q then P","If NOT P then NOT Q","If NOT Q then NOT P","NOT P or Q"],"correct":0,"explanation":"The converse of P→Q is Q→P.","explanation_id":"Konvers dari P→Q adalah Q→P.","options_id":["If Q then P","If NOT P then NOT Q","If NOT Q then NOT P","NOT P or Q"],"tag":"Logical","subtype":"Conditional","level":1},{"id":849,"question":"Given: If A then B. If NOT B then C.\nA is true. What can we conclude?","question_id":"Diberikan: Jika A maka B. Jika BUKAN B maka C.\nA benar. Apa yang bisa kita simpulkan?","options":["C is true","B is true","C may or may not be true","NOT B is true"],"correct":1,"explanation":"A→B. A is true, so B is true. Since B is true, NOT B is false, so we cannot conclude C from the second rule.","explanation_id":"A→B. A benar, maka B benar. Karena B benar, BUKAN B salah, jadi C tidak bisa disimpulkan.","options_id":["C is true","B is true","C may or may not be true","NOT B is true"],"tag":"Logical","subtype":"Conditional","level":1},{"id":850,"question":"'If and only if P, then Q' (P↔Q) means:","question_id":"'Jika dan hanya jika P, maka Q' (P↔Q) berarti:","options":["P→Q only","Q→P only","P→Q AND Q→P","NOT P → NOT Q"],"correct":2,"explanation":"Biconditional P↔Q means both P→Q AND Q→P are true.","explanation_id":"Bikondisional P↔Q berarti P→Q DAN Q→P keduanya benar.","options_id":["P→Q only","Q→P only","P→Q AND Q→P","NOT P → NOT Q"],"tag":"Logical","subtype":"Conditional","level":1},{"id":851,"question":"Statement: 'I will call you if I finish early.'\nI finished early.\nWhat can we conclude?","question_id":"Pernyataan: 'Aku akan meneleponmu jika aku selesai lebih awal.'\nAku selesai lebih awal.\nApa yang bisa kita simpulkan?","options":["I will call you","I will not call you","I may or may not call you","I finished on time"],"correct":0,"explanation":"If P (finish early) then Q (call you). P is true, so Q follows — I will call you.","explanation_id":"Jika P (selesai awal) maka Q (menelepon). P benar, maka Q mengikuti.","options_id":["I will call you","I will not call you","I may or may not call you","I finished on time"],"tag":"Logical","subtype":"Conditional","level":1},{"id":852,"question":"P → Q is FALSE. When is this possible?","question_id":"P → Q adalah SALAH. Kapan ini mungkin terjadi?","options":["P is false and Q is true","P is true and Q is false","P is false and Q is false","P is true and Q is true"],"correct":1,"explanation":"P→Q is only FALSE when P is TRUE and Q is FALSE.","explanation_id":"P→Q hanya SALAH ketika P BENAR dan Q SALAH.","options_id":["P is false and Q is true","P is true and Q is false","P is false and Q is false","P is true and Q is true"],"tag":"Logical","subtype":"Conditional","level":1},{"id":853,"question":"All of the following are TRUE. Which form is NOT logically equivalent to P → Q?","question_id":"Semua pernyataan berikut BENAR. Manakah yang TIDAK setara logis dengan P → Q?","options":["NOT Q → NOT P","NOT P OR Q","Q → P","P → Q"],"correct":2,"explanation":"The converse Q→P is NOT equivalent to P→Q. The others (contrapositive, material implication) are equivalent.","explanation_id":"Konvers Q→P TIDAK setara dengan P→Q. Lainnya (kontrapositif, implikasi material) setara.","options_id":["NOT Q → NOT P","NOT P OR Q","Q → P","P → Q"],"tag":"Logical","subtype":"Conditional","level":1},{"id":854,"question":"If it rains, the match is cancelled.\nIf the match is cancelled, the team stays home.\nThe team did NOT stay home.\nWhat can we conclude?","question_id":"Jika hujan, pertandingan dibatalkan.\nJika pertandingan dibatalkan, tim tetap di rumah.\nTim TIDAK tetap di rumah.\nApa yang bisa kita simpulkan?","options":["It rained","It did not rain","The match was not cancelled","Both B and C"],"correct":3,"explanation":"NOT stay home → NOT cancelled (contrapositive of rule 2) → NOT rain (contrapositive of rule 1). So it did not rain AND the match was not cancelled.","explanation_id":"TIDAK di rumah → TIDAK dibatalkan → TIDAK hujan. Jadi tidak hujan DAN pertandingan tidak dibatalkan.","options_id":["It rained","It did not rain","The match was not cancelled","Both B and C"],"tag":"Logical","subtype":"Conditional","level":1},{"id":855,"question":"Statement: 'The car will start only if it has fuel.'\nThe car has fuel.\nWhat can we conclude?","question_id":"Pernyataan: 'Mobil akan menyala hanya jika ada bahan bakar.'\nMobil memiliki bahan bakar.\nApa yang bisa kita simpulkan?","options":["The car will start","The car will not start","The car may or may not start","Fuel is sufficient"],"correct":2,"explanation":"'Only if Q, then P' = P→Q. Having fuel (Q) does not guarantee starting (P). We cannot conclude.","explanation_id":"'Hanya jika Q, maka P' = P→Q. Memiliki bahan bakar (Q) tidak menjamin menyala (P). Kita tidak bisa menyimpulkan.","options_id":["The car will start","The car will not start","The car may or may not start","Fuel is sufficient"],"tag":"Logical","subtype":"Conditional","level":1},{"id":856,"question":"If A and B are both true, then C is true.\nC is false.\nWhat can we conclude?","question_id":"Jika A dan B keduanya benar, maka C benar.\nC salah.\nApa yang bisa kita simpulkan?","options":["A is false","B is false","At least one of A or B is false","Both A and B are false"],"correct":2,"explanation":"Contrapositive: NOT C → NOT(A AND B) = NOT A OR NOT B. So at least one of A or B is false.","explanation_id":"Kontrapositif: BUKAN C → BUKAN(A DAN B) = BUKAN A ATAU BUKAN B. Setidaknya satu dari A atau B salah.","options_id":["A is false","B is false","At least one of A or B is false","Both A and B are false"],"tag":"Logical","subtype":"Conditional","level":1},{"id":857,"question":"'Whenever X, then Y.' is equivalent to:","question_id":"'Kapanpun X, maka Y.' setara dengan:","options":["Y only if X","If Y then X","If X then Y","X and Y always occur together"],"correct":2,"explanation":"'Whenever X, then Y' is simply X→Y.","explanation_id":"'Kapanpun X, maka Y' adalah X→Y.","options_id":["Y only if X","If Y then X","If X then Y","X and Y always occur together"],"tag":"Logical","subtype":"Conditional","level":1},{"id":858,"question":"Given: P → Q and P → NOT Q. What can we conclude about P?","question_id":"Diberikan: P → Q dan P → BUKAN Q. Apa yang bisa kita simpulkan tentang P?","options":["P must be true","P must be false","P can be either true or false","Q must be true"],"correct":1,"explanation":"If P were true, then both Q and NOT Q would be true simultaneously — a contradiction. So P must be false.","explanation_id":"Jika P benar, maka Q dan BUKAN Q keduanya benar sekaligus — kontradiksi. Jadi P harus salah.","options_id":["P must be true","P must be false","P can be either true or false","Q must be true"],"tag":"Logical","subtype":"Conditional","level":1},{"id":859,"question":"If you study hard, you will pass. If you pass, you will graduate.\nYou did NOT graduate.\nWhat is the correct chain of conclusions?","question_id":"Jika kamu belajar keras, kamu akan lulus. Jika kamu lulus, kamu akan wisuda.\nKamu TIDAK wisuda.\nApa rantai kesimpulan yang benar?","options":["You studied hard but did not pass","You did not pass, therefore you did not study hard","You passed but did not graduate","Nothing can be concluded"],"correct":1,"explanation":"NOT graduate → NOT pass (contrapositive). NOT pass → NOT study hard (contrapositive). Conclusion: you did not pass AND did not study hard.","explanation_id":"TIDAK wisuda → TIDAK lulus → TIDAK belajar keras.","options_id":["You studied hard but did not pass","You did not pass, therefore you did not study hard","You passed but did not graduate","Nothing can be concluded"],"tag":"Logical","subtype":"Conditional","level":1},{"id":860,"question":"P → Q. NOT P. What can we VALIDLY conclude?","question_id":"P → Q. BUKAN P. Apa yang bisa kita simpulkan secara VALID?","options":["Q is true","Q is false","NOT Q","Nothing about Q"],"correct":3,"explanation":"Denying the antecedent (NOT P) does NOT allow us to conclude anything about Q. Q could be true or false.","explanation_id":"Menyangkal anteseden (BUKAN P) TIDAK memungkinkan kita menyimpulkan apapun tentang Q.","options_id":["Q is true","Q is false","NOT Q","Nothing about Q"],"tag":"Logical","subtype":"Conditional","level":1}],"sessions":[{"session":1,"total":20,"questions":[{"id":554,"section":"logic"},{"id":716,"section":"diagrammatic"},{"id":403,"section":"logic"},{"id":837,"section":"logical_reasoning"},{"id":757,"section":"diagrammatic"},{"id":233,"section":"logic"},{"id":78,"section":"logic"},{"id":93,"section":"logic"},{"id":673,"section":"inductive"},{"id":421,"section":"programming"},{"id":820,"section":"logical_reasoning"},{"id":460,"section":"logic"},{"id":512,"section":"logic"},{"id":853,"section":"logical_reasoning"},{"id":530,"section":"logic"},{"id":638,"section":"inductive"},{"id":629,"section":"inductive"},{"id":177,"section":"oop"},{"id":734,"section":"diagrammatic"},{"id":681,"section":"inductive"}]},{"session":2,"total":20,"questions":[{"id":322,"section":"logic"},{"id":809,"section":"logical_reasoning"},{"id":640,"section":"inductive"},{"id":588,"section":"logic"},{"id":570,"section":"logic"},{"id":653,"section":"inductive"},{"id":703,"section":"diagrammatic"},{"id":731,"section":"diagramma },{"id":713,"section":"diagrammatic"},{"id":152,"section":"logic"},{"id":321,"section":"logic"},{"id":45,"section":"logic"},{"id":603,"section":"inductive"},{"id":357,"section":"logic"}]},{"session":43,"total":20,"questions":[{"id":635,"section":"inductive"},{"id":215,"section":"programming"},{"id":812,"section":"logical_reasoning"},{"id":684,"section":"inductive"},{"id":675,"section":"inductive"},{"id":338,"section":"logic"},{"id":509,"section":"logic"},{"id":726,"section":"diagrammatic"},{"id":434,"section":"logic"},{"id":835,"section":"logical_reasoning"},{"id":189,"section":"logic"},{"id":2,"section":"logic"},{"id":848,"section":"logical_reasoning"},{"id":155,"section":"logic"},{"id":601,"section":"inductive"},{"id":94,"section":"oop"},{"id":744,"section":"diagrammatic"},{"id":707,"section":"diagrammatic"},{"id":589,"section":"logic"},{"id":422,"section":"logic"}]},{"session":44,"total":20,"questions":[{"id":808,"section":"logical_reasoning"},{"id":327,"section":"logic"},{"id":328,"section":"logic"},{"id":687,"section":"inductive"},{"id":639,"section":"inductive"},{"id":513,"section":"logic"},{"id":702,"section":"diagrammatic"},{"id":750,"section":"diagrammatic"},{"id":324,"section":"logic"},{"id":252,"section":"programming"},{"id":610,"section":"inductive"},{"id":559,"section":"logic"},{"id":723,"section":"diagrammatic"},{"id":855,"section":"logical_reasoning"},{"id":454,"section":"logic"},{"id":228,"section":"oop"},{"id":828,"section":"logical_reasoning"},{"id":552,"section":"logic"},{"id":664,"section":"inductive"},{"id":146,"section":"logic"}]},{"session":45,"total":20,"questions":[{"id":711,"section":"diagrammatic"},{"id":165,"section":"programming"},{"id":585,"section":"logic"},{"id":640,"section":"inductive"},{"id":306,"section":"logic"},{"id":562,"section":"logic"},{"id":120,"section":"oop"},{"id":746,"section":"diagrammatic"},{"id":657,"section":"inductive"},{"id":26,"section":"logic"},{"id":456,"section":"logic"},{"id":617,"section":"inductive"},{"id":218,"section":"logic"},{"id":262,"section":"logic"},{"id":820,"section":"logical_reasoning"},{"id":247,"section":"logic"},{"id":857,"section":"logical_reasoning"},{"id":739,"section":"diagrammatic"},{"id":677,"section":"inductive"},{"id":824,"section":"logical_reasoning"}]}]}</script>
<script>
const BANK=JSON.parse(document.getElementById('bank').textContent);
const ABC=['A','B','C','D'];
const PER=BANK.meta.questionsPerSession;
const OFFLINE=location.protocol==='file:';
const TOPIC_KEYS=Object.keys(BANK.meta.topics);
const ICON={logic:'🧠',programming:'💻',oop:'🧩',inductive:'🔍',diagrammatic:'📊',logical_reasoning:'🤔'};
const COL ={logic:'#5E5CE6',programming:'#0071E3',oop:'#30E3CA',inductive:'#FF3B30',diagrammatic:'#FF9500',logical_reasoning:'#AF52DE'};
const DESC={
  logic:['Number series · Coding · Direction · Ranking · Seating · Blood relations · Syllogism · Analogy',
         'Deret angka · Sandi · Arah · Peringkat · Tempat duduk · Hubungan keluarga · Silogisme · Analogi'],
  programming:['Pseudocode tracing · IF/ELSE · SWITCH · loops · arrays · functions · recursion · Swift',
               'Telusur pseudocode · IF/ELSE · SWITCH · loop · array · fungsi · rekursi · Swift'],
  oop:['Class · Object · Constructor · Inheritance · Polymorphism · Encapsulation · Abstraction · Swift classes',
       'Class · Object · Constructor · Pewarisan · Polimorfisme · Enkapsulasi · Abstraksi · Swift'],
  inductive:['Pattern recognition, sequence completion, shape transformation','Pengenalan pola, penyelesaian deret, transformasi bentuk'],
  diagrammatic:['Flowcharts, operational sequences, logic gates','Bagan alur, urutan operasional, gerbang logika'],
  logical_reasoning:['Deduction, inference, syllogism, assumptions','Deduksi, inferensi, silogisme, asumsi'],
};

const ls={get(k){try{return JSON.parse(localStorage.getItem('aq_'+k));}catch(e){return null;}},
          set(k,v){try{localStorage.setItem('aq_'+k,JSON.stringify(v));}catch(e){}}};
let PLAYER=ls.get('player')||'me';
let remote={}; let syncState=OFFLINE?'local':'connecting';

async function loadScores(){
  if(OFFLINE){syncState='local';return;}
  try{const r=await fetch('/api/scores?player='+encodeURIComponent(PLAYER));
    if(r.ok){remote=await r.json();syncState='cloud';}else{syncState='local';}}catch(e){syncState='local';}
}
function bestOf(t,s){const k=t+':'+s; if(syncState==='cloud'&&k in remote)return remote[k]; return ls.get(k);}
async function saveScore(t,s,score){
  const k=t+':'+s; ls.set(k,Math.max(score,ls.get(k)??0));
  if(OFFLINE)return;
  try{const r=await fetch('/api/scores',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({player:PLAYER,topic:t,session:s,score,total:PER})});
    if(r.ok){remote[k]=(await r.json()).best;syncState='cloud';}else{syncState='local';}}catch(e){syncState='local';}
}

function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function inlineCode(s){return esc(s).split('`').map((p,i)=>i%2?'<code>'+p+'</code>':p).join('');}
function fmtFull(t){return t.split('```').map((seg,i)=>i%2?'<pre>'+esc(seg.replace(/^\n|\n$/g,''))+'</pre>':inlineCode(seg)).join('');}
function fmtNoCode(t){return t.split('```').filter((_,i)=>i%2===0).map(inlineCode).join('').trim();}

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildAttempt(topic,session){
  const slice=BANK[topic].slice(session*PER,session*PER+PER);
  return shuffle(slice).map(q=>{const order=shuffle([0,1,2,3]);
    return {question:q.question,question_id:q.question_id,explanation:q.explanation,explanation_id:q.explanation_id,
            options:order.map(i=>q.options[i]),options_id:q.options_id?order.map(i=>q.options_id[i]):null,
            tag:q.tag,level:q.level,correct:order.indexOf(q.correct)};});
}

let S={screen:'home',topic:TOPIC_KEYS[0]};
function startSession(topic,session){S={screen:'quiz',topic,session,qs:buildAttempt(topic,session),idx:0,selected:null,score:0,reviewed:[]};render();}
function pick(i){if(S.selected!==null)return;S.selected=i;const q=S.qs[S.idx],ok=i===q.correct;if(ok)S.score++;S.reviewed.push({...q,picked:i,ok});render();}
function advance(){if(S.idx+1>=S.qs.length){saveScore(S.topic,S.session,S.score).then(()=>{if(S.screen==='results')render();});S.screen='results';}else{S.idx++;S.selected=null;}render();}
function setPlayer(v){PLAYER=(v||'me').trim()||'me';ls.set('player',PLAYER);syncState=OFFLINE?'local':'connecting';render();loadScores().then(render);}

function syncBadge(){
  const m={cloud:['☁︎ Cloud (Aiven)','rgba(50,215,75,.16)','#32D74B'],local:['● This device / perangkat ini','rgba(255,159,10,.16)','#FF9F0A'],connecting:['… connecting','rgba(255,255,255,.08)','#8E8E93']};
  const [t,bg,c]=m[syncState]||m.local; return `<span class="sync" style="background:${bg};color:${c}">${t}</span>`;
}
function topicLabel(t){return (ICON[t]||'📚')+' '+BANK.meta.topics[t].label;}
function tagChip(q){
  if(!q||!q.tag)return '';
  const c={Swift:['#FF9F0A','rgba(255,159,10,.15)'],Pseudocode:['#0A84FF','rgba(10,132,255,.15)'],Concept:['#BF5AF2','rgba(191,90,242,.15)']}[q.tag]||['#8E8E93','rgba(255,255,255,.08)'];
  const dots='●'.repeat(q.level||1)+'○'.repeat(3-(q.level||1));
  const lbl={1:'Easy',2:'Medium',3:'Harder'}[q.level||1];
  return `<span class="chip2" style="color:${c[0]};background:${c[1]}">${q.tag} · <span style="letter-spacing:1px">${dots}</span> ${lbl}</span>`;
}

function homeView(){
  const t=S.topic,info=BANK.meta.topics[t],n=info.sessions;
  let tabs='';
  for(const k of TOPIC_KEYS){
    const inf=BANK.meta.topics[k],active=k===t;
    const st=active?`background:${COL[k]}2e;border-color:${COL[k]}80;color:#fff`:'';
    tabs+=`<button class="tab" style="${st}" onclick="S.topic='${k}';render()">${ICON[k]||'📚'} ${inf.label}<small>${inf.label_id} · ${inf.total} soal</small></button>`;
  }
  let cells='';
  for(let s=0;s<n;s++){
    const best=bestOf(t,s),done=best!==null&&best!==undefined;
    const pct=done?Math.round(best/PER*100):0;
    const col=pct>=85?'var(--green)':pct>=55?'var(--teal)':pct>=40?'var(--orange)':'var(--red)';
    cells+=`<button class="cell ${done?'done':''}" onclick="startSession('${t}',${s})">
      <span class="n">${s+1}</span><span class="lbl">${done?'best':`${PER} Q`}</span>
      ${done?`<span class="best" style="color:${col}">${best}/${PER}</span>`:''}</button>`;
  }
  return `<div style="text-align:center"><div class="brand">
      <div class="logo">🍎</div><h1>Academy Entry-Test Prep</h1>
      <p class="sub">Apple Developer Academy Indonesia</p>
      <span class="pill">Logic + Programming + OOP · EN + ID</span></div></div>
    <div class="who"><label>Nama / Name:</label>
      <input id="pname" value="${PLAYER.replace(/"/g,'&quot;')}" onchange="setPlayer(this.value)" placeholder="me">${syncBadge()}</div>
    <div class="tabs">${tabs}</div>
    <p class="meta">${DESC[t]?DESC[t][0]:''}<br><span class="id">${DESC[t]?DESC[t][1]:''}</span><br>
      Pick a session — ${PER} questions each · no timer<br><span class="id">Pilih satu sesi — ${PER} soal per sesi · tanpa timer</span></p>
    <div class="grid">${cells}</div>
    <button class="learnbtn" onclick="S.screen='learn';S.learnSec='programming';render()">📖 Study Material / Materi Belajar — Programming · OOP · Swift</button>
    <p class="foot">${OFFLINE
      ?'Opened as a file — scores save on this device only.<br><span class="id">Dibuka sebagai file — skor hanya tersimpan di perangkat ini.</span>'
      :'Scores sync to your database when the server is running.<br><span class="id">Skor tersinkron ke database-mu saat server menyala.</span>'}</p>`;
}

function quizView(){
  const q=S.qs[S.idx],num=S.idx+1,total=S.qs.length;
  const answered=S.selected!==null,isRight=S.selected===q.correct;
  let opts='';
  q.options.forEach((o,i)=>{
    let cls='opt'; if(answered){if(i===q.correct)cls+=' correct';else if(i===S.selected)cls+=' wrong';else cls+=' faded';}
    let badge=ABC[i]; if(answered&&i===q.correct)badge='✓'; else if(answered&&i===S.selected)badge='✗';
    const oid=(q.options_id&&q.options_id[i]&&q.options_id[i]!==o)?`<span class="oid">${fmtFull(q.options_id[i])}</span>`:'';
    opts+=`<button class="${cls}" ${answered?'disabled':''} onclick="pick(${i})"><span class="badge">${badge}</span><span class="otxt"><span>${fmtFull(o)}</span>${oid}</span></button>`;
  });
  const expl=answered?`
    <div class="expl ${isRight?'ok':'no'}">
      <p class="h">${isRight?'✓ Correct! / Benar!':'✗ Incorrect — answer '+ABC[q.correct]+' / Salah — jawaban '+ABC[q.correct]}</p>
      <p class="een">${inlineCode(q.explanation)}</p>
      <p class="eid id">${inlineCode(q.explanation_id)}</p>
    </div>
    <button class="next" onclick="advance()">${num<total?'Next / Lanjut →':'See Results / Lihat Hasil 🎯'}</button>`:'';
  return `<div class="bar"><i style="width:${(num-1)/total*100}%"></i></div>
    <div class="top"><span class="t">${topicLabel(S.topic)} · S${S.session+1}</span>
      <span class="qn">Q${num} <span>/ ${total}</span></span><span class="sc">✓ ${S.score}</span></div>
    <div class="card"><div style="margin-bottom:10px">${tagChip(q)}</div><div class="en">${fmtFull(q.question)}</div><div class="idq">${fmtNoCode(q.question_id)}</div></div>
    <div class="opts">${opts}</div>${expl}`;
}

function resultsView(){
  const score=S.score,total=S.qs.length,pct=Math.round(score/total*100);
  const wrong=S.reviewed.filter(r=>!r.ok);
  const g=pct>=85?['Outstanding! 🔥','var(--green)']:pct>=70?['Great job! 💪','var(--teal)']
        :pct>=55?['Good effort! 📚','var(--blue)']:pct>=40?['Keep going! 🚀','var(--orange)']:["Don't give up! 💡",'var(--red)'];
  let wrongHtml;
  if(wrong.length){
    const boxes=wrong.map(r=>{
      const yid=(r.options_id&&r.options_id[r.picked]&&r.options_id[r.picked]!==r.options[r.picked])?` <span class="id">(${fmtNoCode(r.options_id[r.picked])})</span>`:'';
      const cid=(r.options_id&&r.options_id[r.correct]&&r.options_id[r.correct]!==r.options[r.correct])?` <span class="id">(${fmtNoCode(r.options_id[r.correct])})</span>`:'';
      return `<div class="wbox"><p class="q">${fmtFull(r.question)}<br><span class="id">${fmtNoCode(r.question_id)}</span></p>
        <p class="ya">✗ You / Kamu: ${fmtFull(r.options[r.picked])}${yid}</p>
        <p class="ca">✓ Correct / Benar: ${fmtFull(r.options[r.correct])}${cid}</p>
        <p class="ex">${inlineCode(r.explanation)}<br><span class="id">${inlineCode(r.explanation_id)}</span></p></div>`;}).join('');
    wrongHtml=`<button class="toggle" onclick="(function(e){e.style.display=e.style.display==='none'?'flex':'none'})(document.getElementById('wl'))">▼ Review ${wrong.length} wrong / Tinjau ${wrong.length} salah</button>
      <div class="wrongs" id="wl" style="display:none">${boxes}</div>`;
  }else{wrongHtml=`<div class="perfect">🎯 Perfect session! / Sesi sempurna!</div>`;}
  return `<div class="score-card">
      <p class="sub">${topicLabel(S.topic)} · Session ${S.session+1} · ${syncBadge()}</p>
      <div class="ring" style="border-color:${g[1]}"><span class="big" style="color:${g[1]}">${score}</span><span class="of">/ ${total}</span></div>
      <h1 style="font-size:21px">${g[0]}</h1><p class="sub" style="margin:5px 0 0">${pct}% accuracy / akurasi</p></div>
    <div class="chips">
      <div class="chip"><div class="v" style="color:var(--green)">${score}</div><div class="l">Correct / Benar</div></div>
      <div class="chip"><div class="v" style="color:var(--red)">${wrong.length}</div><div class="l">Wrong / Salah</div></div>
      <div class="chip"><div class="v" style="color:var(--indigo)">${pct}%</div><div class="l">Score / Nilai</div></div></div>
    <div class="row"><button class="ghost" onclick="S.screen='home';render()">← Home</button>
      <button class="next" style="flex:2" onclick="startSession('${S.topic}',${S.session})">Retry / Ulangi →</button></div>
    ${wrongHtml}`;
}

function toggleCard(id){const e=document.getElementById(id);if(e)e.style.display=e.style.display==='none'?'block':'none';}
function learnView(){
  const sec=S.learnSec||'programming';
  const SEC={programming:['💻 Programming','Pemrograman'],oop:['🧩 OOP','OOP'],swift:['🍎 Swift','Swift']};
  let subtabs='';
  for(const k of ['programming','oop','swift']){
    const active=k===sec,st=active?'background:rgba(48,227,202,.18);border-color:rgba(48,227,202,.5);color:#fff':'';
    subtabs+=`<button class="subtab" style="${st}" onclick="S.learnSec='${k}';render()">${SEC[k][0]}</button>`;
  }
  const cards=(BANK.learn[sec]||[]).map((c,i)=>{
    const cid='lc_'+sec+'_'+i;
    const codeHtml=c.code?fmtFull(c.code):'';
    return `<div class="lcard">
      <button onclick="toggleCard('${cid}')"><span class="ltitle">${c.title}<small>${c.title_id}</small></span><span style="color:var(--dim)">▾</span></button>
      <div class="lbody" id="${cid}" style="display:${i===0?'block':'none'}">${c.body}${codeHtml}<span class="lid">${c.body_id}</span></div>
    </div>`;
  }).join('');
  return `<div style="text-align:center;margin-bottom:6px"><div style="font-size:40px">📖</div>
      <h1 style="font-size:22px">Study Material</h1>
      <p class="sub">Materi belajar dasar — baca dulu sebelum latihan<br><span class="id">Read these foundations before practicing</span></p></div>
    <div class="subtabs">${subtabs}</div>
    <p class="meta">Tap a card to open / Ketuk kartu untuk membuka</p>
    ${cards}
    <button class="next ghost" style="margin-top:14px" onclick="S.screen='home';render()">← Back / Kembali</button>`;
}
function render(){const el=document.getElementById('app');el.innerHTML=S.screen==='quiz'?quizView():S.screen==='results'?resultsView():S.screen==='learn'?learnView():homeView();window.scrollTo(0,0);}
render();
loadScores().then(render);
</script>
</body>
</html>
