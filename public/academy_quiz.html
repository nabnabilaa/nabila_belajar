<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academy Entry-Test Prep — Apple Developer Academy Indonesia</title>
<style>
  :root{
    --bg1:#06060F;--bg2:#0D0D20;--fg:#F5F5F7;--muted:#8E8E93;--dim:#636366;--faint:#3A3A3C;
    --indigo:#5E5CE6;--blue:#0071E3;--green:#32D74B;--red:#FF453A;--teal:#30E3CA;--orange:#FF9F0A;
    --idcol:#9a98c9;
    --font:-apple-system,'SF Pro Display',BlinkMacSystemFont,system-ui,sans-serif;
    --mono:'SF Mono','Fira Code','Courier New',monospace;
  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{min-height:100vh;background:linear-gradient(150deg,var(--bg1) 0%,var(--bg2) 55%,#07060F 100%);
       background-attachment:fixed;color:var(--fg);font-family:var(--font);-webkit-font-smoothing:antialiased;padding:24px 18px}
  .wrap{max-width:640px;margin:0 auto}
  code{font-family:var(--mono);font-size:.85em;background:rgba(255,255,255,.1);border-radius:4px;padding:1px 5px;color:#e0e0f0}
  pre{font-family:var(--mono);font-size:12.5px;line-height:1.55;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);
      border-radius:12px;padding:12px 14px;margin:10px 0 0;overflow-x:auto;color:#e6e6f0;white-space:pre}
  button{font-family:var(--font);cursor:pointer;border:none}
  .id{color:var(--idcol);font-style:italic}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  .brand{text-align:center;margin:8px 0 16px}
  .logo{font-size:50px;margin-bottom:12px;animation:float 3.8s ease-in-out infinite}
  h1{font-size:24px;font-weight:800;margin:0 0 6px;letter-spacing:-.5px}
  .sub{color:var(--dim);margin:0 0 8px;font-size:13.5px}
  .pill{display:inline-block;background:rgba(94,92,230,.18);color:#a8a6f8;border-radius:99px;padding:2px 12px;font-size:12px;font-weight:600}
  .who{display:flex;gap:8px;align-items:center;justify-content:center;margin:0 auto 14px;flex-wrap:wrap}
  .who label{font-size:12px;color:var(--dim)}
  .who input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--fg);border-radius:9px;padding:7px 11px;font-size:13px;font-family:var(--font);max-width:150px}
  .sync{font-size:11px;border-radius:99px;padding:2px 10px;font-weight:600}
  .tabs{display:flex;gap:8px;margin:0 auto 12px;flex-wrap:wrap;justify-content:center}
  .tab{flex:1;min-width:150px;padding:11px 8px;border-radius:13px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
       color:var(--muted);font-size:13.5px;font-weight:700;transition:.16s;line-height:1.3}
  .tab small{display:block;font-weight:500;font-size:11px;opacity:.8}
  .meta{color:var(--dim);font-size:12.5px;text-align:center;margin:0 auto 16px;max-width:520px;line-height:1.6}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px;max-width:480px;margin:0 auto}
  .cell{aspect-ratio:1;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:.16s;padding:6px}
  .cell:hover{transform:translateY(-2px);background:rgba(255,255,255,.07)}
  .cell .n{font-size:18px;font-weight:800}.cell .lbl{font-size:10px;color:var(--dim)}.cell .best{font-size:11px;font-weight:700}
  .cell.done{border-color:rgba(50,215,75,.35)}
  .foot{color:var(--faint);font-size:12px;text-align:center;margin-top:24px;line-height:1.6}

  .bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:16px;overflow:hidden}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--indigo),var(--blue));border-radius:2px;transition:width .4s ease}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .top .t{color:var(--dim);font-size:13px}.top .qn{font-weight:700}.top .qn span{color:var(--faint);font-weight:400}
  .top .sc{background:rgba(50,215,75,.14);color:var(--green);border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700}
  .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.075);border-radius:16px;padding:15px 17px;margin-bottom:12px}
  .card .en{font-size:15px;line-height:1.65;white-space:pre-wrap}
  .card .idq{font-size:13px;line-height:1.55;white-space:pre-wrap;margin-top:8px;padding-top:8px;border-top:1px dashed rgba(255,255,255,.1);color:var(--idcol);font-style:italic}
  .opts{display:flex;flex-direction:column;gap:8px;margin-bottom:13px}
  .opt{display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;border-radius:13px;padding:11px 13px;
       background:rgba(255,255,255,.038);border:1px solid rgba(255,255,255,.075);color:var(--fg);font-size:14px;line-height:1.5;transition:.16s}
  .opt:not(:disabled):hover{background:rgba(255,255,255,.07)}.opt:not(:disabled):active{transform:scale(.99)}
  .opt:disabled{cursor:default}
  .opt .badge{width:26px;height:26px;border-radius:7px;flex-shrink:0;background:rgba(255,255,255,.09);color:var(--dim);
              display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .opt .otxt{display:flex;flex-direction:column;gap:2px}
  .opt .oid{font-size:12px;color:var(--idcol);font-style:italic}
  .opt.correct{background:rgba(50,215,75,.1);border-color:rgba(50,215,75,.4)}.opt.correct .badge{background:rgba(50,215,75,.22);color:var(--green)}
  .opt.wrong{background:rgba(255,69,58,.1);border-color:rgba(255,69,58,.4)}.opt.wrong .badge{background:rgba(255,69,58,.22);color:var(--red)}
  .opt.faded{background:rgba(255,255,255,.015);border-color:rgba(255,255,255,.04);color:var(--faint)}.opt.faded .oid{color:var(--faint)}
  .expl{border-radius:13px;padding:12px 15px;margin-bottom:13px;border:1px solid}
  .expl.ok{background:rgba(50,215,75,.07);border-color:rgba(50,215,75,.22)}
  .expl.no{background:rgba(255,69,58,.07);border-color:rgba(255,69,58,.22)}
  .expl .h{margin:0 0 6px;font-size:13px;font-weight:700}.expl.ok .h{color:var(--green)}.expl.no .h{color:var(--red)}
  .expl .een{margin:0;font-size:13px;color:#C7C7CC;line-height:1.6}
  .expl .eid{margin:6px 0 0;padding-top:6px;border-top:1px dashed rgba(255,255,255,.12);font-size:13px;line-height:1.6}
  .next{padding:13px;border-radius:13px;width:100%;background:linear-gradient(135deg,var(--indigo),var(--blue));color:#fff;font-size:15px;font-weight:700}
  .ghost{background:rgba(255,255,255,.07);color:var(--fg);font-weight:600}

  .score-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.075);border-radius:20px;padding:24px 20px;text-align:center;margin-bottom:14px}
  .ring{width:98px;height:98px;border-radius:50%;margin:0 auto 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:4px solid}
  .ring .big{font-size:32px;font-weight:800;line-height:1}.ring .of{font-size:12px;color:var(--dim)}
  .chips{display:flex;gap:10px;margin-bottom:14px}
  .chip{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:12px 6px;text-align:center}
  .chip .v{font-size:21px;font-weight:800}.chip .l{font-size:11px;color:var(--dim);margin-top:3px}
  .row{display:flex;gap:10px;margin-bottom:20px}.row button{flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:700}
  .wrongs{display:flex;flex-direction:column;gap:10px}
  .wbox{background:rgba(255,69,58,.06);border:1px solid rgba(255,69,58,.13);border-radius:13px;padding:12px 14px}
  .wbox .q{margin:0 0 9px;font-size:13px;line-height:1.55;font-weight:500;white-space:pre-wrap}
  .wbox .ya{margin:0 0 3px;font-size:12px;color:var(--red)}.wbox .ca{margin:0 0 8px;font-size:12px;color:var(--green)}
  .wbox .ex{margin:0;font-size:12px;color:var(--muted);line-height:1.55}
  .toggle{width:100%;padding:11px 16px;border-radius:11px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--fg);font-size:14px;font-weight:600;margin-bottom:12px}
  .perfect{text-align:center;padding:20px;color:var(--green);font-size:14px;font-weight:600}
  .chip2{display:inline-block;font-size:11px;font-weight:700;border-radius:99px;padding:3px 10px}
  .learnbtn{display:block;width:100%;margin:14px auto 0;padding:13px;border-radius:13px;background:rgba(48,227,202,.12);
            border:1px solid rgba(48,227,202,.3);color:#7af0e0;font-size:14px;font-weight:700}
  .lcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;margin-bottom:10px;overflow:hidden}
  .lcard>button{width:100%;text-align:left;background:none;padding:14px 16px;color:var(--fg);font-size:14.5px;font-weight:700;display:flex;justify-content:space-between;gap:10px}
  .lcard .ltitle small{display:block;font-weight:500;font-size:12px;color:var(--idcol);font-style:italic;margin-top:2px}
  .lbody{padding:0 16px 15px;font-size:13.5px;line-height:1.65;color:#C7C7CC}
  .lbody .lid{color:var(--idcol);font-style:italic;display:block;margin-top:7px;padding-top:7px;border-top:1px dashed rgba(255,255,255,.1)}
  .subtabs{display:flex;gap:8px;margin:0 auto 14px;justify-content:center;flex-wrap:wrap}
  .subtab{padding:9px 16px;border-radius:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);color:var(--muted);font-size:13px;font-weight:700}
</style>
</head>

<script id="bank" type="application/json">{"meta":{"title":"Apple Developer Academy Entry-Test Prep","questionsPerSession":20,"note":"Logic (TPA/TIU) + Inductive + Diagrammatic + Logical Reasoning (AssessmentDay) + Programming (pseudocode) + OOP. 20 soal/session, tipe campur tiap session.","topics":{"logic":{"label":"Logic Test","label_id":"Tes Logika","total":600,"sessions":12},"programming":{"label":"Programming","label_id":"Pemrograman","total":430,"sessions":8},"oop":{"label":"OOP","label_id":"OOP","total":226,"sessions":4},"inductive":{"label":"Inductive Reasoning","label_id":"Penalaran Induktif","total":95,"sessions":1},"diagrammatic":{"label":"Diagrammatic Reasoning","label_id":"Penalaran Diagramatik","total":60,"sessions":1},"logical_reasoning":{"label":"Logical Reasoning","label_id":"Penalaran Logis","total":60,"sessions":1}},"totalSessions":45},"logic":[{"id":1,"question":"Gita is the father of Dewi. Dewi is the father of Sani.\nHow is Gita related to Sani?","question_id":"Gita ayah dari Dewi. Dewi ayah dari Sani.\nApa hubungan Gita terhadap Sani?","options":["Cousin","Father","Nephew","Grandfather"],"correct":3,"explanation":"Gita is the father of Sani's father, so Gita is Sani's grandfather.","explanation_id":"Gita adalah ayah dari ayahnya Sani, jadi Gita kakek Sani.","options_id":["Sepupu","Ayah","Keponakan laki-laki","Kakek"],"tag":"Concept","level":1,"_section":"logic"},{"id":2,"question":"What number continues the series?\n5, 17, 8, 15, 11, 13, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n5, 17, 8, 15, 11, 13, ?","options":["15","17","14","25"],"correct":2,"explanation":"Two interleaved patterns. Odd spots +3, even spots -2. Next continues odd: 11+3=14.","explanation_id":"Dua pola berselang-seling. Posisi ganjil +3, genap -2. Berikutnya pola ganjil: 11+3=14.","tag":"Concept","level":1,"_section":"logic"},{"id":3,"question":"What number continues the series?\n1, 28, 3, 31, 5, 34, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n1, 28, 3, 31, 5, 34, ?","options":["44","8","9","7"],"correct":3,"explanation":"Two interleaved patterns. Odd spots +2, even spots +3. Next continues odd: 5+2=7.","explanation_id":"Dua pola berselang-seling. Posisi ganjil +2, genap +3. Berikutnya pola ganjil: 5+2=7.","tag":"Concept","level":1,"_section":"logic"},{"id":4,"question":"In a code language, DOG is written as HSK.\nHow is TABLE written?","question_id":"Dalam suatu bahasa sandi, DOG ditulis HSK.\nBagaimana TABLE ditulis?","options":["YFGQJ","WDEOH","XEFPI","ZGHRK"],"correct":2,"explanation":"Each letter moves 4 step(s) forward in the alphabet (wrapping around). Applying the same shift to TABLE gives XEFPI.","explanation_id":"Setiap huruf bergeser 4 langkah maju di alfabet (memutar). Menerapkan geseran yang sama pada TABLE menghasilkan XEFPI.","tag":"Concept","level":1,"_section":"logic"},{"id":5,"question":"In a code language, LOGIC is written as MPHJD.\nHow is PLANT written?","question_id":"Dalam suatu bahasa sandi, LOGIC ditulis MPHJD.\nBagaimana PLANT ditulis?","options":["RNCPV","PLANT","SODQW","QMBOU"],"correct":3,"explanation":"Each letter moves 1 step(s) forward in the alphabet (wrapping around). Applying the same shift to PLANT gives QMBOU.","explanation_id":"Setiap huruf bergeser 1 langkah maju di alfabet (memutar). Menerapkan geseran yang sama pada PLANT menghasilkan QMBOU.","tag":"Concept","level":1,"_section":"logic"},{"id":6,"question":"4 people sit in a row (left to right):\nDewi sits somewhere to the left of Karin.\nKarin sits immediately to the left of Indra.\nAndi sits somewhere to the left of Dewi.\nBased on the clues, who sits at the far left?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nDewi duduk di suatu posisi sebelah kiri Karin.\nKarin duduk tepat di sebelah kiri Indra.\nAndi duduk di suatu posisi sebelah kiri Dewi.\nBerdasarkan petunjuk, siapa yang duduk paling kiri?","options":["Karin","Dewi","Indra","Andi"],"correct":3,"explanation":"The only seating that fits every clue is: Andi , Dewi , Karin , Indra (left→right). Therefore the answer is Andi.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Andi , Dewi , Karin , Indra (kiri→kanan). Maka jawabannya Andi.","tag":"Concept","level":1,"_section":"logic"},{"id":7,"question":"What number continues the series?\n8, 6, 4, 2, 0, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n8, 6, 4, 2, 0, ?","options":["0","-4","-2","-6"],"correct":2,"explanation":"Constant difference of -2 each step (arithmetic). 0 + (-2) = -2.","explanation_id":"Selisih tetap -2 tiap langkah (aritmetika). 0 + (-2) = -2.","tag":"Concept","level":1,"_section":"logic"},{"id":8,"question":"In a code language, RIVER is written as OFSBO.\nHow is BREAD written?","question_id":"Dalam suatu bahasa sandi, RIVER ditulis OFSBO.\nBagaimana BREAD ditulis?","options":["ZPCYB","AQDZC","YOBXA","XNAWZ"],"correct":2,"explanation":"Each letter moves 3 step(s) backward in the alphabet (wrapping around). Applying the same shift to BREAD gives YOBXA.","explanation_id":"Setiap huruf bergeser 3 langkah mundur di alfabet (memutar). Menerapkan geseran yang sama pada BREAD menghasilkan YOBXA.","tag":"Concept","level":1,"_section":"logic"},{"id":9,"question":"4 people sit in a row (left to right):\nThere are exactly 2 person(s) between Indra and Hadi.\nJoko sits somewhere to the left of Eka.\nHadi sits at the far left.\nBased on the clues, who sits in position 1 from the left?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nAda tepat 2 orang di antara Indra dan Hadi.\nJoko duduk di suatu posisi sebelah kiri Eka.\nHadi duduk paling kiri.\nBerdasarkan petunjuk, siapa yang duduk di posisi 1 dari kiri?","options":["Hadi","Indra","Eka","Joko"],"correct":0,"explanation":"The only seating that fits every clue is: Hadi , Joko , Eka , Indra (left→right). Therefore the answer is Hadi.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Hadi , Joko , Eka , Indra (kiri→kanan). Maka jawabannya Hadi.","tag":"Concept","level":1,"_section":"logic"},{"id":10,"question":"Which one does NOT belong?\n49, 36, 7, 1","question_id":"Mana yang TIDAK termasuk kelompoknya?\n49, 36, 7, 1","options":["36","1","7","49"],"correct":2,"explanation":"7 is not a perfect square; the others are squares.","explanation_id":"7 bukan kuadrat sempurna; yang lain kuadrat.","tag":"Concept","level":1,"_section":"logic"},{"id":11,"question":"From home you walk 9 km South, then 8 km West.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 9 km ke Selatan, lalu 8 km ke Barat.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["North-West / Utara-Barat","North-East / Utara-Timur","South-East / Selatan-Timur","South-West / Selatan-Barat"],"correct":3,"explanation":"Going South and West places you in the South-West quadrant relative to home.","explanation_id":"Bergerak ke Selatan dan Barat menempatkanmu di kuadran Selatan-Barat dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":12,"question":"Which one does NOT belong?\n2, 16, 4, 36","question_id":"Mana yang TIDAK termasuk kelompoknya?\n2, 16, 4, 36","options":["16","4","36","2"],"correct":3,"explanation":"2 is not a perfect square; the others are squares.","explanation_id":"2 bukan kuadrat sempurna; yang lain kuadrat.","tag":"Concept","level":1,"_section":"logic"},{"id":13,"question":"4 people sit in a row (left to right):\nSani sits at the far left.\nVina sits somewhere to the left of Rani.\nRani sits somewhere to the left of Maya.\nBased on the clues, who sits at the far left?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nSani duduk paling kiri.\nVina duduk di suatu posisi sebelah kiri Rani.\nRani duduk di suatu posisi sebelah kiri Maya.\nBerdasarkan petunjuk, siapa yang duduk paling kiri?","options":["Rani","Vina","Sani","Maya"],"correct":2,"explanation":"The only seating that fits every clue is: Sani , Vina , Rani , Maya (left→right). Therefore the answer is Sani.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Sani , Vina , Rani , Maya (kiri→kanan). Maka jawabannya Sani.","tag":"Concept","level":1,"_section":"logic"},{"id":14,"question":"4 people sit in a row (left to right):\nRani sits somewhere to the left of Indra.\nLina sits somewhere to the left of Indra.\nLina sits somewhere to the left of Rani.\nLina sits somewhere to the left of Andi.\nAndi sits at the far right.\nBased on the clues, who sits at the far left?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nRani duduk di suatu posisi sebelah kiri Indra.\nLina duduk di suatu posisi sebelah kiri Indra.\nLina duduk di suatu posisi sebelah kiri Rani.\nLina duduk di suatu posisi sebelah kiri Andi.\nAndi duduk paling kanan.\nBerdasarkan petunjuk, siapa yang duduk paling kiri?","options":["Indra","Andi","Rani","Lina"],"correct":3,"explanation":"The only seating that fits every clue is: Lina , Rani , Indra , Andi (left→right). Therefore the answer is Lina.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Lina , Rani , Indra , Andi (kiri→kanan). Maka jawabannya Lina.","tag":"Concept","level":1,"_section":"logic"},{"id":15,"question":"Andi is heavier than Nina.\nTono is heavier than Maya.\nNina is heavier than Tono.\nCici is heavier than Andi.\nBased on these statements, who is the heaviest?","question_id":"Andi lebih berat dari Nina.\nTono lebih berat dari Maya.\nNina lebih berat dari Tono.\nCici lebih berat dari Andi.\nBerdasarkan pernyataan di atas, siapa yang paling berat?","options":["Cici","Nina","Tono","Maya"],"correct":0,"explanation":"Ordering from heaviest to lightest: Cici > Andi > Nina > Tono > Maya. So the answer is Cici.","explanation_id":"Urutan dari paling berat ke paling ringan: Cici > Andi > Nina > Tono > Maya. Jadi jawabannya Cici.","tag":"Concept","level":1,"_section":"logic"},{"id":16,"question":"Dewi is the brother of Budi. Budi is the father of Cici.\nHow is Dewi related to Cici?","question_id":"Dewi saudara laki-laki Budi. Budi ayah dari Cici.\nApa hubungan Dewi terhadap Cici?","options":["Father","Uncle","Grandfather","Nephew"],"correct":1,"explanation":"Dewi is the brother of Cici's father, so Dewi is Cici's uncle.","explanation_id":"Dewi saudara laki-laki dari ayahnya Cici, jadi Dewi paman Cici.","options_id":["Ayah","Paman","Kakek","Keponakan laki-laki"],"tag":"Concept","level":1,"_section":"logic"},{"id":17,"question":"From home you walk 9 km South, then 3 km West.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 9 km ke Selatan, lalu 3 km ke Barat.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["North-East / Utara-Timur","South-East / Selatan-Timur","North-West / Utara-Barat","South-West / Selatan-Barat"],"correct":3,"explanation":"Going South and West places you in the South-West quadrant relative to home.","explanation_id":"Bergerak ke Selatan dan Barat menempatkanmu di kuadran Selatan-Barat dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":18,"question":"From home you walk 7 km North, then 3 km East.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 7 km ke Utara, lalu 3 km ke Timur.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["North-West / Utara-Barat","South-West / Selatan-Barat","North-East / Utara-Timur","South-East / Selatan-Timur"],"correct":2,"explanation":"Going North and East places you in the North-East quadrant relative to home.","explanation_id":"Bergerak ke Utara dan Timur menempatkanmu di kuadran Utara-Timur dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":19,"question":"Which one does NOT belong?\n2, 4, 8, 11","question_id":"Mana yang TIDAK termasuk kelompoknya?\n2, 4, 8, 11","options":["8","4","2","11"],"correct":3,"explanation":"11 is odd; the others are even.","explanation_id":"11 ganjil; yang lain genap.","tag":"Concept","level":1,"_section":"logic"},{"id":20,"question":"In a code language, HEART is written as MJFWY.\nHow is DOG written?","question_id":"Dalam suatu bahasa sandi, HEART ditulis MJFWY.\nBagaimana DOG ditulis?","options":["ITL","JUM","HSK","KVN"],"correct":0,"explanation":"Each letter moves 5 step(s) forward in the alphabet (wrapping around). Applying the same shift to DOG gives ITL.","explanation_id":"Setiap huruf bergeser 5 langkah maju di alfabet (memutar). Menerapkan geseran yang sama pada DOG menghasilkan ITL.","tag":"Concept","level":1,"_section":"logic"},{"id":21,"question":"Dewi is heavier than Andi.\nOki is heavier than Dewi.\nEka is heavier than Joko.\nAndi is heavier than Eka.\nBased on these statements, who is the lightest?","question_id":"Dewi lebih berat dari Andi.\nOki lebih berat dari Dewi.\nEka lebih berat dari Joko.\nAndi lebih berat dari Eka.\nBerdasarkan pernyataan di atas, siapa yang paling ringan?","options":["Joko","Andi","Eka","Oki"],"correct":0,"explanation":"Ordering from heaviest to lightest: Oki > Dewi > Andi > Eka > Joko. So the answer is Joko.","explanation_id":"Urutan dari paling berat ke paling ringan: Oki > Dewi > Andi > Eka > Joko. Jadi jawabannya Joko.","tag":"Concept","level":1,"_section":"logic"},{"id":22,"question":"Which one does NOT belong?\n10, 8, 14, 11","question_id":"Mana yang TIDAK termasuk kelompoknya?\n10, 8, 14, 11","options":["11","8","14","10"],"correct":0,"explanation":"11 is odd; the others are even.","explanation_id":"11 ganjil; yang lain genap.","tag":"Concept","level":1,"_section":"logic"},{"id":23,"question":"What number continues the series?\n1, 4, 9, 16, 25, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n1, 4, 9, 16, 25, ?","options":["61","47","42","36"],"correct":3,"explanation":"Perfect squares n². 6² = 36.","explanation_id":"Bilangan kuadrat n². 6² = 36.","tag":"Concept","level":1,"_section":"logic"},{"id":24,"question":"Andi is heavier than Joko.\nFani is heavier than Andi.\nPutri is heavier than Lina.\nLina is "Dari rumah kamu berjalan 6 km ke Utara, lalu 9 km ke Timur.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["South-East / Selatan-Timur","North-East / Utara-Timur","South-West / Selatan-Barat","North-West / Utara-Barat"],"correct":1,"explanation":"Going North and East places you in the North-East quadrant relative to home.","explanation_id":"Bergerak ke Utara dan Timur menempatkanmu di kuadran Utara-Timur dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":82,"question":"Which one does NOT belong?\n8, 2, 12, 9","question_id":"Mana yang TIDAK termasuk kelompoknya?\n8, 2, 12, 9","options":["9","2","8","12"],"correct":0,"explanation":"9 is odd; the others are even.","explanation_id":"9 ganjil; yang lain genap.","tag":"Concept","level":1,"_section":"logic"},{"id":83,"question":"Cici is faster than Hadi.\nBudi is faster than Fani.\nHadi is faster than Budi.\nBased on these statements, who is the 2nd fastest?","question_id":"Cici lebih cepat dari Hadi.\nBudi lebih cepat dari Fani.\nHadi lebih cepat dari Budi.\nBerdasarkan pernyataan di atas, siapa yang ke-2 paling cepat?","options":["Hadi","Budi","Cici","Fani"],"correct":0,"explanation":"Ordering from fastest to slowest: Cici > Hadi > Budi > Fani. So the answer is Hadi.","explanation_id":"Urutan dari paling cepat ke paling lambat: Cici > Hadi > Budi > Fani. Jadi jawabannya Hadi.","tag":"Concept","level":1,"_section":"logic"},{"id":84,"question":"4 people sit in a row (left to right):\nPutri sits somewhere to the left of Hadi.\nThere are exactly 1 person(s) between Hadi and Indra.\nIndra sits at the far right.\nBased on the clues, who sits in position 1 from the left?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nPutri duduk di suatu posisi sebelah kiri Hadi.\nAda tepat 1 orang di antara Hadi dan Indra.\nIndra duduk paling kanan.\nBerdasarkan petunjuk, siapa yang duduk di posisi 1 dari kiri?","options":["Hadi","Indra","Putri","Joko"],"correct":2,"explanation":"The only g":"Concept","level":1,"_section":"logic"},{"id":88,"question":"In a code language, PLANT is written as TPERX.\nHow is STONE written?","question_id":"Dalam suatu bahasa sandi, PLANT ditulis TPERX.\nBagaimana STONE ditulis?","options":["XYTSJ","YZUTK","VWRQH","WXSRI"],"correct":3,"explanation":"Each letter moves 4 step(s) forward in the alphabet (wrapping around). Applying the same shift to STONE gives WXSRI.","explanation_id":"Setiap huruf bergeser 4 langkah maju di alfabet (memutar). Menerapkan geseran yang sama pada STONE menghasilkan WXSRI.","tag":"Concept","level":1,"_section":"logic"},{"id":89,"question":"In a code language, MONEY is written as KMLCW.\nHow is STONE written?","question_id":"Dalam suatu bahasa sandi, MONEY ditulis KMLCW.\nBagaimana STONE ditulis?","options":["STONE","PQLKB","QRMLC","RSNMD"],"correct":2,"explanation":"Each letter moves 2 step(s) backward in the alphabet (wrapping around). Applying the same shift to STONE gives QRMLC.","explanation_id":"Setiap huruf bergeser 2 langkah mundur di alfabet (memutar). Menerapkan geseran yang sama pada STONE menghasilkan QRMLC.","tag":"Concept","level":1,"_section":"logic"},{"id":90,"question":"What number continues the series?\n1, 2, 4, 8, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n1, 2, 4, 8, ?","options":["18","16","32","24"],"correct":1,"explanation":"Each term × 2 (geometric). 8 × 2 = 16.","explanation_id":"Tiap suku × 2 (geometri). 8 × 2 = 16.","tag":"Concept","level":1,"_section":"logic"},{"id":91,"question":"5 people sit in a row (left to right):\nRani sits at the far left.\nBudi sits somewhere to the left of Andi.\nRani sits somewhere to the left of Budi.\nVina sits immediately to the left of Hadi.\nVina sits exactly in the middle.\nBased on the clues, who sits immediately to the right of Vina?","question_id":"5 orang duduk dalam satu baris (kiri ke kanan):\nRani duduk paling kiri.\nBudi duduk di suatu posisi sebelah kiri Andi.\nRani duduk di suatu posisi sebelah kiri Budi.\nVina duduk tepat di sebelah kiri Hadi.\nVina duduk tepat di tengah.\nBerdasarkan petunjuk, siapa yang duduk tepat di sebelah kanan Vina?","options":["Budi","Hadi","Vina","Rani"],"correct":1,"explanation":"The only seating that fits every clue is: Rani , Budi , Vina , Hadi , Andi (left→right). Therefore the answer is Hadi.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Rani , Budi , Vina , Hadi , Andi (kiri→kanan). Maka jawabannya Hadi.","tag":"Concept","level":1,"_section":"logic"},{"id":92,"question":"Dewi is older than Putri.\nMaya is older than Eka.\nNina is older than Maya.\nEka is older than Dewi.\nBased on these statements, who is the youngest?","question_id":"Dewi lebih tua dari Putri.\nMaya lebih tua dari Eka.\nNina lebih tua dari Maya.\nEka lebih tua dari Dewi.\nBerdasarkan pernyataan di atas, siapa yang paling muda?","options":["Maya","Eka","Nina","Putri"],"correct":3,"explanation":"Ordering from oldest to youngest: Nina > Maya > Eka > Dewi > Putri. So the answer is Putri.","explanation_id":"Urutan dari paling tua ke paling muda: Nina > Maya > Eka > Dewi > Putri. Jadi jawabannya Putri.","tag":"Concept","level":1,"_section":"logic"},{"id":93,"question":"Karin is richer than Lina.\nLina is richer than Eka.\nIndra is richer than Hadi.\nHadi is richer than Karin.\nBased on these statements, who is the richest?","question_id":"Karin lebih kaya dari Lina.\nLina lebih kaya dari Eka.\nIndra lebih kaya dari Hadi.\nHadi lebih kaya dari Karin.\nBerdasarkan pernyataan di atas, siapa yang paling kaya?","options":["Eka","Hadi","Indra","Lina"],"correct":2,"explanation":"Ordering from richest to poorest: Indra > Hadi > Karin > Lina > Eka. So the answer is Indra.","explanation_id":"Urutan dari paling kaya ke paling miskin: Indra > Hadi > Karin > Lina > Eka. Jadi jawabannya Indra.","tag":"Concept","level":1,"_section":"logic"},{"id":94,"question":"From home you walk 3 km North, then 3 km West.\nIn which overall direction are you now from home?","question  only seating that fits every clue is: Sani , Lina , Andi , Maya (left→right). Therefore the answer is Sani.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Sani , Lina , Andi , Maya (kiri→kanan). Maka jawabannya Sani.","tag":"Concept","level":1,"_section":"logic"},{"id":101,"question":"In a code language, CODE is written as AMBC.\nHow is APPLE written?","question_id":"Dalam suatu bahasa sandi, CODE ditulis AMBC.\nBagaimana APPLE ditulis?","options":["APPLE","ZOOKD","YNNJC","XMMIB"],"correct":2,"explanation":"Each letter moves 2 step(s) backward in the alphabet (wrapping around). Applying the same shift to APPLE gives YNNJC.","explanation_id":"Setiap huruf bergeser 2 langkah mundur di alfabet (memutar). Menerapkan geseran yang sama pada APPLE menghasilkan YNNJC.","tag":"Concept","level":1,"_section":"logic"},{"id":102,"question":"4 people sit in a row (left to right):\nThere are exactly 1 person(s) between Karin and Gita.\nKarin sits at the far left.\nThere are exactly 1 person(s) between Oki and Indra.\nKarin sits somewhere to the left of Oki.\nThere are exactly 2 person(s) between Karin and Oki.\nBased on the clues, who sits immediately to the right of Karin?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nAda tepat 1 orang di antara Karin dan Gita.\nKarin duduk paling kiri.\nAda tepat 1 orang di antara Oki dan Indra.\nKarin duduk di suatu posisi sebelah kiri Oki.\nAda tepat 2 orang di antara Karin dan Oki.\nBerdasarkan petunjuk, siapa yang duduk tepat di sebelah kanan Karin?","options":["Karin","Indra","Gita","Oki"],"correct":1,"explanation":"The only seating that fits every clue is: Karin , Indra , Gita , Oki (left→right). Therefore the answer is Indra.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Karin , Indra , Gita , Oki (kiri→kanan). Maka jawabannya Indra.","tag":"Concept","level":1,"_section":"logic"},{"id":103,"question":"From home you walk 9 km South, then 6 km West.\nIn which overall directi i ibu dari Andi.\nApa hubungan Lina terhadap Andi?","options":["Aunt","Grandfather","Father","Grandmother"],"correct":0,"explanation":"Lina is the sister of Andi's mother, so Lina is Andi's aunt.","explanation_id":"Lina saudara perempuan dari ibunya Andi, jadi Lina bibi Andi.","options_id":["Bibi","Kakek","Ayah","Nenek"],"tag":"Concept","level":1,"_section":"logic"},{"id":142,"question":"In a code language, STONE is written as XYTSJ.\nHow is SUN written?","question_id":"Dalam suatu bahasa sandi, STONE ditulis XYTSJ.\nBagaimana SUN ditulis?","options":["ZBU","YAT","WYR","XZS"],"correct":3,"explanation":"Each letter moves 5 step(s) forward in the alphabet (wrapping around). Applying the same shift to SUN gives XZS.","explanation_id":"Setiap huruf bergeser 5 langkah maju di alfabet (memutar). Menerapkan geseran yang sama pada SUN menghasilkan XZS.","tag":"Concept","level":1,"_section":"logic"},{"id":143,"question":"In a code language, MUSIC is written as QYWMG.\nHow is CLOUD written?","question_id":"Dalam suatu bahasa sandi, MUSIC ditulis QYWMG.\nBagaimana CLOUD ditulis?","options":["GPSYH","HQTZI","IRUAJ","FORXG"],"correct":0,"explanation":"Each letter moves 4 step(s) forward in the alphabet (wrapping around). Applying the same shift to CLOUD gives GPSYH.","explanation_id":"Setiap huruf bergeser 4 langkah maju di alfabet (memutar). Menerapkan geseran yang sama pada CLOUD menghasilkan GPSYH.","tag":"Concept","level":1,"_section":"logic"},{"id":144,"question":"Which one does NOT belong?\n29, 5, 2, 6","question_id":"Mana yang TIDAK termasuk kelompoknya?\n29, 5, 2, 6","options":["6","2","29","5"],"correct":0,"explanation":"6 is composite; the others are prime numbers.","explanation_id":"6 bilangan komposit; yang lain prima.","tag":"Concept","level":1,"_section":"logic"},{"id":145,"question":"From home you walk 3 km North, then 8 km East.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 3 km ke Utara, lalu 8 km ke Timur.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["South-East / Selatan-Timur","South-West / Selatan-Barat","North-East / Utara-Timur","North-West / Utara-Barat"],"correct":2,"explanation":"Going North and East places you in the North-East quadrant relative to home.","explanation_id":"Bergerak ke Utara dan Timur menempatkanmu di kuadran Utara-Timur dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":146,"question":"You walk 12 km North, then turn and walk 16 km East.\nHow far are you from the starting point (straight line)?","question_id":"Kamu berjalan 12 km ke Utara, lalu berbelok dan berjalan 16 km ke Timur.\nBerapa jarak lurus kamu dari titik awal?","options":["28 km","20 km","21 km","4 km"],"correct":1,"explanation":"North 12 and East 16 are perpendicular. Straight distance = √(12²+16²) = √400 = 20 km.","explanation_id":"Utara 12 dan Timur 16 saling tegak lurus. Jarak lurus = √(12²+16²) = √400 = 20 km.","tag":"Concept","level":1,"_section":"logic"},{"id":147,"question":"Putri is richer than Rani.\nLina is richer than Putri.\nSani is richer than Andi.\nAndi is richer than Lina.\nBased on these statements, who is the richest?","question_id":"Putri lebih kaya dari Rani.\nLina lebih kaya dari Putri.\nSani lebih kaya dari Andi.\nAndi lebih kaya dari Lina.\nBerdasarkan pernyataan di atas, siapa yang paling kaya?","options":["Rani","Sani","Lina","Andi"],"correct":1,"explanation":"Ordering from richest to poorest: Sani > Andi > Lina > Putri > Rani. So the answer is Sani.","explanation_id":"Urutan dari paling kaya ke paling miskin: Sani > Andi > Lina > Putri > Rani. Jadi jawabannya Sani.","tag":"Concept","level":1,"_section":"logic"},{"id":148,"question":"What number continues the series?\n1, 22, 5, 24, 9, 26, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n1, 22, 5, 24, 9, 26, ?","options":["14","13","41","17"],"correct":1,"explanation":"Two interleaved patterns. Odd spots +4, even spots +2. Next continues odd: 9+4=13.","explanation_i rempuan"],"tag":"Concept","level":1,"_section":"logic"},{"id":152,"question":"What number continues the series?\n1, 18, 3, 15, 5, 12, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n1, 18, 3, 15, 5, 12, ?","options":["8","7","9","16"],"correct":1,"explanation":"Two interleaved patterns. Odd spots +2, even spots -3. Next continues odd: 5+2=7.","explanation_id":"Dua pola berselang-seling. Posisi ganjil +2, genap -3. Berikutnya pola ganjil: 5+2=7.","tag":"Concept","level":1,"_section":"logic"},{"id":153,"question":"Which one does NOT belong?\n12, 4, 6, 5","question_id":"Mana yang TIDAK termasuk kelompoknya?\n12, 4, 6, 5","options":["5","4","12","6"],"correct":0,"explanation":"5 is odd; the others are even.","explanation_id":"5 ganjil; yang lain genap.","tag":"Concept","level":1,"_section":"logic"},{"id":154,"question":"What number continues the series?\n4, 8, 16, 32, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n4, 8, 16, 32, ?","options":["66","96","72","64"],"correct":3,"explanation":"Each term × 2 (geometric). 32 × 2 = 64.","explanation_id":"Tiap suku × 2 (geometri). 32 × 2 = 64.","tag":"Concept","level":1,"_section":"logic"},{"id":155,"question":"4 people sit in a row (left to right):\nTono sits at the far left.\nTono sits immediately to the left of Nina.\nLina sits at the far right.\nBased on the clues, who sits immediately to the right of Tono?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nTono duduk paling kiri.\nTono duduk tepat di sebelah kiri Nina.\nLina duduk paling kanan.\nBerdasarkan petunjuk, siapa yang duduk tepat di sebelah kanan Tono?","options":["Putri","Tono","Nina","Lina"],"correct":2,"explanation":"The only seating that fits every clue is: Tono , Nina , Putri , Lina (left→right). Therefore the answer is Nina.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Tono , Nina , Putri , Lina (kiri→kanan). Maka jawabannya Nina.","tag":"Concept","level":1,"_section":"logic"},{"id":156,"question":"What number continues the series?\n6, 5, 11, 16, 27, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n6, 5, 11, 16, 27, ?","options":["70","59","44","43"],"correct":3,"explanation":"Each term is the sum of the previous two. 16 + 27 = 43.","explanation_id":"Tiap suku = jumlah dua suku sebelumnya. 16 + 27 = 43.","tag":"Concept","level":1,"_section":"logic"},{"id":157,"question":"What number continues the series?\n-4, 3, 10, 17, 24, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n-4, 3, 10, 17, 24, ?","options":["38","31","24","45"],"correct":1,"explanation":"Constant difference of 7 each step (arithmetic). 24 + (7) = 31.","explanation_id":"Selisih tetap 7 tiap langkah (aritmetika). 24 + (7) = 31.","tag":"Concept","level":1,"_section":"logic"},{"id":158,"question":"From home you walk 2 km North, then 4 km West.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 2 km ke Utara, lalu 4 km ke Barat.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["South-East / Selatan-Timur","North-West / Utara-Barat","North-East / Utara-Timur","South-West / Selatan-Barat"],"correct":1,"explanation":"Going North and West places you in the North-West quadrant relative to home.","explanation_id":"Bergerak ke Utara dan Barat menempatkanmu di kuadran Utara-Barat dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":159,"question":"From home you walk 9 km North, then 2 km East.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 9 km ke Utara, lalu 2 km ke Timur.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["North-East / Utara-Timur","South-East / Selatan-Timur","North-West / Utara-Barat","South-West / Selatan-Barat"],"correct":0,"explanation":"Going North and East places you in the North-East quadrant relative to home.","explanation_id":"Bergerak ke Utara dan Timur menempatkanmu di kuadran Utara-Timur dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":160,"question":"Which one does NOT belong?\n8, 6, 10, 11","question_id":"Mana yang TIDAK termasuk kelompoknya?\n8, 6, 10, 11","options":["8","10","11","6"],"correct":2,"explanation":"11 is odd; the others are even.","explanation_id":"11 ganjil; yang lain genap.","tag":"Concept","level":1,"_section":"logic"},{"id":161,"question":"4 people sit in a row (left to right):\nMaya sits at the far right.\nTono sits at the far left.\nThere are exactly 1 person(s) between Budi and Maya.\nBased on the clues, who sits immediately to the right of Budi?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nMaya duduk paling kanan.\nTono duduk paling kiri.\nAda tepat 1 orang di antara Budi dan Maya.\nBerdasarkan petunjuk, siapa yang duduk tepat di sebelah kanan Budi?","options":["Budi","Maya","Tono","Sani"],"correct":3,"explanation":"The only seating that fits every clue is: Tono , Budi , Sani , Maya (left→right). Therefore the answer is Sani.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Tono , Budi , Sani , Maya (kiri→kanan). Maka jawabannya Sani.","tag":"Concept","level":1,"_section":"logic"},{"id":162,"question":"4 people sit in a row (left to right):\nThere are exactly 2 person(s) between Tono and Maya.\nJoko sits somewhere to the left of Fani.\nFani sits somewhere to the left of Maya.\nBased on the clues, who sits immediately to the right of Joko?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nAda tepat 2 orang di antara Tono dan Maya.\nJoko duduk di suatu posisi sebelah kiri Fani.\nFani duduk di suatu posisi sebelah kiri Maya.\nBerdasarkan petunjuk, siapa yang duduk tepat di sebelah kanan Joko?","options":["Fani","Joko","Tono","Maya"],"correct":0,"explanation":"The only seating that fits every clue is: Tono , Joko , Fani , Maya (left→right). Therefore the answer is Fani.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Tono , Joko , Fani , Maya (kiri→kanan). Maka jawabannya Fani.","tag":"Concept","level":1,"_section":"logic"},{"id":163,"question":"What number continues the series?\n3, 5, 8, 13, 21, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n3, 5, 8, 13, 21, ?","options":["55","35","47","34"],"correct":3,"explanation":"Each term is the sum of the previous two. 13 + 21 = 34.","explanation_id":"Tiap suku = jumlah dua suku sebelumnya. 13 + 21 = 34.","tag":"Concept","level":1,"_section":"logic"},{"id":164,"question":"What number continues the series?\n5, 18, 9, 16, 13, 14, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n5, 18, 9, 16, 13, 14, ?","options":["21","18","29","17"],"correct":3,"explanation":"Two interleaved patterns. Odd spots +4, even spots -2. Next continues odd: 13+4=17.","explanation_id":"Dua pola berselang-seling. Posisi ganjil +4, genap -2. Berikutnya pola ganjil: 13+4=17.","tag":"Concept","level":1,"_section":"logic"},{"id":165,"question":"4 people sit in a row (left to right):\nLina sits somewhere to the left of Hadi.\nNina sits at the far left.\nNina sits somewhere to the left of Hadi.\nFani sits at the far right.\nBased on the clues, who sits immediately to the right of Hadi?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nLina duduk di suatu posisi sebelah kiri Hadi.\nNina duduk paling kiri.\nNina duduk di suatu posisi sebelah kiri Hadi.\nFani duduk paling kanan.\nBerdasarkan petunjuk, siapa yang duduk tepat di sebelah kanan Hadi?","options":["Fani","Nina","Lina","Hadi"],"correct":0,"explanation":"The only seating that fits every clue is: Nina , Lina , Hadi , Fani (left→right). Therefore the answer is Fani.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Nina , Lina , Hadi , Fani (kiri→kanan). Maka jawabannya Fani.","tag":"Concept","level":1,"_section":"logic"},{"id":166,"question":"Eka is taller than Budi.\nKarin is taller than Eka.\nGita is taller than Karin.\nCici is taller than Gita.\nBased on these statements, who is the shortest?","question_id":"Eka lebih tinggi dari Budi.\nKarin lebih tinggi dari Eka.\nGita lebih tinggi dari Karin.\nCici lebih tinggi dari Gita.\nBerdasarkan pernyataan di atas, siapa yang paling pendek?","options":["Budi","Eka","Cici","Gita"],"correct":0,"explanation":"Ordering from tallest to shortest: Cici > Gita > Karin > Eka > Budi. So the answer is Budi.","explanation_id":"Urutan dari paling tinggi ke paling pendek: Cici > Gita > Karin > Eka > Budi. Jadi jawabannya Budi.","tag":"Concept","level":1,"_section":"logic"},{"id":167,"question":"What number continues the series?\n16, 27, 38, 49, 60, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n16, 27, 38, 49, 60, ?","options":["60","82","71","93"],"correct":2,"explanation":"Constant difference of 11 each step (arithmetic). 60 + (11) = 71.","explanation_id":"Selisih tetap 11 tiap langkah (aritmetika). 60 + (11) = 71.","tag":"Concept","level":1,"_section":"logic"},{"id":168,"question":"In a code language, APPLE is written as ETTPI.\nHow is DOG written?","question_id":"Dalam suatu bahasa sandi, APPLE ditulis ETTPI.\nBagaimana DOG ditulis?","options":["GRJ","HSK","ITL","JUM"],"correct":1,"explanation":"Each letter moves 4 step(s) forward in the alphabet (wrapping around). Applying the same shift to DOG gives HSK.","explanation_id":"Setiap huruf bergeser 4 langkah maju di alfabet (memutar). Menerapkan geseran yang sama pada DOG menghasilkan HSK.","tag":"Concept","level":1,"_section":"logic"},{"id":169,"question":"Andi is taller than Cici.\nHadi is taller than Andi.\nCici is taller than Budi.\nIndra is taller than Hadi.\nBased on these statements, who is the tallest?","question_id":"Andi lebih tinggi dari Cici.\nHadi lebih tinggi dari Andi.\nCici lebih tinggi dari Budi.\nIndra lebih tinggi dari Hadi.\nBerdasarkan pernyataan di atas, siapa yang paling tinggi?","options":["Indra","Budi","Andi","Cici"],"correct":0,"explanation":"Ordering from tallest to shortest: Indra > Hadi > Andi > Cici > Budi. So the answer is Indra.","explana ely to the left of Eka.\nBased on the clues, who sits at the far left?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nFani duduk di suatu posisi sebelah kiri Karin.\nLina duduk tepat di sebelah kiri Fani.\nLina duduk paling kiri.\nKarin duduk tepat di sebelah kiri Eka.\nBerdasarkan petunjuk, siapa yang duduk paling kiri?","options":["Karin","Eka","Lina","Fani"],"correct":2,"explanation":"The only seating that fits every clue is: Lina , Fani , Karin , Eka (left→right). Therefore the answer is Lina.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Lina , Fani , Karin , Eka (kiri→kanan). Maka jawabannya Lina.","tag":"Concept","level":1,"_section":"logic"},{"id":175,"question":"Which one does NOT belong?\n5, 9, 2, 17","question_id":"Mana yang TIDAK termasuk kelompoknya?\n5, 9, 2, 17","options":["5","9","17","2"],"correct":1,"explanation":"9 is composite; the others are prime numbers.","explanation_id":"9 bilangan komposit; yang lain prima.","tag":"Concept","level":1,"_section":"logic"},{"id":176,"question":"What number continues the series?\n8, 10, 12, 14, 16, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n8, 10, 12, 14, 16, ?","options":["16","22","18","20"],"correct":2,"explanation":"Constant difference of 2 each step (arithmetic). 16 + (2) = 18.","explanation_id":"Selisih tetap 2 tiap langkah (aritmetika). 16 + (2) = 18.","tag":"Concept","level":1,"_section":"logic"},{"id":177,"question":"Some cats are mammals.\nAll mammals are animals.\nWhich conclusion is certainly true?","question_id":"Sebagian kucing adalah mamalia.\nSemua mamalia adalah hewan.\nKesimpulan mana yang pasti benar?","options":["Some cats are animals.","No cats are animals.","All cats are animals.","All animals are cats."],"correct":0,"explanation":"At least some cats are mammals, and all mammals are animals, so those cats are also animals: 'some cats are animals' holds. We cannot say ALL.","explanation_id":"Setidaknya sebagian kucing adalah mamalia imur","North-East / Utara-Timur","North-West / Utara-Barat","South-West / Selatan-Barat"],"correct":2,"explanation":"Going North and West places you in the North-West quadrant relative to home.","explanation_id":"Bergerak ke Utara dan Barat menempatkanmu di kuadran Utara-Barat dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":269,"question":"Vina is faster than Maya.\nIndra is faster than Joko.\nMaya is faster than Eka.\nEka is faster than Indra.\nBased on these statements, who is the fastest?","question_id":"Vina lebih cepat dari Maya.\nIndra lebih cepat dari Joko.\nMaya lebih cepat dari Eka.\nEka lebih cepat dari Indra.\nBerdasarkan pernyataan di atas, siapa yang paling cepat?","options":["Vina","Joko","Eka","Indra"],"correct":0,"explanation":"Ordering from fastest to slowest: Vina > Maya > Eka > Indra > Joko. So the answer is Vina.","explanation_id":"Urutan dari paling cepat ke paling lambat: Vina > Maya > Eka > Indra > Joko. Jadi jawabannya Vina.","tag":"Concept","level":1,"_section":"logic"},{"id":270,"question":"Cici is the father of Karin. Karin is the father of Gita.\nHow is Cici related to Gita?","question_id":"Cici ayah dari Karin. Karin ayah dari Gita.\nApa hubungan Cici terhadap Gita?","options":["Grandfather","Father","Cousin","Niece"],"correct":0,"explanation":"Cici is the father of Gita's father, so Cici is Gita's grandfather.","explanation_id":"Cici adalah ayah dari ayahnya Gita, jadi Cici kakek Gita.","options_id":["Kakek","Ayah","Sepupu","Keponakan perempuan"],"tag":"Concept","level":1,"_section":"logic"},{"id":271,"question":"Dewi is the mother of Oki. Oki is the mother of Hadi.\nHow is Dewi related to Hadi?","question_id":"Dewi ibu dari Oki. Oki ibu dari Hadi.\nApa hubungan Dewi terhadap Hadi?","options":["Niece","Father","Grandmother","Grandfather"],"correct":2,"explanation":"Dewi is the mother of Hadi's mother, so Dewi is Hadi's grandmother.","explanation_id":"Dewi adalah ibu dari ibunya Hadi, jadi Dewi nenek Hadi.","options_id":["Keponakan perempuan","Ayah","Nenek","Kakek"],"tag":"Concept","level":1,"_section":"logic"},{"id":272,"question":"From home you walk 7 km North, then 7 km West.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 7 km ke Utara, lalu 7 km ke Barat.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["North-West / Utara-Barat","North-East / Utara-Timur","South-East / Selatan-Timur","South-West / Selatan-Barat"],"correct":0,"explanation":"Going North and West places you in the North-West quadrant relative to home.","explanation_id":"Bergerak ke Utara dan Barat menempatkanmu di kuadran Utara-Barat dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":273,"question":"5 people sit in a row (left to right):\nThere are exactly 1 person(s) between Hadi and Maya.\nHadi sits exactly in the middle.\nGita sits immediately to the left of Hadi.\nBudi sits somewhere to the left of Maya.\nThere are exactly 3 person(s) between Maya and Budi.\nBased on the clues, who sits immediately to the right of Joko?","question_id":"5 orang duduk dalam satu baris (kiri ke kanan):\nAda tepat 1 orang di antara Hadi dan Maya.\nHadi duduk tepat di tengah.\nGita duduk tepat di sebelah kiri Hadi.\nBudi duduk di suatu posisi sebelah kiri Maya.\nAda tepat 3 orang di antara Maya dan Budi.\nBerdasarkan petunjuk, siapa yang duduk tepat di sebelah kanan Joko?","options":["Gita","Hadi","Maya","Joko"],"correct":2,"explanation":"The only seating that fits every clue is: Budi , Gita , Hadi , Joko , Maya (left→right). Therefore the answer is Maya.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Budi , Gita , Hadi , Joko , Maya (kiri→kanan). Maka jawabannya Maya.","tag":"Concept","level":1,"_section":"logic"},{"id":274,"question":"From home you walk 3 km South, then 7 km East.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 3 km ke Selatan, lalu 7 km ke Timur.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["South-West / Selatan-Barat","South-East / Selatan-Timur","North-West / Utara-Barat","North-East / Utara-Timur"],"correct":1,"explanation":"Going South and East places you in the South-East quadrant relative to home.","explanation_id":"Bergerak ke Selatan dan Timur menempatkanmu di kuadran Selatan-Timur dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":275,"question":"Oki is the daughter of Indra's grandfather. Oki is not Indra's mother.\nHow is Oki related to Indra?","question_id":"Oki anak perempuan dari kakeknya Indra. Oki bukan ibu Indra.\nApa hubungan Oki terhadap Indra?","options":["Father","Aunt","Uncle","Grandmother"],"correct":1,"explanation":"Oki is a child of Indra's grandfather (so a sibling of Indra's parent) — that makes Oki Indra's aunt.","explanation_id":"Oki anak dari kakeknya Indra (jadi saudara dari orang tua Indra) — maka Oki bibi Indra.","options_id":["Ayah","Bibi","Paman","Nenek"],"tag":"Concept","level":1,"_section":"logic"},{"id":276,"question":"5 people sit in a row (left to right):\nRani sits at the far right.\nThere are exactly 1 person(s) between Rani and Fani.\nHadi sits at the far left.\nThere are exactly 2 person(s) between Dewi and Hadi.\nBased on the clues, who sits in position 5 from the left?","question_id":"5 orang duduk dalam satu baris (kiri ke kanan):\nRani duduk paling kanan.\nAda tepat 1 orang di antara Rani dan Fani.\nHadi duduk paling kiri.\nAda tepat 2 orang di antara Dewi dan Hadi.\nBerdasarkan petunjuk, siapa yang duduk di posisi 5 dari kiri?","options":["Rani","Dewi","Fani","Sani"],"correct":0,"explanation":"The only seating that fits every clue is: Hadi , Sani , Fani , Dewi , Rani (left→right). Therefore the answer is Rani.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Hadi , Sani , Fani , Dewi , Rani (kiri→kanan). Maka jawabannya Rani.","tag":"Concept","level":1,"_section":"logic"},{"id":277,"question":"Fani is the daughter of Hadi. Hadi is the brother of Lina.\nHow is Fani related to Lina?","question_id":"Fani anak perempuan Hadi. Hadi saudara laki-laki Lina.\nApa hubungan Fani terhadap Lina?","options":["Nephew","Cousin","Niece","Father"],"correct":2,"explanation":"Fani is the daughter of Lina's brother, so Fani is Lina's niece.","explanation_id":"Fani anak perempuan dari saudara laki-lakinya Lina, jadi Fani keponakan perempuan Lina.","options_id":["Keponakan laki-laki","Sepupu","Keponakan perempuan","Ayah"],"tag":"Concept","level":1,"_section":"logic"},{"id":278,"question":"4 people sit in a row (left to right):\nLina sits somewhere to the left of Gita.\nLina sits somewhere to the left of Andi.\nRani sits immediately to the left of Andi.\nRani sits somewhere to the left of Andi.\nAndi sits at the far right.\nBased on the clues, who sits in position 2 from the left?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nLina duduk di suatu posisi sebelah kiri Gita.\nLina duduk di suatu posisi sebelah kiri Andi.\nRani duduk tepat di sebelah kiri Andi.\nRani duduk di suatu posisi sebelah kiri Andi.\nAndi duduk paling kanan.\nBerdasarkan petunjuk, siapa yang duduk di posisi 2 dari kiri?","options":["Rani","Andi","Gita","Lina"],"correct":2,"explanation":"The only seating that fits every clue is: Lina , Gita , Rani , Andi (left→right). Therefore the answer is Gita.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Lina , Gita , Rani , Andi (kiri→kanan). Maka jawabannya Gita.","tag":"Concept","level":1,"_section":"logic"},{"id":279,"question":"Joko is richer than Eka.\nKarin is richer than Joko.\nVina is richer than Karin.\nIndra is richer than Vina.\nBased on these statements, who is the poorest?","question_id":"Joko lebih kaya dari Eka.\nKarin lebih kaya dari Joko.\nVina lebih kaya dari Karin.\nIndra lebih kaya dari Vina.\nBerdasarkan pernyataan di atas, siapa yang paling miskin?","options":["Eka","Joko","Karin","Indra"],"correct":0,"explanation":"Ordering from richest to poorest: Indra > Vina > Karin > Joko > Eka. So the answer is Eka.","explanation_id":"Urutan dari paling kaya ke paling miskin: Indra > Vina > Karin > Joko > Eka. Jadi jawabannya Eka.","tag":"Concept","level":1,"_section":"logic"},{"id":280,"question":"In a code language, STONE is written as XYTSJ.\nHow is CLOUD written?","question_id":"Dalam suatu bahasa sandi, STONE ditulis XYTSJ.\nBagaimana CLOUD ditulis?","options":["IRUAJ","HQTZI","JSVBK","GPSYH"],"correct":1,"explanation":"Each letter moves 5 step(s) forward in the alphabet (wrapping around). Applying the same shift to CLOUD gives HQTZI.","explanation_id":"Setiap huruf bergeser 5 langkah maju di alfabet (memutar). Menerapkan geseran yang sama pada CLOUD menghasilkan HQTZI.","tag":"Concept","level":1,"_section":"logic"},{"id":281,"question":"In a code language, SUN is written as RTM.\nHow is TABLE written?","question_id":"Dalam suatu bahasa sandi, SUN ditulis RTM.\nBagaimana TABLE ditulis?","options":["SZAKD","RYZJC","UBCMF","TABLE"],"correct":0,"explanation":"Each letter moves 1 step(s) backward in the alphabet (wrapping around). Applying the same shift to TABLE gives SZAKD.","explanation_id":"Setiap huruf bergeser 1 langkah mundur di alfabet (memutar). Menerapkan geseran yang sama pada TABLE menghasilkan SZAKD.","tag":"Concept","level":1,"_section":"logic"},{"id":282,"question":"From home you walk 7 km North, then 5 km East.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 7 km ke Utara, lalu 5 km ke Timur.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["North-East / Utara-Timur","South-East / Selatan-Timur","North-West / Utara-Barat","South-West / Selatan-Barat"],"correct":0,"explanation":"Going North and East places you in the North-East quadrant relative to home.","explanation_id":"Bergerak ke Utara dan Timur menempatkanmu di kuadran Utara-Timur dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":283,"question":"In a code language, BRAIN is written as DTCKP.\nHow is BREAD written?","question_id":"Dalam suatu bahasa sandi, BRAIN ditulis DTCKP.\nBagaimana BREAD ditulis?","options":["CSFBE","FVIEH","EUHDG","DTGCF"],"correct":3,"explanation":"Each letter moves 2 step(s) forward in the alphabet (wrapping around). Applying the same shift to BREAD gives DTGCF.","explanation_id":"Setiap huruf bergeser 2 langkah maju di alfabet (memutar). Menerapkan geseran yang sama pada BREAD menghasilkan DTGCF.","tag":"Concept","level":1,"_section":"logic"},{"id":284,"question":"4 people sit in a row (left to right):\nThere are exactly 1 person(s) between Putri and Oki.\nPutri sits immediately to the left of Karin.\nPutri sits at the far left.\nBased on the clues, who sits in position 2 from the left?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nAda tepat 1 orang di antara Putri dan Oki.\nPutri duduk tepat di sebelah kiri Karin.\nPutri duduk paling kiri.\nBerdasarkan petunjuk, siapa yang duduk di posisi 2 dari kiri?","options":["Karin","Oki","Lina","Putri"],"correct":0,"explanation":"The only seating that fits every clue is: Putri , Karin , Oki , Lina (left→right). Therefore the answer is Karin.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Putri , Karin , Oki , Lina (kiri→kanan). Maka jawabannya Karin.","tag":"Concept","level":1,"_section":"logic"},{"id":285,"question":"In a code language, NIGHT is written as PKIJV.\nHow is SUN written?","question_id":"Dalam suatu bahasa sandi, NIGHT ditulis PKIJV.\nBagaimana SUN ditulis?","options":["TVO","WYR","VXQ","UWP"],"correct":3,"explanation":"Each letter moves 2 step(s) forward in the alphabet (wrapping around). Applying the same shift to SUN gives UWP.","explanation_id":"Setiap huruf bergeser 2 langkah maju di alfabet (memutar). Menerapkan geseran yang sama pada SUN menghasilkan UWP.","tag":"Concept","level":1,"_section":"logic"},{"id":286,"question":"Sani is heavier than Putri.\nOki is heavier than Budi.\nIndra is heav rest?","question_id":"Cici lebih kaya dari Maya.\nDewi lebih kaya dari Cici.\nFani lebih kaya dari Gita.\nGita lebih kaya dari Dewi.\nBerdasarkan pernyataan di atas, siapa yang paling miskin?","options":["Cici","Fani","Dewi","Maya"],"correct":3,"explanation":"Ordering from richest to poorest: Fani > Gita > Dewi > Cici > Maya. So the answer is Maya.","explanation_id":"Urutan dari paling kaya ke paling miskin: Fani > Gita > Dewi > Cici > Maya. Jadi jawabannya Maya.","tag":"Concept","level":1,"_section":"logic"},{"id":326,"question":"4 people sit in a row (left to right):\nPutri sits somewhere to the left of Nina.\nHadi sits somewhere to the left of Vina.\nNina sits somewhere to the left of Hadi.\nBased on the clues, who sits at the far right?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nPutri duduk di suatu posisi sebelah kiri Nina.\nHadi duduk di suatu posisi sebelah kiri Vina.\nNina duduk di suatu posisi sebelah kiri Hadi.\nBerdasarkan petunjuk, siapa yang duduk paling kanan?","options":["Nina","Vina","Putri","Hadi"],"correct":1,"explanation":"The only seating that fits every clue is: Putri , Nina , Hadi , Vina (left→right). Therefore the answer is Vina.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Putri , Nina , Hadi , Vina (kiri→kanan). Maka jawabannya Vina.","tag":"Concept","level":1,"_section":"logic"},{"id":327,"question":"What number continues the series?\n1, 27, 5, 24, 9, 21, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n1, 27, 5, 24, 9, 21, ?","options":["13","14","17","31"],"correct":0,"explanation":"Two interleaved patterns. Odd spots +4, even spots -3. Next continues odd: 9+4=13.","explanation_id":"Dua pola berselang-seling. Posisi ganjil +4, genap -3. Berikutnya pola ganjil: 9+4=13.","tag":"Concept","level":1,"_section":"logic"},{"id":328,"question":"In a code language, CAT is written as ECV.\nHow is CHAIR written?","question_id":"Dalam suatu bahasa sandi, CAT ditulis ECV.\nBagaimana CHAIR ditulis?","options":["GLEMV","DIBJS","EJCKT","FKDLU"],"correct":2,"explanation":"Each letter moves 2 step(s) forward in the alphabet (wrapping around). Applying the same shift to CHAIR gives EJCKT.","explanation_id":"Setiap huruf bergeser 2 langkah maju di alfabet (memutar). Menerapkan geseran yang sama pada CHAIR menghasilkan EJCKT.","tag":"Concept","level":1,"_section":"logic"},{"id":329,"question":"What number continues the series?\n6, 28, 9, 26, 12, 24, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n6, 28, 9, 26, 12, 24, ?","options":["16","37","18","15"],"correct":3,"explanation":"Two interleaved patterns. Odd spots +3, even spots -2. Next continues odd: 12+3=15.","explanation_id":"Dua pola berselang-seling. Posisi ganjil +3, genap -2. Berikutnya pola ganjil: 12+3=15.","tag":"Concept","level":1,"_section":"logic"},{"id":330,"question":"From home you walk 3 km North, then 5 km East.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 3 km ke Utara, lalu 5 km ke Timur.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["South-East / Selatan-Timur","North-East / Utara-Timur","South-West / Selatan-Barat","North-West / Utara-Barat"],"correct":1,"explanation":"Going North and East places you in the North-East quadrant relative to home.","explanation_id":"Bergerak ke Utara dan Timur menempatkanmu di kuadran Utara-Timur dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":331,"question":"Vina is the son of Eka. Eka is the sister of Putri.\nHow is Vina related to Putri?","question_id":"Vina anak laki-laki Eka. Eka saudara perempuan Putri.\nApa hubungan Vina terhadap Putri?","options":["Nephew","Aunt","Brother","Niece"],"correct":0,"explanation":"Vina is the son of Putri's sister, so Vina is Putri's nephew.","explanation_id":"Vina anak laki-laki dari saudara perempuannya Putri, jadi Vina keponakan Putri.","options_id":["Keponakan laki-laki","Bibi","Saudara laki-laki","Keponakan perempuan"],"tag" ight):\nSani sits immediately to the left of Gita.\nGita sits somewhere to the left of Rani.\nHadi sits somewhere to the left of Gita.\nBased on the clues, who sits at the far left?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nSani duduk tepat di sebelah kiri Gita.\nGita duduk di suatu posisi sebelah kiri Rani.\nHadi duduk di suatu posisi sebelah kiri Gita.\nBerdasarkan petunjuk, siapa yang duduk paling kiri?","options":["Gita","Sani","Rani","Hadi"],"correct":3,"explanation":"The only seating that fits every clue is: Hadi , Sani , Gita , Rani (left→right). Therefore the answer is Hadi.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Hadi , Sani , Gita , Rani (kiri→kanan). Maka jawabannya Hadi.","tag":"Concept","level":1,"_section":"logic"},{"id":388,"question":"4 people sit in a row (left to right):\nVina sits somewhere to the left of Fani.\nBudi sits at the far right.\nFani sits somewhere to the left of Dewi.\nBased on the clues, who sits immediately to the right of Fani?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nVina duduk di suatu posisi sebelah kiri Fani.\nBudi duduk paling kanan.\nFani duduk di suatu posisi sebelah kiri Dewi.\nBerdasarkan petunjuk, siapa yang duduk tepat di sebelah kanan Fani?","options":["Fani","Vina","Budi","Dewi"],"correct":3,"explanation":"The only seating that fits every clue is: Vina , Fani , Dewi , Budi (left→right). Therefore the answer is Dewi.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Vina , Fani , Dewi , Budi (kiri→kanan). Maka jawabannya Dewi.","tag":"Concept","level":1,"_section":"logic"},{"id":389,"question":"What number continues the series?\n7, 3, 10, 13, 23, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n7, 3, 10, 13, 23, ?","options":["59","37","49","36"],"correct":3,"explanation":"Each term is the sum of the previous two. 13 + 23 = 36.","explanation_id":"Tiap suku = jumlah dua suku sebelumnya. 13 + 23 = 36.","tag":"Concept","level":1,"_section":"logic"},{"id":390,"question":"What number continues the series?\n6, 29, 11, 26, 16, 23, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n6, 29, 11, 26, 16, 23, ?","options":["21","26","41","22"],"correct":0,"explanation":"Two interleaved patterns. Odd spots +5, even spots -3. Next continues odd: 16+5=21.","explanation_id":"Dua pola berselang-seling. Posisi ganjil +5, genap -3. Berikutnya pola ganjil: 16+5=21.","tag":"Concept","level":1,"_section":"logic"},{"id":391,"question":"In a code language, WATER is written as YCVGT.\nHow is NIGHT written?","question_id":"Dalam suatu bahasa sandi, WATER ditulis YCVGT.\nBagaimana NIGHT ditulis?","options":["OJHIU","RMKLX","QLJKW","PKIJV"],"correct":3,"explanation":"Each letter moves 2 step(s) forward in the alphabet (wrapping around). Applying the same shift to NIGHT gives PKIJV.","explanation_id":"Setiap huruf bergeser 2 langkah maju di alfabet (memutar). Menerapkan geseran yang sama pada NIGHT menghasilkan PKIJV.","tag":"Concept","level":1,"_section":"logic"},{"id":392,"question":"From home you walk 4 km South, then 3 km East.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 4 km ke Selatan, lalu 3 km ke Timur.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["South-West / Selatan-Barat","North-East / Utara-Timur","North-West / Utara-Barat","South-East / Selatan-Timur"],"correct":3,"explanation":"Going South and East places you in the South-East quadrant relative to home.","explanation_id":"Bergerak ke Selatan dan Timur menempatkanmu di kuadran Selatan-Timur dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":393,"question":"From home you walk 3 km South, then 6 km East.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 3 km ke Selatan, lalu 6 km ke Timur.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["North-East / Utara-Timur","South-East / Selatan-Ti es 2 step(s) forward in the alphabet (wrapping around). Applying the same shift to MONEY gives OQPGA.","explanation_id":"Setiap huruf bergeser 2 langkah maju di alfabet (memutar). Menerapkan geseran yang sama pada MONEY menghasilkan OQPGA.","tag":"Concept","level":1,"_section":"logic"},{"id":403,"question":"Fani is the mother of Rani. Rani is the mother of Oki.\nHow is Fani related to Oki?","question_id":"Fani ibu dari Rani. Rani ibu dari Oki.\nApa hubungan Fani terhadap Oki?","options":["Grandmother","Uncle","Sister","Father"],"correct":0,"explanation":"Fani is the mother of Oki's mother, so Fani is Oki's grandmother.","explanation_id":"Fani adalah ibu dari ibunya Oki, jadi Fani nenek Oki.","options_id":["Nenek","Paman","Saudara perempuan","Ayah"],"tag":"Concept","level":1,"_section":"logic"},{"id":404,"question":"What number continues the series?\n6, 2, -2, -6, -10, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n6, 2, -2, -6, -10, ?","options":["-14","-10","-22","-18"],"correct":0,"explanation":"Constant difference of -4 each step (arithmetic). -10 + (-4) = -14.","explanation_id":"Selisih tetap -4 tiap langkah (aritmetika). -10 + (-4) = -14.","tag":"Concept","level":1,"_section":"logic"},{"id":405,"question":"Choose the best match:\nBig : Huge  ::  Small : ?","question_id":"Pilih pasangan yang paling tepat:\nBesar : Raksasa  ::  Kecil : ?","options":["Tiny","Large","Medium","Little"],"correct":0,"explanation":"Huge is an intense form of big; tiny is an intense form of small.","explanation_id":"Raksasa = besar yang ekstrem; mungil = kecil yang ekstrem.","options_id":["Mungil","Lebar","Sedang","Sedikit"],"tag":"Concept","level":1,"_section":"logic"},{"id":406,"question":"4 people sit in a row (left to right):\nMaya sits somewhere to the left of Sani.\nIndra sits somewhere to the left of Fani.\nSani sits somewhere to the left of Indra.\nBased on the clues, who sits at the far left?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nMaya dud aight line)?","question_id":"Kamu berjalan 6 km ke Utara, lalu berbelok dan berjalan 8 km ke Timur.\nBerapa jarak lurus kamu dari titik awal?","options":["10 km","11 km","14 km","2 km"],"correct":0,"explanation":"North 6 and East 8 are perpendicular. Straight distance = √(6²+8²) = √100 = 10 km.","explanation_id":"Utara 6 dan Timur 8 saling tegak lurus. Jarak lurus = √(6²+8²) = √100 = 10 km.","tag":"Concept","level":1,"_section":"logic"},{"id":433,"question":"From home you walk 8 km North, then 5 km West.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 8 km ke Utara, lalu 5 km ke Barat.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["South-East / Selatan-Timur","North-West / Utara-Barat","North-East / Utara-Timur","South-West / Selatan-Barat"],"correct":1,"explanation":"Going North and West places you in the North-West quadrant relative to home.","explanation_id":"Bergerak ke Utara dan Barat menempatkanmu di kuadran Utara-Barat dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":434,"question":"Fani is the sister of Tono. Tono is the mother of Oki.\nHow is Fani related to Oki?","question_id":"Fani saudara perempuan Tono. Tono ibu dari Oki.\nApa hubungan Fani terhadap Oki?","options":["Niece","Uncle","Brother","Aunt"],"correct":3,"explanation":"Fani is the sister of Oki's mother, so Fani is Oki's aunt.","explanation_id":"Fani saudara perempuan dari ibunya Oki, jadi Fani bibi Oki.","options_id":["Keponakan perempuan","Paman","Saudara laki-laki","Bibi"],"tag":"Concept","level":1,"_section":"logic"},{"id":435,"question":"Gita is the father of Sani. Sani is the father of Rani.\nHow is Gita related to Rani?","question_id":"Gita ayah dari Sani. Sani ayah dari Rani.\nApa hubungan Gita terhadap Rani?","options":["Aunt","Brother","Sister","Grandfather"],"correct":3,"explanation":"Gita is the father of Rani's father, so Gita is Rani's grandfather.","explanation_id":"Gita adalah ayah dari ayahnya Rani "],"correct":1,"explanation":"Going North and East places you in the North-East quadrant relative to home.","explanation_id":"Bergerak ke Utara dan Timur menempatkanmu di kuadran Utara-Timur dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":483,"question":"4 people sit in a row (left to right):\nOki sits at the far left.\nFani sits immediately to the left of Sani.\nBudi sits at the far right.\nBased on the clues, who sits in position 2 from the left?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nOki duduk paling kiri.\nFani duduk tepat di sebelah kiri Sani.\nBudi duduk paling kanan.\nBerdasarkan petunjuk, siapa yang duduk di posisi 2 dari kiri?","options":["Fani","Oki","Budi","Sani"],"correct":0,"explanation":"The only seating that fits every clue is: Oki , Fani , Sani , Budi (left→right). Therefore the answer is Fani.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Oki , Fani , Sani , Budi (kiri→kanan). Maka jawabannya Fani.","tag":"Concept","level":1,"_section":"logic"},{"id":484,"question":"Gita is the mother of Putri. Putri is the mother of Joko.\nHow is Gita related to Joko?","question_id":"Gita ibu dari Putri. Putri ibu dari Joko.\nApa hubungan Gita terhadap Joko?","options":["Cousin","Mother","Grandmother","Niece"],"correct":2,"explanation":"Gita is the mother of Joko's mother, so Gita is Joko's grandmother.","explanation_id":"Gita adalah ibu dari ibunya Joko, jadi Gita nenek Joko.","options_id":["Sepupu","Ibu","Nenek","Keponakan perempuan"],"tag":"Concept","level":1,"_section":"logic"},{"id":485,"question":"4 people sit in a row (left to right):\nIndra sits immediately to the left of Cici.\nCici sits somewhere to the left of Joko.\nTono sits somewhere to the left of Indra.\nBased on the clues, who sits at the far left?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nIndra duduk tepat di sebelah kiri Cici.\nCici duduk di suatu posisi sebelah kiri Joko.\nTono duduk di suatu posisi sebelah st / Utara-Timur","North-West / Utara-Barat"],"correct":3,"explanation":"Going North and West places you in the North-West quadrant relative to home.","explanation_id":"Bergerak ke Utara dan Barat menempatkanmu di kuadran Utara-Barat dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":489,"question":"From home you walk 6 km South, then 8 km West.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 6 km ke Selatan, lalu 8 km ke Barat.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["North-West / Utara-Barat","South-East / Selatan-Timur","South-West / Selatan-Barat","North-East / Utara-Timur"],"correct":2,"explanation":"Going South and West places you in the South-West quadrant relative to home.","explanation_id":"Bergerak ke Selatan dan Barat menempatkanmu di kuadran Selatan-Barat dari rumah.","tag":"Concept","level":1,"_section":"logic"},{"id":490,"question":"What number continues the series?\n11, 20, 29, 38, 47, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n11, 20, 29, 38, 47, ?","options":["65","47","56","74"],"correct":2,"explanation":"Constant difference of 9 each step (arithmetic). 47 + (9) = 56.","explanation_id":"Selisih tetap 9 tiap langkah (aritmetika). 47 + (9) = 56.","tag":"Concept","level":1,"_section":"logic"},{"id":491,"question":"What number continues the series?\n2, 4, 6, 10, 16, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n2, 4, 6, 10, 16, ?","options":["27","36","26","42"],"correct":2,"explanation":"Each term is the sum of the previous two. 10 + 16 = 26.","explanation_id":"Tiap suku = jumlah dua suku sebelumnya. 10 + 16 = 26.","tag":"Concept","level":1,"_section":"logic"},{"id":492,"question":"Some eagles are birds.\nAll birds are animals.\nWhich conclusion is certainly true?","question_id":"Sebagian elang adalah burung.\nSemua burung adalah hewan.\nKesimpulan mana yang pasti benar?","options":["All eagles are animals.","All animals are eagles.","Some eagles are animals.","No eagles are animals."],"correct":2,"explanation":"At least some eagles are birds, and all birds are animals, so those eagles are also animals: 'some eagles are animals' holds. We cannot say ALL.","explanation_id":"Setidaknya sebagian elang adalah burung, dan semua burung adalah hewan, jadi sebagian elang itu juga hewan. Tidak bisa dikatakan SEMUA.","options_id":["Semua elang adalah hewan.","Semua hewan adalah elang.","Sebagian elang adalah hewan.","Tidak ada elang yang hewan."],"tag":"Concept","level":1,"_section":"logic"},{"id":493,"question":"5 people sit in a row (left to right):\nThere are exactly 1 person(s) between Eka and Sani.\nSani sits at the far left.\nTono sits immediately to the left of Indra.\nBased on the clues, who sits in position 2 from the left?","question_id":"5 orang duduk dalam satu baris (kiri ke kanan):\nAda tepat 1 orang di antara Eka dan Sani.\nSani duduk paling kiri.\nTono duduk tepat di sebelah kiri Indra.\nBerdasarkan petunjuk, siapa yang duduk di posisi 2 dari kiri?","options":["Eka","Gita","Sani","Indra"],"correct":1,"explanation":"The only seating that fits every clue is: Sani , Gita , Eka , Tono , Indra (left→right). Therefore the answer is Gita.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Sani , Gita , Eka , Tono , Indra (kiri→kanan). Maka jawabannya Gita.","tag":"Concept","level":1,"_section":"logic"},{"id":494,"question":"5 people sit in a row (left to right):\nOki sits at the far left.\nThere are exactly 1 person(s) between Tono and Putri.\nHadi sits somewhere to the left of Putri.\nThere are exactly 1 person(s) between Oki and Hadi.\nBased on the clues, who sits in position 4 from the left?","question_id":"5 orang duduk dalam satu baris (kiri ke kanan):\nOki duduk paling kiri.\nAda tepat 1 orang di antara Tono dan Putri.\nHadi duduk di suatu posisi sebelah kiri Putri.\nAda tepat 1 orang di antara Oki dan Hadi.\nBerdasarkan petunjuk, siapa yang duduk di posisi 4 dari kiri?","options":["Oki","Fani","Putri","Tono"],"correct":2,"explanation":"The only seating that fits every clue is: Oki , Tono , Hadi , Putri , Fani (left→right). Therefore the answer is Putri.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Oki , Tono , Hadi , Putri , Fani (kiri→kanan). Maka jawabannya Putri.","tag":"Concept","level":1,"_section":"logic"},{"id":495,"question":"You walk 20 km North, then turn and walk 21 km East.\nHow far are you from the starting point (straight line)?","question_id":"Kamu berjalan 20 km ke Utara, lalu berbelok dan berjalan 21 km ke Timur.\nBerapa jarak lurus kamu dari titik awal?","options":["1 km","29 km","30 km","41 km"],"correct":1,"explanation":"North 20 and East 21 are perpendicular. Straight distance = √(20²+21²) = √841 = 29 km.","explanation_id":"Utara 20 dan Timur 21 saling tegak lurus. Jarak lurus = √(20²+21²) = √841 = 29 km.","tag":"Concept","level":1,"_section":"logic"},{"id":496,"question":"You walk 5 km North, then turn and walk 12 km East.\nHow far are you from the starting point (straight line)?","question_id":"Kamu berjalan 5 km ke Utara, lalu berbelok dan berjalan 12 km ke Timur.\nBerapa jarak lurus kamu dari titik awal?","options":["14 km","17 km","13 km","7 km"],"correct":2,"explanation":"North 5 and East 12 are perpendicular. Straight distance = √(5²+12²) = √169 = 13 km.","explanation_id":"Utara 5 dan Timur 12 saling tegak lurus. Jarak lurus = √(5²+12²) = √169 = 13 km.","tag":"Concept","level":1,"_section":"logic"},{"id":497,"question":"Which one does NOT belong?\n5, 29, 23, 21","question_id":"Mana yang TIDAK termasuk kelompoknya?\n5, 29, 23, 21","options":["29","21","23","5"],"correct":1,"explanation":"21 is composite; the others are prime numbers.","explanation_id":"21 bilangan komposit; yang lain prima.","tag":"Concept","level":1,"_section":"logic"},{"id":498,"question":"4 people sit in a row (left to right):\nVina sits immediately to the left of Tono.\nHadi sits immediately to the left of Vina
