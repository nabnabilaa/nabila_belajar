 > Hadi > Lina. So the answer is Lina.","explanation_id":"Urutan dari paling tinggi ke paling pendek: Maya > Gita > Vina > Hadi > Lina. Jadi jawabannya Lina.","tag":"Concept","level":1},{"id":513,"question":"5 people sit in a row (left to right):\nGita sits at the far right.\nLina sits somewhere to the left of Budi.\nThere are exactly 1 person(s) between Vina and Budi.\nLina sits at the far left.\nFani sits somewhere to the left of Vina.\nBased on the clues, who sits at the far left?","question_id":"5 orang duduk dalam satu baris (kiri ke kanan):\nGita duduk paling kanan.\nLina duduk di suatu posisi sebelah kiri Budi.\nAda tepat 1 orang di antara Vina dan Budi.\nLina duduk paling kiri.\nFani duduk di suatu posisi sebelah kiri Vina.\nBerdasarkan petunjuk, siapa yang duduk paling kiri?","options":["Gita","Budi","Lina","Fani"],"correct":2,"explanation":"The only seating that fits every clue is: Lina , Budi , Fani , Vina , Gita (left→right). Therefore the answer is Lina.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Lina , Budi , Fani , Vina , Gita (kiri→kanan). Maka jawabannya Lina.","tag":"Concept","level":1},{"id":514,"question":"Dewi is heavier than Vina.\nVina is heavier than Maya.\nKarin is heavier than Dewi.\nBased on these statements, who is the 2nd heaviest?","question_id":"Dewi lebih berat dari Vina.\nVina lebih berat dari Maya.\nKarin lebih berat dari Dewi.\nBerdasarkan pernyataan di atas, siapa yang ke-2 paling berat?","options":["Maya","Vina","Dewi","Karin"],"correct":2,"explanation":"Ordering from heaviest to lightest: Karin > Dewi > Vina > Maya. So the answer is Dewi.","explanation_id":"Urutan dari paling berat ke paling ringan: Karin > Dewi > Vina > Maya. Jadi jawabannya Dewi.","tag":"Concept","level":1},{"id":515,"question":"4 people sit in a row (left to right):\nBudi sits somewhere to the left of Hadi.\nBudi sits at the far left.\nThere are exactly 1 person(s) between Hadi and Andi.\nAndi sits immediately to the left of Eka.\nBased on the clues, who sits immediately to the right of Andi?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nBudi duduk di suatu posisi sebelah kiri Hadi.\nBudi duduk paling kiri.\nAda tepat 1 orang di antara Hadi dan Andi.\nAndi duduk tepat di sebelah kiri Eka.\nBerdasarkan petunjuk, siapa yang duduk tepat di sebelah kanan Andi?","options":["Hadi","Budi","Eka","Andi"],"correct":2,"explanation":"The only seating that fits every clue is: Budi , Andi , Eka , Hadi (left→right). Therefore the answer is Eka.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Budi , Andi , Eka , Hadi (kiri→kanan). Maka jawabannya Eka.","tag":"Concept","level":1},{"id":516,"question":"Eka is heavier than Maya.\nKarin is heavier than Eka.\nDewi is heavier than Sani.\nMaya is heavier than Dewi.\nBased on these statements, who is the 2nd heaviest?","question_id":"Eka lebih berat dari Maya.\nKarin lebih berat dari Eka.\nDewi lebih berat dari Sani.\nMaya lebih berat dari Dewi.\nBerdasarkan pernyataan di atas, siapa yang ke-2 paling berat?","options":["Karin","Eka","Sani","Dewi"],"correct":1,"explanation":"Ordering from heaviest to lightest: Karin > Eka > Maya > Dewi > Sani. So the answer is Eka.","explanation_id":"Urutan dari paling berat ke paling ringan: Karin > Eka > Maya > Dewi > Sani. Jadi jawabannya Eka.","tag":"Concept","level":1},{"id":517,"question":"What number continues the series?\n5, 7, 12, 19, 31, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n5, 7, 12, 19, 31, ?","options":["69","50","81","51"],"correct":1,"explanation":"Each term is the sum of the previous two. 19 + 31 = 50.","explanation_id":"Tiap suku = jumlah dua suku sebelumnya. 19 + 31 = 50.","tag":"Concept","level":1},{"id":518,"question":"What number continues the series?\n6, 0, -6, -12, -18, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n6, 0, -6, -12, -18, ?","options":["-18","-30","-36","-24"],"correct":3,"explanation":"Constant difference of -6 each step (arithmetic). -18 + (-6) = -24.","explanation_id":"Selisih tetap -6 tiap langkah (aritmetika). -18 + (-6) = -24.","tag":"Concept","level":1},{"id":519,"question":"Fani is the son of Budi. Budi is the sister of Sani.\nHow is Fani related to Sani?","question_id":"Fani anak laki-laki Budi. Budi saudara perempuan Sani.\nApa hubungan Fani terhadap Sani?","options":["Grandfather","Aunt","Nephew","Niece"],"correct":2,"explanation":"Fani is the son of Sani's sister, so Fani is Sani's nephew.","explanation_id":"Fani anak laki-laki dari saudara perempuannya Sani, jadi Fani keponakan Sani.","options_id":["Kakek","Bibi","Keponakan laki-laki","Keponakan perempuan"],"tag":"Concept","level":1},{"id":520,"question":"From home you walk 2 km South, then 6 km East.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 2 km ke Selatan, lalu 6 km ke Timur.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["North-West / Utara-Barat","South-West / Selatan-Barat","North-East / Utara-Timur","South-East / Selatan-Timur"],"correct":3,"explanation":"Going South and East places you in the South-East quadrant relative to home.","explanation_id":"Bergerak ke Selatan dan Timur menempatkanmu di kuadran Selatan-Timur dari rumah.","tag":"Concept","level":1},{"id":521,"question":"What number continues the series?\n6, 16, 8, 13, 10, 10, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n6, 16, 8, 13, 10, 10, ?","options":["19","13","12","14"],"correct":2,"explanation":"Two interleaved patterns. Odd spots +2, even spots -3. Next continues odd: 10+2=12.","explanation_id":"Dua pola berselang-seling. Posisi ganjil +2, genap -3. Berikutnya pola ganjil: 10+2=12.","tag":"Concept","level":1},{"id":522,"question":"What number continues the series?\n5, 26, 8, 29, 11, 32, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n5, 26, 8, 29, 11, 32, ?","options":["14","17","15","49"],"correct":0,"explanation":"Two interleaved patterns. Odd spots planation":"Ordering from richest to poorest: Gita > Putri > Vina > Sani > Eka. So the answer is Putri.","explanation_id":"Urutan dari paling kaya ke paling miskin: Gita > Putri > Vina > Sani > Eka. Jadi jawabannya Putri.","tag":"Concept","level":1},{"id":526,"question":"Dewi is richer than Rani.\nOki is richer than Putri.\nPutri is richer than Hadi.\nHadi is richer than Dewi.\nBased on these statements, who is the richest?","question_id":"Dewi lebih kaya dari Rani.\nOki lebih kaya dari Putri.\nPutri lebih kaya dari Hadi.\nHadi lebih kaya dari Dewi.\nBerdasarkan pernyataan di atas, siapa yang paling kaya?","options":["Rani","Putri","Dewi","Oki"],"correct":3,"explanation":"Ordering from richest to poorest: Oki > Putri > Hadi > Dewi > Rani. So the answer is Oki.","explanation_id":"Urutan dari paling kaya ke paling miskin: Oki > Putri > Hadi > Dewi > Rani. Jadi jawabannya Oki.","tag":"Concept","level":1},{"id":527,"question":"Choose the best match:\nBird : Fly  ::  Fish : ?","question_id":"Pilih pasangan yang paling tepat:\nBurung : Terbang  ::  Ikan : ?","options":["Swim","Jump","Run","Walk"],"correct":0,"explanation":"A bird moves by flying; a fish moves by swimming.","explanation_id":"Burung bergerak dengan terbang; ikan bergerak dengan berenang.","options_id":["Berenang","Melompat","Berlari","Berjalan"],"tag":"Concept","level":1},{"id":528,"question":"What number continues the series?\n3, 30, 8, 32, 13, 34, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n3, 30, 8, 32, 13, 34, ?","options":["19","18","23","54"],"correct":1,"explanation":"Two interleaved patterns. Odd spots +5, even spots +2. Next continues odd: 13+5=18.","explanation_id":"Dua pola berselang-seling. Posisi ganjil +5, genap +2. Berikutnya pola ganjil: 13+5=18.","tag":"Concept","level":1},{"id":529,"question":"What number continues the series?\n4, 29, 7, 31, 10, 33, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n4, 29, 7, 31, 10, 33, ?","options":["48","14","13","16"],"correct":2,"explanation":"Two interleaved patterns. Odd spots +3, even spots +2. Next continues odd: 10+3=13.","explanation_id":"Dua pola berselang-seling. Posisi ganjil +3, genap +2. Berikutnya pola ganjil: 10+3=13.","tag":"Concept","level":1},{"id":530,"question":"4 people sit in a row (left to right):\nBudi sits somewhere to the left of Andi.\nTono sits somewhere to the left of Gita.\nThere are exactly 1 person(s) between Andi and Budi.\nTono sits at the far left.\nBased on the clues, who sits in position 2 from the left?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nBudi duduk di suatu posisi sebelah kiri Andi.\nTono duduk di suatu posisi sebelah kiri Gita.\nAda tepat 1 orang di antara Andi dan Budi.\nTono duduk paling kiri.\nBerdasarkan petunjuk, siapa yang duduk di posisi 2 dari kiri?","options":["Tono","Budi","Gita","Andi"],"correct":1,"explanation":"The only seating that fits every clue is: Tono , Budi , Gita , Andi (left→right). Therefore the answer is Budi.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Tono , Budi , Gita , Andi (kiri→kanan). Maka jawabannya Budi.","tag":"Concept","level":1},{"id":531,"question":"Andi is the brother of Lina. Lina is the father of Cici.\nHow is Andi related to Cici?","question_id":"Andi saudara laki-laki Lina. Lina ayah dari Cici.\nApa hubungan Andi terhadap Cici?","options":["Uncle","Father","Niece","Brother"],"correct":0,"explanation":"Andi is the brother of Cici's father, so Andi is Cici's uncle.","explanation_id":"Andi saudara laki-laki dari ayahnya Cici, jadi Andi paman Cici.","options_id":["Paman","Ayah","Keponakan perempuan","Saudara laki-laki"],"tag":"Concept","level":1},{"id":532,"question":"In a code language, CAT is written as ZXQ.\nHow is DREAM written?","question_id":"Dalam suatu bahasa sandi, CAT ditulis ZXQ.\nBagaimana DREAM ditulis?","options":["ZNAWI","CQDZL","BPCYK","AOBXJ"],"correct":3,"explanation":"Each letter moves 3 step(s) backward in the alphabet (wrapping around). Applying the same shift to DREAM gives AOBXJ.","explanation_id":"Setiap huruf bergeser 3 langkah mundur di alfabet (memutar). Menerapkan geseran yang sama pada DREAM menghasilkan AOBXJ.","tag":"Concept","level":1},{"id":533,"question":"Cici is older than Eka.\nFani is older than Lina.\nVina is older than Fani.\nEka is older than Vina.\nBased on these statements, who is the oldest?","question_id":"Cici lebih tua dari Eka.\nFani lebih tua dari Lina.\nVina lebih tua dari Fani.\nEka lebih tua dari Vina.\nBerdasarkan pernyataan di atas, siapa yang paling tua?","options":["Eka","Lina","Cici","Fani"],"correct":2,"explanation":"Ordering from oldest to youngest: Cici > Eka > Vina > Fani > Lina. So the answer is Cici.","explanation_id":"Urutan dari paling tua ke paling muda: Cici > Eka > Vina > Fani > Lina. Jadi jawabannya Cici.","tag":"Concept","level":1},{"id":534,"question":"In a code language, NIGHT is written as MHFGS.\nHow is LOGIC written?","question_id":"Dalam suatu bahasa sandi, NIGHT ditulis MHFGS.\nBagaimana LOGIC ditulis?","options":["LOGIC","MPHJD","KNFHB","JMEGA"],"correct":2,"explanation":"Each letter moves 1 step(s) backward in the alphabet (wrapping around). Applying the same shift to LOGIC gives KNFHB.","explanation_id":"Setiap huruf bergeser 1 langkah mundur di alfabet (memutar). Menerapkan geseran yang sama pada LOGIC menghasilkan KNFHB.","tag":"Concept","level":1},{"id":535,"question":"Which one does NOT belong?\n14, 4, 16, 7","question_id":"Mana yang TIDAK termasuk kelompoknya?\n14, 4, 16, 7","options":["7","16","4","14"],"correct":0,"explanation":"7 is odd; the others are even.","explanation_id":"7 ganjil; yang lain genap.","tag":"Concept","level":1},{"id":536,"question":"Indra is the daughter of Hadi's grandfather. Indra is not Hadi's mother.\nHow is Indra related to Hadi?","question_id":"Indra anak perempuan dari kakeknya Hadi. Indra bukan ibu Hadi.\nApa hubungan Indra terhadap Hadi?","options":["Aunt","Cousin","Father","Brother"],"correct":0,"explanation":"Indra is a child of Hadi's grandfather (so a sibling of Hadi's parent) — that makes Indra Hadi's aunt.","explanation_id":"Indra anak dari kakeknya Hadi (jadi saudara dari orang tua Hadi) — maka Indra bibi Hadi.","options_id":["Bibi","Sepupu","Ayah","Saudara laki-laki"],"tag":"Concept","level":1},{"id":537,"question":"Which one does NOT belong?\nCarrot, Banana, Mango, Apple","question_id":"Mana yang TIDAK termasuk kelompoknya?\nWortel, Pisang, Mangga, Apel","options":["Apple","Carrot","Banana","Mango"],"correct":1,"explanation":"Carrot is a vegetable; the others are fruits.","explanation_id":"Wortel adalah sayur; yang lain adalah buah.","options_id":["Apel","Wortel","Pisang","Mangga"],"tag":"Concept","level":1},{"id":538,"question":"Which one does NOT belong?\n2, 16, 14, 7","question_id":"Mana yang TIDAK termasuk kelompoknya?\n2, 16, 14, 7","options":["2","16","7","14"],"correct":2,"explanation":"7 is odd; the others are even.","explanation_id":"7 ganjil; yang lain genap.","tag":"Concept","level":1},{"id":539,"question":"Oki is faster than Rani.\nGita is faster than Budi.\nLina is faster than Gita.\nBudi is faster than Oki.\nBased on these statements, who is the fastest?","question_id":"Oki lebih cepat dari Rani.\nGita lebih cepat dari Budi.\nLina lebih cepat dari Gita.\nBudi lebih cepat dari Oki.\nBerdasarkan pernyataan di atas, siapa yang paling cepat?","options":["Oki","Gita","Budi","Lina"],"correct":3,"explanation":"Ordering from fastest to slowest: Lina > Gita > Budi > Oki > Rani. So the answer is Lina.","explanation_id":"Urutan dari paling cepat ke paling lambat: Lina > Gita > Budi > Oki > Rani. Jadi jawabannya Lina.","tag":"Concept","level":1},{"id":540,"question":"4 people sit in a row (left to right):\nThere are exactly 1 person(s) between Nina and Putri.\nEka sits at the far left.\nEka sits somewhere to the left of Rani.\nRani sits somewhere to the left of Putri.\nBased on the clues, who sits in position 1 from the left?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nAda tepat 1 orang di antara Nina dan Putri.\nEka duduk paling kiri.\nEka duduk di suatu posisi sebelah kiri Rani.\nRani duduk di suatu posisi sebelah kiri Putri.\nBerdasarkan petunjuk, siapa yang duduk di posisi 1 dari kiri?","options":["Putri","Nina","Rani","Eka"],"correct":3,"explanation":"The only seating that fits every clue is: Eka , Nina , Rani , Putri (left→right). Therefore the answer is Eka.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Eka , Nina , Rani , Putri (kiri→kanan). Maka jawabannya Eka.","tag":"Concept","level":1},{"id":541,"question":"Maya is richer than Lina.\nRani is richer than Maya.\nVina is richer than Rani.\nBased on these statements, who is the 2nd richest?","question_id":"Maya lebih kaya dari Lina.\nRani lebih kaya dari Maya.\nVina lebih kaya dari Rani.\nBerdasarkan pernyataan di atas, siapa yang ke-2 paling kaya?","options":["Rani","Lina","Vina","Maya"],"correct":0,"explanation":"Ordering from richest to poorest: Vina > Rani > Maya > Lina. So the answer is Rani.","explanation_id":"Urutan dari paling kaya ke paling miskin: Vina > Rani > Maya > Lina. Jadi jawabannya Rani.","tag":"Concept","level":1},{"id":542,"question":"Tono is the sister of Karin. Karin is the mother of Gita.\nHow is Tono related to Gita?","question_id":"Tono saudara perempuan Karin. Karin ibu dari Gita.\nApa hubungan Tono terhadap Gita?","options":["Cousin","Aunt","Uncle","Mother"],"correct":1,"explanation":"Tono is the sister of Gita's mother, so Tono is Gita's aunt.","explanation_id":"Tono saudara perempuan dari ibunya Gita, jadi Tono bibi Gita.","options_id":["Sepupu","Bibi","Paman","Ibu"],"tag":"Concept","level":1},{"id":543,"question":"Eka is the daughter of Vina's grandfather. Eka is not Vina's mother.\nHow is Eka related to Vina?","question_id":"Eka anak perempuan dari kakeknya Vina. Eka bukan ibu Vina.\nApa hubungan Eka terhadap Vina?","options":["Aunt","Grandfather","Mother","Grandmother"],"correct":0,"explanation":"Eka is a child of Vina's grandfather (so a sibling of Vina's parent) — that makes Eka Vina's aunt.","explanation_id":"Eka anak dari kakeknya Vina (jadi saudara dari orang tua Vina) — maka Eka bibi Vina.","options_id":["Bibi","Kakek","Ibu","Nenek"],"tag":"Concept","level":1},{"id":544,"question":"Karin is faster than Budi.\nBudi is faster than Lina.\nLina is faster than Tono.\nTono is faster than Fani.\nBased on these statements, who is the slowest?","question_id":"Karin lebih cepat dari Budi.\nBudi lebih cepat dari Lina.\nLina lebih cepat dari Tono.\nTono lebih cepat dari Fani.\nBerdasarkan pernyataan di atas, siapa yang paling lambat?","options":["Karin","Budi","Lina","Fani"],"correct":3,"explanation":"Ordering from fastest to slowest: Karin > Budi > Lina > Tono > Fani. So the answer is Fani.","explanation_id":"Urutan dari paling cepat ke paling lambat: Karin > Budi > Lina > Tono > Fani. Jadi jawabannya Fani.","tag":"Concept","level":1},{"id":545,"question":"What number continues the series?\n6, 27, 10, 29, 14, 31, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n6, 27, 10, 29, 14, 31, ?","options":["19","51","18","22"],"correct":2,"explanation":"Two interleaved patterns. Odd spots +4, even spots +2. Next continues odd: 14+4=18.","explanation_id":"Dua pola berselang-seling. Posisi ganjil +4, genap +2. Berikutnya pola ganjil: 14+4=18.","tag":"Concept","level":1},{"id":546,"question":"From home you walk 5 km South, then 8 km East.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 5 km ke Selatan, lalu 8 km ke Timur.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["South-East / Selatan-Timur","North-West / Utara-Barat","North-East / Utara-Timur","South-West / Selatan-Barat"],"correct":0,"explanation":"Going South and East places you in the South-East quadrant relative to home.","explanation_id":"Bergerak ke Selatan dan Timur menempatkanmu di kuadran Selatan-Timur dari rumah.","tag":"Concept","level":1},{"id":547,"question":"In a code language, NIGHT is written as MHFGS.\nHow is STONE written?","question_id":"Dalam suatu bahasa sandi, NIGHT ditulis MHFGS.\nBagaimana STONE ditulis?","options":["QRMLC","RSNMD","STONE","TUPOF"],"correct":1,"explanation":"Each letter moves 1 step(s) backward in the alphabet (wrapping around). Applying the same shift to STONE gives RSNMD.","explanation_id":"Setiap huruf bergeser 1 langkah mundur di alfabet (memutar). Menerapkan geseran yang sama pada STONE menghasilkan RSNMD.","tag":"Concept","level":1},{"id":548,"question":"From home you walk 6 km South, then 3 km East.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 6 km ke Selatan, lalu 3 km ke Timur.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["South-East / Selatan-Timur","North-East / Utara-Timur","North-West / Utara-Barat","South-West / Selatan-Barat"],"correct":0,"explanation":"Going South and East places you in the South-East quadrant relative to home.","explanation_id":"Bergerak ke Selatan dan Timur menempatkanmu di kuadran Selatan-Timur dari rumah.","tag":"Concept","level":1},{"id":549,"question":"Putri is richer than Nina.\nNina is richer than Maya.\nHadi is richer than Putri.\nBased on these statements, who is the richest?","question_id":"Putri lebih kaya dari Nina.\nNina lebih kaya dari Maya.\nHadi lebih kaya dari Putri.\nBerdasarkan pernyataan di atas, siapa yang paling kaya?","options":["Hadi","Putri","Maya","Nina"],"correct":0,"explanation":"Ordering from richest to poorest: Hadi > Putri > Nina > Maya. So the answer is Hadi.","explanation_id":"Urutan dari paling kaya ke paling miskin: Hadi > Putri > Nina > Maya. Jadi jawabannya Hadi.","tag":"Concept","level":1},{"id":550,"question":"5 people sit in a row (left to right):\nIndra sits at the far left.\nIndra sits immediately to the left of Rani.\nRani sits somewhere to the left of Nina.\nThere are exactly 2 person(s) between Nina and Indra.\nAndi sits somewhere to the left of Nina.\nBased on the clues, who sits in position 2 from the left?","question_id":"5 orang duduk dalam satu baris (kiri ke kanan):\nIndra duduk paling kiri.\nIndra duduk tepat di sebelah kiri Rani.\nRani duduk di suatu posisi sebelah kiri Nina.\nAda tepat 2 orang di antara Nina dan Indra.\nAndi duduk di suatu posisi sebelah kiri Nina.\nBerdasarkan petunjuk, siapa yang duduk di posisi 2 dari kiri?","options":["Nina","Andi","Indra","Rani"],"correct":3,"explanation":"The only seating that fits every clue is: Indra , Rani , Andi , Nina , Tono (left→right). Therefore the answer is Rani.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Indra , Rani , Andi , Nina , Tono (kiri→kanan). Maka jawabannya Rani.","tag":"Concept","level":1},{"id":551,"question":"4 people sit in a row (left to right):\nLina sits somewhere to the left of Joko.\nThere are exactly 1 person(s) between Lina and Fani.\nLina sits at the far left.\nFani sits somewhere to the left of Joko.\nBased on the clues, who sits at the far left?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nLina duduk di suatu posisi sebelah kiri Joko.\nAda tepat 1 orang di antara Lina dan Fani.\nLina duduk paling kiri.\nFani duduk di suatu posisi sebelah kiri Joko.\nBerdasarkan petunjuk, siapa yang duduk paling kiri?","options":["Joko","Indra","Fani","Lina"],"correct":3,"explanation":"The only seating that fits every clue is: Lina , Indra , Fani , Joko (left→right). Therefore the answer is Lina.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Lina , Indra , Fani , Joko (kiri→kanan). Maka jawabannya Lina.","tag":"Concept","level":1},{"id":552,"question":"Budi is the son of Fani. Fani is the sister of Eka.\nHow is Budi related to Eka?","question_id":"Budi anak laki-laki Fani. Fani saudara perempuan Eka.\nApa hubungan Budi terhadap Eka?","options":["Father","Nephew","Uncle","Mother"],"correct":1,"explanation":"Budi is the son of Eka's sister, so Budi is Eka's nephew.","explanation_id":"Budi anak laki-laki dari saudara perempuannya Eka, jadi Budi keponakan Eka.","options_id":["Ayah","Keponakan laki-laki","Paman","Ibu"],"tag":"Concept","level":1},{"id":553,"question":"Sani is heavier than Hadi.\nCici is heavier than Budi.\nBudi is heavier than Sani.\nBased on these statements, who is the lightest?","question_id":"Sani lebih berat dari Hadi.\nCici lebih berat dari Budi.\nBudi lebih berat dari Sani.\nBerdasarkan pernyataan di atas, siapa yang paling ringan?","options":["Budi","Sani","Cici","Hadi"],"correct":3,"explanation":"Ordering from heaviest to lightest: Cici > Budi > Sani > Hadi. So the answer is Hadi.","explanation_id":"Urutan dari paling berat ke paling ringan: Cici > Budi > Sani > Hadi. Jadi jawabannya Hadi.","tag":"Concept","level":1},{"id":554,"question":"4 people sit in a row (left to right):\nEka sits somewhere to the left of Nina.\nThere are exactly 1 person(s) between Eka and Tono.\nCici sits somewhere to the left of Tono.\nTono sits somewhere to the left of Nina.\nBased on the clues, who sits at the far right?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nEka duduk di suatu posisi sebelah kiri Nina.\nAda tepat 1 orang di antara Eka dan Tono.\nCici duduk di suatu posisi sebelah kiri Tono.\nTono duduk di suatu posisi sebelah kiri Nina.\nBerdasarkan petunjuk, siapa yang duduk paling kanan?","options":["Nina","Eka","Cici","Tono"],"correct":0,"explanation":"The only seating that fits every clue is: Eka , Cici , Tono , Nina (left→right). Therefore the answer is Nina.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Eka , Cici , Tono , Nina (kiri→kanan). Maka jawabannya Nina.","tag":"Concept","level":1},{"id":555,"question":"All apples are fruits.\nAll fruits are sweet things.\nWhich conclusion is certainly true?","question_id":"Semua apel adalah buah.\nSemua buah adalah benda manis.\nKesimpulan mana yang pasti benar?","options":["All apples are sweet things.","No apples are sweet things.","Some sweet things are not apples.","All sweet things are apples."],"correct":0,"explanation":"Every apple is a fruit, and every fruit is a sweet things, so all apples must be sweet things (transitive).","explanation_id":"Setiap apel adalah buah, dan setiap buah adalah benda manis, jadi semua apel pasti benda manis (transitif).","options_id":["Semua apel adalah benda manis.","Tidak ada apel yang benda manis.","Sebagian benda manis bukan apel.","Semua benda manis adalah apel."],"tag":"Concept","level":1},{"id":556,"question":"Hadi is the daughter of Maya's grandfather. Hadi is not Maya's mother.\nHow is Hadi related to Maya?","question_id":"Hadi anak perempuan dari kakeknya Maya. Hadi bukan ibu Maya.\nApa hubungan Hadi terhadap Maya?","options":["Cousin","Aunt","Sister","Nephew"],"correct":1,"explanation":"Hadi is a child of Maya's grandfather (so a sibling of Maya's parent) — that makes Hadi Maya's aunt.","explanation_id":"Hadi anak dari kakeknya Maya (jadi saudara dari orang tua Maya) — maka Hadi bibi Maya.","options_id":["Sepupu","Bibi","Saudara perempuan","Keponakan laki-laki"],"tag":"Concept","level":1},{"id":557,"question":"From home you walk 8 km South, then 5 km West.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 8 km ke Selatan, lalu 5 km ke Barat.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["South-West / Selatan-Barat","North-East / Utara-Timur","South-East / Selatan-Timur","North-West / Utara-Barat"],"correct":0,"explanation":"Going South and West places you in the South-West quadrant relative to home.","explanation_id":"Bergerak ke Selatan dan Barat menempatkanmu di kuadran Selatan-Barat dari rumah.","tag":"Concept","level":1},{"id":558,"question":"What number continues the series?\n3, 29, 8, 32, 13, 35, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n3, 29, 8, 32, 13, 35, ?","options":["56","18","19","23"],"correct":1,"explanation" ki , Fani , Hadi , Joko (left→right). Therefore the answer is Oki.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Indra , Oki , Fani , Hadi , Joko (kiri→kanan). Maka jawabannya Oki.","tag":"Concept","level":1},{"id":570,"question":"Fani is faster than Karin.\nKarin is faster than Cici.\nCici is faster than Budi.\nBased on these statements, who is the slowest?","question_id":"Fani lebih cepat dari Karin.\nKarin lebih cepat dari Cici.\nCici lebih cepat dari Budi.\nBerdasarkan pernyataan di atas, siapa yang paling lambat?","options":["Karin","Fani","Cici","Budi"],"correct":3,"explanation":"Ordering from fastest to slowest: Fani > Karin > Cici > Budi. So the answer is Budi.","explanation_id":"Urutan dari paling cepat ke paling lambat: Fani > Karin > Cici > Budi. Jadi jawabannya Budi.","tag":"Concept","level":1},{"id":571,"question":"In a code language, HOUSE is written as GNTRD.\nHow is CLOUD written?","question_id":"Dalam suatu bahasa sandi, HOUSE ditulis GNTRD.\nBagaimana CLOUD ditulis?","options":["BKNTC","CLOUD","AJMSB","DMPVE"],"correct":0,"explanation":"Each letter moves 1 step(s) backward in the alphabet (wrapping around). Applying the same shift to CLOUD gives BKNTC.","explanation_id":"Setiap huruf bergeser 1 langkah mundur di alfabet (memutar). Menerapkan geseran yang sama pada CLOUD menghasilkan BKNTC.","tag":"Concept","level":1},{"id":572,"question":"Which one does NOT belong?\nDoctor, Hospital, Teacher, Nurse","question_id":"Mana yang TIDAK termasuk kelompoknya?\nDokter, Rumah Sakit, Guru, Perawat","options":["Teacher","Nurse","Doctor","Hospital"],"correct":3,"explanation":"Hospital is a place; the others are professions.","explanation_id":"Rumah Sakit adalah tempat; yang lain profesi.","options_id":["Guru","Perawat","Dokter","Rumah Sakit"],"tag":"Concept","level":1},{"id":573,"question":"What number continues the series?\n17, 21, 25, 29, 33, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n17, 21, 25, 29, 33, ?","options":["33","41","37","45"],"correct":2,"explanation":"Constant difference of 4 each step (arithmetic). 33 + (4) = 37.","explanation_id":"Selisih tetap 4 tiap langkah (aritmetika). 33 + (4) = 37.","tag":"Concept","level":1},{"id":574,"question":"From home you walk 6 km North, then 6 km East.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 6 km ke Utara, lalu 6 km ke Timur.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["North-West / Utara-Barat","South-East / Selatan-Timur","North-East / Utara-Timur","South-West / Selatan-Barat"],"correct":2,"explanation":"Going North and East places you in the North-East quadrant relative to home.","explanation_id":"Bergerak ke Utara dan Timur menempatkanmu di kuadran Utara-Timur dari rumah.","tag":"Concept","level":1},{"id":575,"question":"What number continues the series?\n3, -4, -11, -18, -25, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n3, -4, -11, -18, -25, ?","options":["-25","-46","-32","-39"],"correct":2,"explanation":"Constant difference of -7 each step (arithmetic). -25 + (-7) = -32.","explanation_id":"Selisih tetap -7 tiap langkah (aritmetika). -25 + (-7) = -32.","tag":"Concept","level":1},{"id":576,"question":"4 people sit in a row (left to right):\nEka sits somewhere to the left of Andi.\nEka sits somewhere to the left of Oki.\nEka sits immediately to the left of Maya.\nOki sits at the far right.\nBased on the clues, who sits at the far left?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nEka duduk di suatu posisi sebelah kiri Andi.\nEka duduk di suatu posisi sebelah kiri Oki.\nEka duduk tepat di sebelah kiri Maya.\nOki duduk paling kanan.\nBerdasarkan petunjuk, siapa yang duduk paling kiri?","options":["Eka","Oki","Andi","Maya"],"correct":0,"explanation":"The only seating that fits every clue is: Eka , Maya , Andi , Oki (left→right). Therefore the answer is Eka.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Eka , Maya , Andi , Oki (kiri→kanan). Maka jawabannya Eka.","tag":"Concept","level":1},{"id":577,"question":"What number continues the series?\n6, 23, 11, 20, 16, 17, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n6, 23, 11, 20, 16, 17, ?","options":["22","35","26","21"],"correct":3,"explanation":"Two interleaved patterns. Odd spots +5, even spots -3. Next continues odd: 16+5=21.","explanation_id":"Dua pola berselang-seling. Posisi ganjil +5, genap -3. Berikutnya pola ganjil: 16+5=21.","tag":"Concept","level":1},{"id":578,"question":"From home you walk 6 km North, then 5 km West.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 6 km ke Utara, lalu 5 km ke Barat.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["North-East / Utara-Timur","North-West / Utara-Barat","South-West / Selatan-Barat","South-East / Selatan-Timur"],"correct":1,"explanation":"Going North and West places you in the North-West quadrant relative to home.","explanation_id":"Bergerak ke Utara dan Barat menempatkanmu di kuadran Utara-Barat dari rumah.","tag":"Concept","level":1},{"id":579,"question":"In a code language, CHAIR is written as FKDLU.\nHow is BREAD written?","question_id":"Dalam suatu bahasa sandi, CHAIR ditulis FKDLU.\nBagaimana BREAD ditulis?","options":["GWJFI","EUHDG","FVIEH","DTGCF"],"correct":1,"explanation":"Each letter moves 3 step(s) forward in the alphabet (wrapping around). Applying the same shift to BREAD gives EUHDG.","explanation_id":"Setiap huruf bergeser 3 langkah maju di alfabet (memutar). Menerapkan geseran yang sama pada BREAD menghasilkan EUHDG.","tag":"Concept","level":1},{"id":580,"question":"What number continues the series?\n2, 2, 4, 6, 10, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n2, 2, 4, 6, 10, ?","options":["22","16","17","26"],"correct":1,"explanation":"Each term is the sum of the previous two. 6 + 10 = 16.","explanation_id":"Tiap suku = jumlah dua suku sebelumnya. 6 + 10 = 16.","tag":"Concept","level":1},{"id":581,"question":"5 people sit in a row (left to right):\nEka sits at the far left.\nRani sits immediately to the left of Lina.\nThere are exactly 3 person(s) between Lina and Eka.\nEka sits somewhere to the left of Lina.\nSani sits immediately to the left of Rani.\nBased on the clues, who sits at the far right?","question_id":"5 orang duduk dalam satu baris (kiri ke kanan):\nEka duduk paling kiri.\nRani duduk tepat di sebelah kiri Lina.\nAda tepat 3 orang di antara Lina dan Eka.\nEka duduk di suatu posisi sebelah kiri Lina.\nSani duduk tepat di sebelah kiri Rani.\nBerdasarkan petunjuk, siapa yang duduk paling kanan?","options":["Eka","Sani","Rani","Lina"],"correct":3,"explanation":"The only seating that fits every clue is: Eka , Fani , Sani , Rani , Lina (left→right). Therefore the answer is Lina.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Eka , Fani , Sani , Rani , Lina (kiri→kanan). Maka jawabannya Lina.","tag":"Concept","level":1},{"id":582,"question":"Which one does NOT belong?\nRose, Oak, Tulip, Lily","question_id":"Mana yang TIDAK termasuk kelompoknya?\nMawar, Pohon Ek, Tulip, Lili","options":["Lily","Oak","Tulip","Rose"],"correct":1,"explanation":"Oak is a tree; the others are flowers.","explanation_id":"Pohon Ek adalah pohon; yang lain adalah bunga.","options_id":["Lili","Pohon Ek","Tulip","Mawar"],"tag":"Concept","level":1},{"id":583,"question":"What number continues the series?\n2, 1, 3, 4, 7, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n2, 1, 3, 4, 7, ?","options":["11","18","12","15"],"correct":0,"explanation":"Each term is the sum of the previous two. 4 + 7 = 11.","explanation_id":"Tiap suku = jumlah dua suku sebelumnya. 4 + 7 = 11.","tag":"Concept","level":1},{"id":584,"question":"From home you walk 3 km South, then 8 km West.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 3 km ke Selatan, lalu 8 km ke Barat.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["North-East / Utara-Timur","South-West / Selatan-Barat","North-West / Utara-Barat","South-East / Selatan-Timur"],"correct":1,"explanation":"Going South and West places you in the South-West quadrant relative to home.","explanation_id":"Bergerak ke Selatan dan Barat menempatkanmu di kuadran Selatan-Barat dari rumah.","tag":"Concept","level":1},{"id":585,"question":"What number continues the series?\n7, 3, -1, -5, -9, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n7, 3, -1, -5, -9, ?","options":["-9","-17","-21","-13"],"correct":3,"explanation":"Constant difference of -4 each step (arithmetic). -9 + (-4) = -13.","explanation_id":"Selisih tetap -4 tiap langkah (aritmetika). -9 + (-4) = -13.","tag":"Concept","level":1},{"id":586,"question":"5 people sit in a row (left to right):\nCici sits somewhere to the left of Dewi.\nRani sits at the far right.\nHadi sits at the far left.\nDewi sits exactly in the middle.\nBased on the clues, who sits at the far left?","question_id":"5 orang duduk dalam satu baris (kiri ke kanan):\nCici duduk di suatu posisi sebelah kiri Dewi.\nRani duduk paling kanan.\nHadi duduk paling kiri.\nDewi duduk tepat di tengah.\nBerdasarkan petunjuk, siapa yang duduk paling kiri?","options":["Hadi","Tono","Rani","Dewi"],"correct":0,"explanation":"The only seating that fits every clue is: Hadi , Cici , Dewi , Tono , Rani (left→right). Therefore the answer is Hadi.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Hadi , Cici , Dewi , Tono , Rani (kiri→kanan). Maka jawabannya Hadi.","tag":"Concept","level":1},{"id":587,"question":"5 people sit in a row (left to right):\nLina sits somewhere to the left of Gita.\nNina sits somewhere to the left of Gita.\nKarin sits at the far left.\nThere are exactly 2 person(s) between Gita and Andi.\nLina sits exactly in the middle.\nBased on the clues, who sits at the far right?","question_id":"5 orang duduk dalam satu baris (kiri ke kanan):\nLina duduk di suatu posisi sebelah kiri Gita.\nNina duduk di suatu posisi sebelah kiri Gita.\nKarin duduk paling kiri.\nAda tepat 2 orang di antara Gita dan Andi.\nLina duduk tepat di tengah.\nBerdasarkan petunjuk, siapa yang duduk paling kanan?","options":["Karin","Gita","Lina","Nina"],"correct":1,"explanation":"The only seating that fits every clue is: Karin , Andi , Lina , Nina , Gita (left→right). Therefore the answer is Gita.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Karin , Andi , Lina , Nina , Gita (kiri→kanan). Maka jawabannya Gita.","tag":"Concept","level":1},{"id":588,"question":"What number continues the series?\n3, 16, 8, 18, 13, 20, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n3, 16, 8, 18, 13, 20, ?","options":["23","18","19","40"],"correct":1,"explanation":"Two interleaved patterns. Odd spots +5, even spots +2. Next continues odd: 13+5=18.","explanation_id":"Dua pola berselang-seling. Posisi ganjil +5, genap +2. Berikutnya pola ganjil: 13+5=18.","tag":"Concept","level":1},{"id":589,"question":"What number continues the series?\n1, 4, 5, 9, 14, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n1, 4, 5, 9, 14, ?","options":["23","32","37","24"],"correct":0,"explanation":"Each term is the sum of the previous two. 9 + 14 = 23.","explanation_id":"Tiap suku = jumlah dua suku sebelumnya. 9 + 14 = 23.","tag":"Concept","level":1},{"id":590,"question":"From home you walk 8 km South, then 9 km West.\nIn which overall direction are you now from home?","question_id":"Dari rumah kamu berjalan 8 km ke Selatan, lalu 9 km ke Barat.\nSecara keseluruhan kamu berada di arah mana dari rumah?","options":["South-East / Selatan-Timur","South-West / Selatan-Barat","North-West / Utara-Barat","North-East / Utara-Timur"],"correct":1,"explanation":"Going South and West places you in the South-West quadrant relative to home.","explanation_id":"Bergerak ke Selatan dan Barat menempatkanmu di kuadran Selatan-Barat dari rumah.","tag":"Concept","level":1},{"id":591,"question":"Fani is the wife of Tono. Tono is the father of Nina.\nHow is Fani related to Nina?","question_id":"Fani istri dari Tono. Tono ayah dari Nina.\nApa hubungan Fani terhadap Nina?","options":["Aunt","Mother","Sister","Nephew"],"correct":1,"explanation":"Fani is married to Nina's father, so Fani is Nina's mother.","explanation_id":"Fani menikah dengan ayahnya Nina, jadi Fani ibu Nina.","options_id":["Bibi","Ibu","Saudara perempuan","Keponakan laki-laki"],"tag":"Concept","level":1},{"id":592,"question":"What number continues the series?\n-2, 3, 8, 13, 18, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n-2, 3, 8, 13, 18, ?","options":["28","33","18","23"],"correct":3,"explanation":"Constant difference of 5 each step (arithmetic). 18 + (5) = 23.","explanation_id":"Selisih tetap 5 tiap langkah (aritmetika). 18 + (5) = 23.","tag":"Concept","level":1},{"id":593,"question":"5 people sit in a row (left to right):\nThere are exactly 2 person(s) between Rani and Fani.\nThere are exactly 1 person(s) between Rani and Andi.\nSani sits somewhere to the left of Rani.\nOki sits somewhere to the left of Sani.\nBased on the clues, who sits immediately to the right of Oki?","question_id":"5 orang duduk dalam satu baris (kiri ke kanan):\nAda tepat 2 orang di antara Rani dan Fani.\nAda tepat 1 orang di antara Rani dan Andi.\nSani duduk di suatu posisi sebelah kiri Rani.\nOki duduk di suatu posisi sebelah kiri Sani.\nBerdasarkan petunjuk, siapa yang duduk tepat di sebelah kanan Oki?","options":["Rani","Oki","Fani","Sani"],"correct":2,"explanation":"The only seating that fits every clue is: Oki , Fani , Andi , Sani , Rani (left→right). Therefore the answer is Fani.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Oki , Fani , Andi , Sani , Rani (kiri→kanan). Maka jawabannya Fani.","tag":"Concept","level":1},{"id":594,"question":"What number continues the series?\n2, 3, 5, 8, 13, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n2, 3, 5, 8, 13, ?","options":["34","21","22","29"],"correct":1,"explanation":"Each term is the sum of the previous two. 8 + 13 = 21.","explanation_id":"Tiap suku = jumlah dua suku sebelumnya. 8 + 13 = 21.","tag":"Concept","level":1},{"id":595,"question":"All doctors are graduates.\nAll graduates are students.\nWhich conclusion is certainly true?","question_id":"Semua dokter adalah sarjana.\nSemua sarjana adalah pelajar.\nKesimpulan mana yang pasti benar?","options":["All doctors are students.","All students are doctors.","No doctors are students.","Some students are not doctors."],"correct":0,"explanation":"Every doctor is a graduate, and every graduate is a students, so all doctors must be students (transitive).","explanation_id":"Setiap dokter adalah sarjana, dan setiap sarjana adalah pelajar, jadi semua dokter pasti pelajar (transitif).","options_id":["Semua dokter adalah pelajar.","Semua pelajar adalah dokter.","Tidak ada dokter yang pelajar.","Sebagian pelajar bukan dokter."],"tag":"Concept","level":1},{"id":596,"question":"What number continues the series?\n12, 15, 18, 21, 24, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n12, 15, 18, 21, 24, ?","options":["24","33","30","27"],"correct":3,"explanation":"Constant difference of 3 each step (arithmetic). 24 + (3) = 27.","explanation_id":"Selisih tetap 3 tiap langkah (aritmetika). 24 + (3) = 27.","tag":"Concept","level":1},{"id":597,"question":"What number continues the series?\n2, 30, 5, 33, 8, 36, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n2, 30, 5, 33, 8, 36, ?","options":["12","50","11","14"],"correct":2,"explanation":"Two interleaved patterns. Odd spots +3, even spots +3. Next continues odd: 8+3=11.","explanation_id":"Dua pola berselang-seling. Posisi ganjil +3, genap +3. Berikutnya pola ganjil: 8+3=11.","tag":"Concept","level":1},{"id":598,"question":"4 people sit in a row (left to right):\nJoko sits at the far left.\nThere are exactly 1 person(s) between Cici and Joko.\nVina sits somewhere to the left of Maya.\nBased on the clues, who sits at the far right?","question_id":"4 orang duduk dalam satu baris (kiri ke kanan):\nJoko duduk paling kiri.\nAda tepat 1 orang di antara Cici dan Joko.\nVina duduk di suatu posisi sebelah kiri Maya.\nBerdasarkan petunjuk, siapa yang duduk paling kanan?","options":["Cici","Joko","Vina","Maya"],"correct":3,"explanation":"The only seating that fits every clue is: Joko , Vina , Cici , Maya (left→right). Therefore the answer is Maya.","explanation_id":"Satu-satunya susunan yang memenuhi semua petunjuk: Joko , Vina , Cici , Maya (kiri→kanan). Maka jawabannya Maya.","tag":"Concept","level":1},{"id":599,"question":"In a code language, CHAIR is written as EJCKT.\nHow is LOGIC written?","question_id":"Dalam suatu bahasa sandi, CHAIR ditulis EJCKT.\nBagaimana LOGIC ditulis?","options":["MPHJD","PSKMG","NQIKE","ORJLF"],"correct":2,"explanation":"Each letter moves 2 step(s) forward in the alphabet (wrapping around). Applying the same shift to LOGIC gives NQIKE.","explanation_id":"Setiap huruf bergeser 2 langkah maju di alfabet (memutar). Menerapkan geseran yang sama pada LOGIC menghasilkan NQIKE.","tag":"Concept","level":1},{"id":600,"question":"Budi is heavier than Lina.\nFani is heavier than Budi.\nPutri is heavier than Dewi.\nLina is heavier than Putri.\nBased on these statements, who is the lightest?","question_id":"Budi lebih berat dari Lina.\nFani lebih berat dari Budi.\nPutri lebih berat dari Dewi.\nLina lebih berat dari Putri.\nBerdasarkan pernyataan di atas, siapa yang paling ringan?","options":["Putri","Fani","Budi","Dewi"],"correct":3,"explanation":"Ordering from heaviest to lightest: Fani > Budi > Lina > Putri > Dewi. So the answer is Dewi.","explanation_id":"Urutan dari paling berat ke paling ringan: Fani > Budi > Lina > Putri > Dewi. Jadi jawabannya Dewi.","tag":"Concept","level":1}],"programming":[{"id":1,"question":"What is the output?\n```\nSET A = [ 12, 7, 3, 12, 5,  + 7 + 8 = 40.","explanation_id":"Jumlahkan semua elemen: 4 + 10 + 11 + 7 + 8 = 40.","tag":"Pseudocode","level":1,"_section":"programming"},{"id":150,"question":"What is the output? (Swift)\n```\nlet name = \"Budi\"\nlet age = 25\nprint(\"\\(name) is \\(age)\")\n```","question_id":"Apa output kode Swift ini?","options":["\"\\(name) is \\(age)\"","\"Budi is 25\"","\"Budi is age\"","\"name is age\""],"correct":1,"explanation":"String interpolation \\(name) and \\(age) inserts the values → \"Budi is 25\".","explanation_id":"Interpolasi string \\(name) dan \\(age) menyisipkan nilainya → \"Budi is 25\".","tag":"Swift","level":2,"hidden":true,"_section":"programming"},{"id":151,"question":"What is the output?\n```\nSET total = 0\nFOR i FROM 1 TO 5\n    total = total + i\nEND FOR\nOUTPUT total\n```","question_id":"Apa output dari pseudocode ini?","options":["15","10","20","16"],"correct":0,"explanation":"The loop adds 1+2+…+5. That equals 5×6/2 = 15.","explanation_id":"Loop menjumlahkan 1+2+…+5. Hasilnya 5×6/2 = 15.","tag":"Pseudocode","level":1,"_section":"programming"},{"id":152,"question":"What is the output?\n```\nSET k = 4\nSWITCH k\n    CASE 1: OUTPUT \"Red\"\n    CASE 2: OUTPUT \"Green\"\n    CASE 3: OUTPUT \"Blue\"\n    CASE 4: OUTPUT \"Yellow\"\n    CASE 5: OUTPUT \"Black\"\n    DEFAULT: OUTPUT \"None\"\nEND SWITCH\n```","question_id":"Apa output dari pseudocode ini?","options":["\"Red\"","\"Blue\"","\"Green\"","\"Yellow\""],"correct":3,"explanation":"k = 4 matches CASE 4, which outputs \"Yellow\".","explanation_id":"k = 4 cocok dengan CASE 4, yang mencetak \"Yellow\".","tag":"Pseudocode","level":1,"_section":"programming"},{"id":153,"question":"What is the output? (Swift)\n```\nlet s: Int? = nil\nprint(s ?? 15)\n```","question_id":"Apa output kode Swift ini?","options":["15","16","14","nil"],"correct":0,"explanation":"s is nil, so the nil-coalescing `?? 15` provides the default → 15.","explanation_id":"s bernilai nil, jadi nil-coalescing `?? 15` memberi nilai def >  OUTPUT \"hi\"\nCLASS Y EXTENDS X\n    // nothing\nCLASS Z EXTENDS Y\n    // nothing\nSET o = NEW Z()\no.greet()\n```","question_id":"Apa output dari pseudocode ini?","options":["nothing","\"null\"","\"hi\"","\"error\""],"correct":2,"explanation":"Z and Y don't define greet(), so it's inherited all the way from X → \"hi\".","explanation_id":"Z dan Y tidak punya greet(), jadi diwarisi dari X → \"hi\".","options_id":["tidak ada","\"null\"","\"hi\"","\"error\""],"tag":"Concept","level":2},{"id":280,"question":"What is the output?\n```\nCLASS Base\n    METHOD greet()  ->  OUTPUT \"run\"\nCLASS Mid EXTENDS Base\n    // nothing\nCLASS Leaf EXTENDS Mid\n    // nothing\nSET o = NEW Leaf()\no.greet()\n```","question_id":"Apa output dari pseudocode ini?","options":["\"run\"","\"null\"","nothing","\"error\""],"correct":0,"explanation":"Leaf and Mid don't define greet(), so it's inherited all the way from Base → \"run\".","explanation_id":"Leaf dan Mid tidak punya greet(), jadi diwarisi dari Base → \"run\".","options_id":["\"run\"","\"null\"","tidak ada","\"error\""],"tag":"Concept","level":2},{"id":281,"question":"What is the output?\n```\nCLASS Box\n    FIELD size\n    CONSTRUCTOR(s)  ->  size = s + 16\n    METHOD getSize()  ->  RETURN size\nSET b = NEW Box(67)\nOUTPUT b.getSize()\n```","question_id":"Apa output dari pseudocode ini?","options":["82","99","84","83"],"correct":3,"explanation":"The constructor computes size = 67 + 16 = 83; getSize() returns 83.","explanation_id":"Constructor menghitung size = 67 + 16 = 83; getSize() mengembalikan 83.","tag":"Pseudocode","level":1},{"id":282,"question":"What is the output?\n```\nCLASS Box\n    FIELD size\n    CONSTRUCTOR(s)  ->  size = s + 12\n    METHOD getSize()  ->  RETURN size\nSET b = NEW Box(71)\nOUTPUT b.getSize()\n```","question_id":"Apa output dari pseudocode ini?","options":["83","95","82","84"],"correct":0,"explanation":"The constructor computes size = 71 + 12 = 83; getSize() returns 83.","explanation_id":"Constructor menghitung size = 71 + 12 = 83; getSize() mengembalikan 83.","tag":"Pseudocode","level":1},{"id":283,"question":"What is the output?\n```\nCLASS Parent\n    METHOD value()  ->  RETURN 2\nCLASS Child EXTENDS Parent\n    METHOD value()  ->  RETURN super.value() + 10\nSET o = NEW Child()\nOUTPUT o.value()\n```","question_id":"Apa output dari pseudocode ini?","options":["12","13","14","22"],"correct":0,"explanation":"Child calls super.value() = 2, then adds 10 → 12.","explanation_id":"Child memanggil super.value() = 2, lalu menambah 10 → 12.","tag":"Concept","level":3},{"id":284,"question":"What is the output?\n```\nCLASS Box\n    FIELD size\n    CONSTRUCTOR(s)  ->  size = s + 2\n    METHOD getSize()  ->  RETURN size\nSET b = NEW Box(57)\nOUTPUT b.getSize()\n```","question_id":"Apa output dari pseudocode ini?","options":["59","61","58","60"],"correct":0,"explanation":"The constructor computes size = 57 + 2 = 59; getSize() returns 59.","explanation_id":"Constructor menghitung size = 57 + 2 = 59; getSize() mengembalikan 59.","tag":"Pseudocode","level":1},{"id":285,"question":"What is the difference between method overloading and overriding?","question_id":"Apa beda overloading dan overriding method?","options":["Overloading needs inheritance; overriding does not","They are exactly the same thing","Both mean deleting a method","Overloading = same name, different parameters in one class; overriding = subclass redefines a parent method"],"correct":3,"explanation":"Overloading varies parameters within a class (compile-time); overriding replaces a parent's method in a subclass (run-time).","explanation_id":"Overloading membedakan parameter dalam satu class (saat kompilasi); overriding mengganti method induk di subclass (saat runtime).","options_id":["Overloading butuh pewarisan; overriding tidak","Keduanya hal yang persis sama","Keduanya berarti menghapus method","Overloading = nama sama, parameter beda dalam satu class; overriding = subclass menulis ulang method induk"],"tag":"Concept","level":1},{"id":286,"question":"What is the output?\n```\nCLASS Box\n    FIELD size\n    CONSTRUCTOR(s)  ->  size = s + 14\n    METHOD getSize()  ->  RETURN size\nSET b = NEW Box(5)\nOUTPUT b.getSize()\n```","question_id":"Apa output dari pseudocode ini?","options":["20","18","19","33"],"correct":2,"explanation":"The constructor computes size = 5 + 14 = 19; getSize() returns 19.","explanation_id":"Constructor menghitung size = 5 + 14 = 19; getSize() mengembalikan 19.","tag":"Pseudocode","level":1},{"id":287,"question":"What is the output?\n```\nCLASS Base\n    METHOD greet()  ->  OUTPUT \"ok\"\nCLASS Mid EXTENDS Base\n    // nothing\nCLASS Leaf EXTENDS Mid\n    // nothing\nSET o = NEW Leaf()\no.greet()\n```","question_id":"Apa output dari pseudocode ini?","options":["nothing","\"error\"","\"null\"","\"ok\""],"correct":3,"explanation":"Leaf and Mid don't define greet(), so it's inherited all the way from Base → \"ok\".","explanation_id":"Leaf dan Mid tidak punya greet(), jadi diwarisi dari Base → \"ok\".","options_id":["tidak ada","\"error\"","\"null\"","\"ok\""],"tag":"Concept","level":2},{"id":288,"question":"What is an abstract class?","question_id":"Apa itu abstract class?","options":["A fully implemented final class","A class with only static fields","A class that cannot be instantiated directly and may have unimplemented methods","Another word for an object"],"correct":2,"explanation":"An abstract class is meant to be subclassed; it can mix implemented and abstract (unimplemented) methods.","explanation_id":"Abstract class dimaksudkan untuk diturunkan; bisa mencampur method yang terisi dan yang abstrak (belum terisi).","options_id":["Class final yang terimplementasi penuh","Class yang hanya berisi field statis","Class yang tak bisa dibuat objeknya langsung dan boleh punya method tanpa isi","Kata lain untuk objek"],"tag":"Concept","level":1},{"id":289,"question":"What is the output?\n```\nCLASS Shape\n    METHOD area()  ->  RETURN 0\nCLASS Rectangle EXTENDS Shape\n    METHOD area()  ->  // override with the correct formula\nSET sh = NEW Rectangle(3, 12)\nOUTPUT sh.area()\n```","question_id":"Apa output dari pseudocode ini?","options":["36","37","38","35"],"correct":0,"explanation":"Rectangle's overridden area() is used (polymorphism): 3×12 = 36.","explanation_id":"area() versi Rectangle yang dipakai (polimorfisme): 3×12 = 36.","tag":"Pseudocode","level":1},{"id":290,"question":"What is the output?\n```\nCLASS Tool\n    METHOD speak()  ->  OUTPUT \"Generic\"\nCLASS Hammer EXTENDS Tool\n    METHOD speak()  ->  OUTPUT \"Bang\"   // override\nSET obj = NEW Hammer()\nobj.speak()\n```","question_id":"Apa output dari pseudocode ini?","options":["\"null\"","\"Generic\"","\"error\"","\"Bang\""],"correct":3,"explanation":"Hammer overrides speak(), so the Hammer's version runs and prints \"Bang\" (not the Tool's).","explanation_id":"Hammer meng-override speak(), jadi versi milik Hammer yang berjalan dan mencetak \"Bang\" (bukan milik Tool).","tag":"Pseudocode","level":1},{"id":291,"question":"What is the output? (Swift)\n```\nstruct Point {\n    var x: Int\n    var y: Int\n    func sum() -> Int { return x + y }\n}\nlet p = Point(x: 7, y: 8)\nprint(p.sum())\n```","question_id":"Apa output kode Swift ini?","options":["23","15","22","16"],"correct":1,"explanation":"sum() returns x + y = 7 + 8 = 15.","explanation_id":"sum() mengembalikan x + y = 7 + 8 = 15.","tag":"Swift","level":2,"hidden":true},{"id":292,"question":"What is the output?\n```\nCLASS Box\n    FIELD size\n    CONSTRUCTOR(s)  ->  size = s + 4\n    METHOD getSize()  ->  RETURN size\nSET b = NEW Box(42)\nOUTPUT b.getSize()\n```","question_id":"Apa output dari pseudocode ini?","options":["47","46","50","45"],"correct":1,"explanation":"The constructor computes size = 42 + 4 = 46; getSize() returns 46.","explanation_id":"Constructor menghitung size = 42 + 4 = 46; getSize() mengembalikan 46.","tag":"Pseudocode","level":1},{"id":293,"question":"What is the output?\n```\nCLASS Box\n    FIELD size\n    CONSTRUCTOR(s)  ->  size = s + 10\n    METHOD getSize()  ->  RETURN size\nSET b = NEW Box(10)\nOUTPUT b.getSize()\n```","question_id":"Apa output dari pseudocode ini?","options":["21","20","30","19"],"correct":1,"explanation":"The constructor computes size = 10 + 10 = 20; getSize() returns 20.","explanation_id":"Constructor menghitung size = 10 + 10 = 20; getSize() mengembalikan 20.","tag":"Pseudocode","level":1},{"id":294,"question":"What is the output?\n```\nCLASS Parent\n    METHOD value()  ->  RETURN 5\nCLASS Child EXTENDS Parent\n    METHOD value()  ->  RETURN super.value() + 12\nSET o = NEW Child()\nOUTPUT o.value()\n```","question_id":"Apa output dari pseudocode ini?","options":["22","29","18","17"],"correct":3,"explanation":"Child calls super.value() = 5, then adds 12 → 17.","explanation_id":"Child memanggil super.value() = 5, lalu menambah 12 → 17.","tag":"Concept","level":3},{"id":295,"question":"What is the output?\n```\nCLASS Box\n    FIELD size\n    CONSTRUCTOR(s)  ->  size = s + 4\n    METHOD getSize()  ->  RETURN size\nSET b = NEW Box(15)\nOUTPUT b.getSize()\n```","question_id":"Apa output dari pseudocode ini?","options":["20","18","23","19"],"correct":3,"explanation":"The constructor computes size = 15 + 4 = 19; getSize() returns 19.","explanation_id":"Constructor menghitung size = 15 + 4 = 19; getSize() mengembalikan 19.","tag":"Pseudocode","level":1},{"id":296,"question":"What is the output?\n```\nCLASS Shape\n    METHOD area()  ->  RETURN 0\nCLASS Rectangle EXTENDS Shape\n    METHOD area()  ->  // override with the correct formula\nSET sh = NEW Rectangle(12, 11)\nOUTPUT sh.area()\n```","question_id":"Apa output dari pseudocode ini?","options":["133","131","132","134"],"correct":2,"explanation":"Rectangle's overridden area() is used (polymorphism): 12×11 = 132.","explanation_id":"area() versi Rectangle yang dipakai (polimorfisme): 12×11 = 132.","tag":"Pseudocode","level":1},{"id":297,"question":"What is the output?\n```\nCLASS Box\n    FIELD size\n    CONSTRUCTOR(s)  ->  size = s + 19\n    METHOD getSize()  ->  RETURN size\nSET b = NEW Box(97)\nOUTPUT b.getSize()\n```","question_id":"Apa output dari pseudocode ini?","options":["117","116","115","135"],"correct":1,"explanation":"The constructor computes size = 97 + 19 = 116; getSize() returns 116.","explanation_id":"Constructor menghitung size = 97 + 19 = 116; getSize() mengembalikan 116.","tag":"Pseudocode","level":1},{"id":298,"question":"What is the output?\n```\nCLASS Shape\n    METHOD area()  ->  RETURN 0\nCLASS Rectangle EXTENDS Shape\n    METHOD area()  ->  // override with the correct formula\nSET sh = NEW Rectangle(2, 10)\nOUTPUT sh.area()\n```","question_id":"Apa output dari pseudocode ini?","options":["19","22","20","21"],"correct":2,"explanation":"Rectangle's overridden area() is used (polymorphism): 2×10 = 20.","explanation_id":"area() versi Rectangle yang dipakai (polimorfisme): 2×10 = 20.","tag":"Pseudocode","level":1},{"id":299,"question":"What is the output?\n```\nCLASS Shape\n    METHOD area()  ->  RETURN 0\nCLASS Rectangle EXTENDS Shape\n    METHOD area()  ->  // override with the correct formula\nSET sh = NEW Rectangle(3, 8)\nOUTPUT sh.area()\n```","question_id":"Apa output dari pseudocode ini?","options":["25","26","24","23"],"correct":2,"explanation":"Rectangle's overridden area() is used (polymorphism): 3×8 = 24.","explanation_id":"area() versi Rectangle yang dipakai (polimorfisme): 3×8 = 24.","tag":"Pseudocode","level":1},{"id":300,"question":"What is the output?\n```\nCLASS Box\n    FIELD size\n    CONSTRUCTOR(s)  ->  size = s + 3\n    METHOD getSize()  ->  RETURN size\nSET b = NEW Box(29)\nOUTPUT b.getSize()\n```","question_id":"Apa output dari pseudocode ini?","options":["33","31","35","32"],"correct":3,"explanation":"The constructor computes size = 29 + 3 = 32; getSize() returns 32.","explanation_id":"Constructor menghitung size = 29 + 3 = 32; getSize() mengembalikan 32.","tag":"Pseudocode","level":1}],"learn":{"programming":[{"id":"p1","title":"Variable & value","title_id":"Variabel & nilai","body":"A variable is a named box that stores a value you can read or change later. You give it a name and put data inside.","body_id":"Variabel adalah kotak bernama yang menyimpan nilai, yang bisa kamu baca atau ubah nanti. Kamu beri nama, lalu isi datanya.","code":"```\nSET age = 20      // store 20\nage = age + 1     // now 21\nOUTPUT age        // prints 21\n```"},{"id":"p2","title":"Data types","title_id":"Tipe data","body":"Common types: integer (whole numbers), float/double (decimals), string (text), and boolean (TRUE/FALSE). The type decides what operations are allowed.","body_id":"Tipe umum: integer (bilangan bulat), float/double (desimal), string (teks), dan boolean (TRUE/FALSE). Tipe menentukan operasi apa yang boleh dilakukan.","code":"```\ninteger n = 5\nfloat   pi = 3.14\nstring  name = \"Andi\"\nboolean ok = TRUE\n```"},{"id":"p3","title":"Operators","title_id":"Operator","body":"Arithmetic: + - * /, plus MOD (remainder) and DIV (integer quotient). Comparison: =, !=, <, >, <=, >=. Logical: AND, OR, NOT. MOD is great for checking even/odd or divisibility.","body_id":"Aritmetika: + - * /, ditambah MOD (sisa bagi) dan DIV (hasil bagi bulat). Perbandingan: =, !=, <, >, <=, >=. Logika: AND, OR, NOT. MOD sangat berguna untuk cek genap/ganjil atau habis dibagi.","code":"```\n7 MOD 2  -> 1   (remainder)\n7 DIV 2  -> 3   (whole part)\n(5 > 3) AND (2 < 4)  -> TRUE\n```"},{"id":"p4","title":"Conditionals (IF / ELSE)","title_id":"Percabangan (IF / ELSE)","body":"Conditionals choose which code to run based on a TRUE/FALSE test. Use ELSE IF to chain several cases; only the first matching branch runs.","body_id":"Percabangan memilih kode mana yang dijalankan berdasarkan uji TRUE/FALSE. Pakai ELSE IF untuk merangkai beberapa kasus; hanya cabang pertama yang cocok yang berjalan.","code":"```\nIF score >= 75 THEN\n    OUTPUT \"PASS\"\nELSE\n    OUTPUT \"RETRY\"\nEND IF\n```"},{"id":"p5","title":"SWITCH / CASE","title_id":"SWITCH / CASE","body":"A switch compares one value against several CASE labels and runs the matching one. DEFAULT runs when nothing matches. It's a clean alternative to many ELSE IFs.","body_id":"Switch membandingkan satu nilai dengan beberapa label CASE dan menjalankan yang cocok. DEFAULT berjalan jika tidak ada yang cocok. Ini alternatif rapi dari banyak ELSE IF.","code":"```\nSWITCH day\n    CASE 1: OUTPUT \"Mon\"\n    CASE 2: OUTPUT \"Tue\"\n    DEFAULT: OUTPUT \"Other\"\nEND SWITCH\n```"},{"id":"p6","title":"Loops (FOR / WHILE)","title_id":"Perulangan (FOR / WHILE)","body":"Loops repeat code. A FOR loop runs a known number of times; a WHILE loop runs as long as a condition stays TRUE. Always make sure a WHILE will eventually stop.","body_id":"Loop mengulang kode. FOR berjalan sebanyak yang sudah diketahui; WHILE berjalan selama syaratnya TRUE. Pastikan WHILE pada akhirnya berhenti.","code":"```\nSET total = 0\nFOR i FROM 1 TO 5\n    total = total + i   // 1+2+3+4+5\nEND FOR\nOUTPUT total            // 15\n```"},{"id":"p7","title":"Arrays / lists","title_id":"Array / list","body":"An array stores many values under one name, accessed by index. Indexing usually starts at 0, so the first element is A[0]. Common ops: length, sum, max/min, reverse.","body_id":"Array menyimpan banyak nilai dalam satu nama, diakses lewat indeks. Indeks biasanya mulai dari 0, jadi elemen pertama A[0]. Operasi umum: length, sum, max/min, reverse.","code":"```\nSET A = [ 10, 20, 30 ]\nOUTPUT A[0]        // 10 (first)\nOUTPUT length(A)   // 3\n```"},{"id":"p8","title":"Functions","title_id":"Fungsi","body":"A function is a reusable block of code with a name. It may take inputs (parameters) and give back a result (RETURN). Functions keep programs short and organized.","body_id":"Fungsi adalah blok kode yang bisa dipakai ulang dan punya nama. Bisa menerima input (parameter) dan mengembalikan hasil (RETURN). Fungsi membuat program ringkas dan rapi.","code":"```\nFUNCTION add(x, y)\n    RETURN x + y\nEND FUNCTION\nOUTPUT add(3, 4)   // 7\n```"},{"id":"p9","title":"Recursion","title_id":"Rekursi","body":"Recursion is a function that calls itself on a smaller input, with a base case that stops it. Many counting/maths problems (factorial, Fibonacci) are naturally recursive.","body_id":"Rekursi adalah fungsi yang memanggil dirinya sendiri pada input lebih kecil, dengan base case yang menghentikannya. Banyak soal hitung/matematika (faktorial, Fibonacci) bersifat rekursif.","code":"```\nFUNCTION fact(n)\n    IF n <= 1 THEN RETURN 1\n    RETURN n * fact(n - 1)\nEND FUNCTION\nfact(4) = 24\n```"},{"id":"p10","title":"Reading code (tracing)","title_id":"Membaca kode (tracing)","body":"To find a program's output, 'trace' it: go line by line, keep a small table of each variable's current value, and update it. Most entry-test programming questions are just careful tracing.","body_id":"Untuk menemukan output program, 'trace': baca baris demi baris, catat nilai terkini tiap variabel di tabel kecil, dan perbarui. Sebagian besar soal programming tes masuk hanyalah tracing yang teliti."}],"oop":[{"id":"o1","title":"What is OOP?","title_id":"Apa itu OOP?","body":"Object-Oriented Programming organizes code around 'objects' — bundles of data (fields) and behavior (methods) — instead of loose functions. It models real things as software objects.","body_id":"Pemrograman Berorientasi Objek menyusun kode di sekitar 'objek' — gabungan data (field) dan perilaku (method) — bukan fungsi yang terpisah-pisah. Ia memodelkan benda nyata sebagai objek perangkat lunak."},{"id":"o2","title":"Class vs Object","title_id":"Class vs Objek","body":"A class is the blueprint; an object is a real thing built from it. One class can create many objects, each with its own data.","body_id":"Class adalah cetak biru; objek adalah benda nyata yang dibuat darinya. Satu class bisa membuat banyak objek, masing-masing punya datanya sendiri.","code":"```\nCLASS Car { color, speed }     // blueprint\nmyCar  = NEW Car()             // object 1\nherCar = NEW Car()             // object 2\n```"},{"id":"o3","title":"Constructor","title_id":"Constructor","body":"A constructor is a special method that runs automatically when an object is created. Its job is to set the object's starting values (initialize it).","body_id":"Constructor adalah method khusus yang berjalan otomatis saat objek dibuat. Tugasnya mengatur nilai awal objek (menginisialisasi).","code":"```\nCLASS Box\n    CONSTRUCTOR(s)  ->  size = s\nb = NEW Box(10)   // size starts at 10\n```"},{"id":"o4","title":"Pillar 1 — Encapsulation","title_id":"Pilar 1 — Enkapsulasi","body":"Keep data private and expose it only through methods (getters/setters). This protects the data and lets you change internals without breaking other code.","body_id":"Jaga data tetap privat dan buka hanya lewat method (getter/setter). Ini melindungi data dan membuatmu bisa mengubah internal tanpa merusak kode lain.","code":"```\nCLASS Account\n    PRIVATE balance\n    METHOD deposit(n) -> balance = balance + n\n    METHOD getBalance() -> RETURN balance\n```"},{"id":"o5","title":"Pillar 2 — Inheritance","title_id":"Pilar 2 — Pewarisan","body":"A child class (subclass) reuses fields and methods of a parent class (superclass) and can add or change behavior. It models an 'is-a' relationship (a Dog is an Animal).","body_id":"Class anak (subclass) memakai ulang field dan method class induk (superclass) dan bisa menambah atau mengubah perilaku. Ini memodelkan hubungan 'is-a' (Anjing adalah Hewan).","code":"```\nCLASS Animal { METHOD eat() }\nCLASS Dog EXTENDS Animal { METHOD bark() }\n// Dog has both eat() and bark()\n```"},{"id":"o6","title":"Pillar 3 — Polymorphism","title_id":"Pilar 3 — Polimorfisme","body":"'Many forms': the same method call behaves differently depending on the actual object type. A parent-typed variable can run a child's overridden method.","body_id":"'Banyak bentuk': pemanggilan method yang sama berperilaku berbeda tergantung tipe objek sebenarnya. Variabel bertipe induk bisa menjalankan method anak yang di-override.","code":"```\nAnimal a = NEW Dog()\na.speak()   // runs Dog's speak(), not Animal's\n```"},{"id":"o7","title":"Pillar 4 — Abstraction","title_id":"Pilar 4 — Abstraksi","body":"Show only the essential features and hide complex detail. You use a method (e.g. send()) without needing to know how it works inside. Often done with abstract classes or interfaces.","body_id":"Tampilkan hanya fitur penting dan sembunyikan detail rumit. Kamu memakai method (mis. send()) tanpa perlu tahu cara kerjanya di dalam. Sering dengan abstract class atau interface."},{"id":"o8","title":"Overloading vs Overriding","title_id":"Overloading vs Overriding","body":"Overloading: same method name, different parameters, in the SAME class. Overriding: a SUBCLASS redefines a parent method with the same signature to change its behavior.","body_id":"Overloading: nama method sama, parameter beda, dalam class YANG SAMA. Overriding: SUBCLASS menulis ulang method induk dengan signature sama untuk mengubah perilakunya.","code":"```\n// Overloading (same class)\nadd(a, b)        add(a, b, c)\n// Overriding (subclass)\nDog.speak() replaces Animal.speak()\n```"},{"id":"o9","title":"Interface vs Abstract class","title_id":"Interface vs Abstract class","body":"An interface is a pure contract: it lists method names that implementers must provide, with no bodies. An abstract class can also include some finished methods and fields, but still can't be instantiated directly.","body_id":"Interface adalah kontrak murni: berisi daftar nama method yang wajib disediakan, tanpa isi. Abstract class boleh juga punya beberapa method jadi dan field, tapi tetap tak bisa langsung dibuat objeknya."},{"id":"o10","title":"Access modifiers","title_id":"Modifier akses","body":"They control who can see a member: private (only this class), protected (this class + subclasses), public (everyone). Good design keeps fields private and exposes behavior publicly.","body_id":"Mengontrol siapa yang boleh melihat anggota: private (hanya class ini), protected (class ini + subclass), public (semua). Desain baik menjaga field tetap private dan membuka perilaku secara public."},{"id":"o11","title":"is-a vs has-a","title_id":"is-a vs has-a","body":"'is-a' means inheritance (a Car is a Vehicle). 'has-a' means composition (a Car has an Engine — it holds an Engine object). Prefer composition when one thing simply contains another.","body_id":"'is-a' berarti pewarisan (Mobil adalah Kendaraan). 'has-a' berarti komposisi (Mobil punya Mesin — menyimpan objek Mesin). Pilih komposisi saat satu hal sekadar memuat hal lain."}],"swift":[{"id":"s1","title":"Why Swift?","title_id":"Kenapa Swift?","body":"Swift is Apple's main language for iOS/macOS apps. The Academy uses it, so getting comfortable with its basics now will make the program much easier. The real entry test uses pseudocode, but Swift practice still builds the same logic.","body_id":"Swift adalah bahasa utama Apple untuk aplikasi iOS/macOS. Academy memakainya, jadi membiasakan diri dengan dasarnya sekarang akan sangat memudahkanmu nanti. Tes masuk asli memakai pseudocode, tapi latihan Swift tetap melatih logika yang sama."},{"id":"s2","title":"let vs var","title_id":"let vs var","body":"`let` makes a constant (cannot change after set). `var` makes a variable (can change). Prefer `let` unless you really need to reassign.","body_id":"`let` membuat konstanta (tak bisa berubah setelah diisi). `var` membuat variabel (bisa berubah). Utamakan `let` kecuali kamu benar-benar perlu mengubahnya.","code":"```\nlet pi = 3.14      // constant\nvar count = 0      // variable\ncount = count + 1  // OK\n```"},{"id":"s3","title":"Basic types & inference","title_id":"Tipe dasar & inferensi","body":"Common types: Int, Double, String, Bool. Swift can infer the type from the value, so you often don't write it. You can still be explicit with a colon.","body_id":"Tipe umum: Int, Double, String, Bool. Swift bisa menebak tipe dari nilainya, jadi sering tak perlu ditulis. Kamu tetap bisa menulisnya eksplisit dengan titik dua.","code":"```\nlet name = \"Andi\"      // String (inferred)\nlet age: Int = 20      // explicit\nlet tall: Bool = true\n```"},{"id":"s4","title":"String interpolation","title_id":"Interpolasi string","body":"Insert a value into text with \\(...). It's the easy way to build messages.","body_id":"Sisipkan nilai ke dalam teks dengan \\(...). Ini cara mudah membangun pesan.","code":"```\nlet name = \"Sari\"\nprint(\"Hi \\(name)!\")   // Hi Sari!\n```"},{"id":"s5","title":"Control flow","title_id":"Alur kendali","body":"if/else and switch work like in pseudocode, but with Swift syntax and braces. switch in Swift must be exhaustive (cover all cases or have default).","body_id":"if/else dan switch bekerja seperti di pseudocode, tapi dengan sintaks Swift dan kurung kurawal. switch di Swift harus lengkap (mencakup semua kasus atau punya default).","code":"```\nif x > 10 {\n    print(\"big\")\n} else {\n    print(\"small\")\n}\n```"},{"id":"s6","title":"Loops & ranges","title_id":"Loop & rentang","body":"`for i in 1...5` loops over a closed range (1 to 5, including 5). `1..<5` excludes the last (1,2,3,4). while loops also exist.","body_id":"`for i in 1...5` mengulang rentang tertutup (1 sampai 5, termasuk 5). `1..<5` tidak menyertakan yang terakhir (1,2,3,4). while juga ada.","code":"```\nvar sum = 0\nfor i in 1...5 { sum += i }   // 15\n```"},{"id":"s7","title":"Arrays","title_id":"Array","body":"Arrays hold ordered values. Useful members: .count, .first, .max(), and helpers like .map and .filter.","body_id":"Array menyimpan nilai berurutan. Anggota berguna: .count, .first, .max(), dan pembantu seperti .map dan .filter.","code":"```\nlet a = [3, 1, 4, 1]\nprint(a.count)          // 4\nprint(a.map { $0 * 2 }) // [6, 2, 8, 2]\n```"},{"id":"s8","title":"Functions","title_id":"Fungsi","body":"Declared with `func`. Parameters have types; the return type comes after `->`. `_` before a parameter lets you call it without a label.","body_id":"Dideklarasikan dengan `func`. Parameter punya tipe; tipe kembalian setelah `->`. `_` sebelum parameter membuatmu bisa memanggil tanpa label.","code":"```\nfunc add(_ x: Int, _ y: Int) -> Int {\n    return x + y\n}\nprint(add(3, 4))   // 7\n```"},{"id":"s9","title":"Optionals","title_id":"Optional","body":"An optional (Type?) may hold a value or be nil (nothing). Use `??` to give a default when it's nil. This is a key Swift safety feature.","body_id":"Optional (Type?) bisa berisi nilai atau nil (kosong). Pakai `??` untuk memberi nilai default saat nil. Ini fitur keamanan penting di Swift.","code":"```\nlet s: Int? = nil\nprint(s ?? 10)   // 10 (default)\n```"},{"id":"s10","title":"struct vs class","title_id":"struct vs class","body":"Both bundle data and methods. A struct is a value type (copied when assigned); a class is a reference type (shared) and supports inheritance. Swift code often prefers structs.","body_id":"Keduanya menggabungkan data dan method. struct adalah tipe nilai (disalin saat di-assign); class adalah tipe referensi (dibagikan) dan mendukung pewarisan. Kode Swift sering memilih struct.","code":"```\nstruct Point { var x: Int; var y: Int }\nclass  Animal { func speak() {} }\n```"}]},"inductive":[{"id":601,"question":"What comes next in the series?\n2, 6, 18, 54, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n2, 6, 18, 54, ?","options":["108","162","144","216"],"correct":1,"explanation":"Each number is multiplied by 3: 54 × 3 = 162.","explanation_id":"Setiap angka dikali 3: 54 × 3 = 162.","options_id":["108","162","144","216"],"tag":"Inductive","level":1},{"id":602,"question":"What comes next in the series?\n1, 4, 9, 16, 25, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n1, 4, 9, 16, 25, ?","options":["30","36","32","49"],"correct":1,"explanation":"These are perfect squares: 1², 2², 3², 4², 5², 6² = 36.","explanation_id":"Ini adalah kuadrat sempurna: 1², 2², 3², 4², 5², 6² = 36.","options_id":["30","36","32","49"],"tag":"Inductive","level":1},{"id":603,"question":"What comes next in the series?\n3, 5, 8, 13, 21, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n3, 5, 8, 13, 21, ?","options":["29","34","31","32"],"correct":1,"explanation":"Each term is the sum of the two preceding terms (Fibonacci-like): 13 + 21 = 34.","explanation_id":"Setiap suku adalah jumlah dua suku sebelumnya (seperti Fibonacci): 13 + 21 = 34.","options_id":["29","34","31","32"],"tag":"Inductive","level":1},{"id":604,"question":"What comes next in the series?\n100, 91, 83, 76, 70, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n100, 91, 83, 76, 70, ?","options":["66","65","63","64"],"correct":1,"explanation":"Differences decrease by 1: -9, -8, -7, -6, -5. So 70 - 5 = 65.","explanation_id":"Selisihnya berkurang 1: -9, -8, -7, -6, -5. Jadi 70 - 5 = 65.","options_id":["66","65","63","64"],"tag":"Inductive","level":1},{"id":605,"question":"What comes next in the series?\n2, 3, 5, 7, 11, 13, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n2, 3, 5, 7, 11, 13, ?","options":["15","16","17","19"],"correct":2,"explanation":"These are prime numbers. The next prime after 13 is 17.","explanation_id":"Ini adalah bilangan prima. Prima berikutnya setelah 13 adalah 17.","options_id":["15","16","17","19"],"tag":"Inductive","level":1},{"id":606,"question":"What comes next in the series?\n1, 2, 4, 8, 16, 32, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n1, 2, 4, 8, 16, 32, ?","options":["48","60","64","56"],"correct":2,"explanation":"Each number doubles: 32 × 2 = 64.","explanation_id":"Setiap angka dikalikan 2: 32 × 2 = 64.","options_id":["48","60","64","56"],"tag":"Inductive","level":1},{"id":607,"question":"What comes next in the series?\n5, 10, 20, 40, 80, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n5, 10, 20, 40, 80, ?","options":["120","150","160","100"],"correct":2,"explanation":"Each number is doubled: 80 × 2 = 160.","explanation_id":"Setiap angka dikalikan 2: 80 × 2 = 160.","options_id":["120","150","160","100"],"tag":"Inductive","level":1},{"id":608,"question":"What comes next in the series?\n144, 121, 100, 81, 64, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n144, 121, 100, 81, 64, ?","options":["36","49","48","45"],"correct":1,"explanation":"These are perfect squares in descending order: 12², 11², 10², 9², 8², 7² = 49.","explanation_id":"Ini kuadrat sempurna menurun: 12², 11², 10², 9², 8², 7² = 49.","options_id":["36","49","48","45"],"tag":"Inductive","level":1},{"id":609,"question":"What comes next in the series?\n7, 14, 28, 56, 112, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n7, 14, 28, 56, 112, ?","options":["168","196","224","210"],"correct":2,"explanation":"Each term doubles: 112 × 2 = 224.","explanation_id":"Setiap suku dikalikan 2: 112 × 2 = 224.","options_id":["168","196","224","210"],"tag":"Inductive","level":1},{"id":610,"question":"What comes next in the series?\n1, 8, 27, 64, 125, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n1, 8, 27, 64, 125, ?","options":["196","216","180","200"],"correct":1,"explanation":"These are perfect cubes: 1³, 2³, 3³, 4³, 5³, 6³ = 216.","explanation_id":"Ini adalah kubus sempurna: 1³, 2³, 3³, 4³, 5³, 6³ = 216.","options_id":["196","216","180","200"],"tag":"Inductive","level":1},{"id":611,"question":"What comes next in the series?\n50, 47, 44, 41, 38, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n50, 47, 44, 41, 38, ?","options":["36","35","33","34"],"correct":1,"explanation":"Each term decreases by 3: 38 - 3 = 35.","explanation_id":"Setiap suku berkurang 3: 38 - 3 = 35.","options_id":["36","35","33","34"],"tag":"Inductive","level":1},{"id":612,"question":"What comes next in the series?\n3, 6, 12, 24, 48, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n3, 6, 12, 24, 48, ?","options":["72","96","84","100"],"correct":1,"explanation":"Each term doubles: 48 × 2 = 96.","explanation_id":"Setiap suku dikalikan 2: 48 × 2 = 96.","options_id":["72","96","84","100"],"tag":"Inductive","level":1},{"id":613,"question":"What comes next in the series?\n10, 13, 17, 22, 28, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n10, 13, 17, 22, 28, ?","options":["35","33","36","37"],"correct":0,"explanation":"Differences increase by 1: +3, +4, +5, +6, +7. So 28 + 7 = 35.","explanation_id":"Selisih bertambah 1: +3, +4, +5, +6, +7. Jadi 28 + 7 = 35.","options_id":["35","33","36","37"],"tag":"Inductive","level":1},{"id":614,"question":"What comes next in the series?\n1, 3, 7, 15, 31, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n1, 3, 7, 15, 31, ?","options":["61","62","63","64"],"correct":2,"explanation":"Each term is double the previous plus 1: 31 × 2 + 1 = 63.","explanation_id":"Setiap suku adalah dua kali sebelumnya ditambah 1: 31 × 2 + 1 = 63.","options_id":["61","62","63","64"],"tag":"Inductive","level":1},{"id":615,"question":"What comes next in the series?\n4, 7, 12, 19, 28, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n4, 7, 12, 19, 28, ?","options":["38","39","40","41"],"correct":1,"explanation":"Differences increase by 2: +3, +5, +7, +9, +11. So 28 + 11 = 39.","explanation_id":"Selisih bertambah 2: +3, +5, +7, +9, +11. Jadi 28 + 11 = 39.","options_id":["38","39","40","41"],"tag":"Inductive","level":1},{"id":616,"question":"What comes next in the series?\n81, 27, 9, 3, 1, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n81, 27, 9, 3, 1, ?","options":["1/2","1/3","1/4","0"],"correct":1,"explanation":"Each term is divided by 3: 1 ÷ 3 = 1/3.","explanation_id":"Setiap suku dibagi 3: 1 ÷ 3 = 1/3.","options_id":["1/2","1/3","1/4","0"],"tag":"Inductive","level":1},{"id":617,"question":"What comes next in the series?\n2, 5, 11, 23, 47, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n2, 5, 11, 23, 47
