, ?","options":["89","94","95","97"],"correct":2,"explanation":"Each term is doubled and 1 added: 47 × 2 + 1 = 95.","explanation_id":"Setiap suku dikalikan 2 lalu ditambah 1: 47 × 2 + 1 = 95.","options_id":["89","94","95","97"],"tag":"Inductive","level":1},{"id":618,"question":"What comes next in the series?\n6, 11, 21, 36, 56, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n6, 11, 21, 36, 56, ?","options":["76","81","82","80"],"correct":1,"explanation":"Differences increase by 5: +5, +10, +15, +20, +25. So 56 + 25 = 81.","explanation_id":"Selisih bertambah 5: +5, +10, +15, +20, +25. Jadi 56 + 25 = 81.","options_id":["76","81","82","80"],"tag":"Inductive","level":1},{"id":619,"question":"What comes next in the series?\n0, 1, 1, 2, 3, 5, 8, 13, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n0, 1, 1, 2, 3, 5, 8, 13, ?","options":["18","20","21","24"],"correct":2,"explanation":"Fibonacci sequence: 8 + 13 = 21.","explanation_id":"Deret Fibonacci: 8 + 13 = 21.","options_id":["18","20","21","24"],"tag":"Inductive","level":1},{"id":620,"question":"What comes next in the series?\n256, 64, 16, 4, ?","question_id":"Angka berapa yang melanjutkan deret ini?\n256, 64, 16, 4, ?","options":["2","1","0","3"],"correct":1,"explanation":"Each term is divided by 4: 4 ÷ 4 = 1.","explanation_id":"Setiap suku dibagi 4: 4 ÷ 4 = 1.","options_id":["2","1","0","3"],"tag":"Inductive","level":1},{"id":621,"question":"What comes next in the series?\nA, C, E, G, I, ?","question_id":"Huruf apa yang melanjutkan deret ini?\nA, C, E, G, I, ?","options":["J","K","L","M"],"correct":1,"explanation":"Every other letter of the alphabet. After I (9th), skip J, so K (11th).","explanation_id":"Setiap huruf ke-2 dalam alfabet. Setelah I (ke-9), lewati J, sehingga K (ke-11).","options_id":["J","K","L","M"],"tag":"Inductive","level":1},{"id":622,"question":"What comes next in the series?\nZ, X, V, T, R, ?","question_id":"Huruf apa yang melanjutkan deret ini?\nZ, X, V, T, R, ?","options":["P","Q","S","N"],"correct":0,"explanation":"Letters skip one going backwards: Z→X→V→T→R→P.","explanation_id":"Huruf melompat satu ke belakang: Z→X→V→T→R→P.","options_id":["P","Q","S","N"],"tag":"Inductive","level":1},{"id":623,"question":"What comes next in the series?\nA, B, D, G, K, ?","question_id":"Huruf apa yang melanjutkan deret ini?\nA, B, D, G, K, ?","options":["O","P","Q","R"],"correct":1,"explanation":"Gaps increase by 1: +1, +2, +3, +4, +5. K is 11th letter, +5 = P (16th).","explanation_id":"Jarak bertambah 1: +1, +2, +3, +4, +5. K adalah huruf ke-11, +5 = P (ke-16).","options_id":["O","P","Q","R"],"tag":"Inductive","level":1},{"id":624,"question":"What comes next in the series?\nB, E, H, K, N, ?","question_id":"Huruf apa yang melanjutkan deret ini?\nB, E, H, K, N, ?","options":["P","Q","R","S"],"correct":1,"explanation":"Each letter advances by 3: B(2)+3=E(5)+3=H(8)+3=K(11)+3=N(14)+3=Q(17).","explanation_id":"Setiap huruf maju 3: B(2)+3=E(5)+3=H(8)+3=K(11)+3=N(14)+3=Q(17).","options_id":["P","Q","R","S"],"tag":"Inductive","level":1},{"id":625,"question":"What comes next in the series?\nA, Z, B, Y, C, X, ?","question_id":"Huruf apa yang melanjutkan deret ini?\nA, Z, B, Y, C, X, ?","options":["D","W","E","V"],"correct":0,"explanation":"Alternating from start and end of alphabet: A,Z,B,Y,C,X,D...","explanation_id":"Bergantian dari awal dan akhir alfabet: A,Z,B,Y,C,X,D...","options_id":["D","W","E","V"],"tag":"Inductive","level":1},{"id":626,"question":"What comes next in the series?\nAZ, BY, CX, DW, ?","question_id":"Apa yang melanjutkan deret ini?\nAZ, BY, CX, DW, ?","options":["EV","EU","FV","EW"],"correct":0,"explanation":"First letter advances (A,B,C,D,E), second letter goes backwards (Z,Y,X,W,V).","explanation_id":"Huruf pertama maju (A,B,C,D,E), huruf kedua mundur (Z,Y,X,W,V).","options_id":["EV","EU","FV","EW"],"tag":"Inductive","level":1},{"id":627,"question":"What comes next in the series?\nAA, CC, EE, GG, ?","question_id":"Apa yang melanjutkan deret ini?\nAA, CC, EE, GG, ?","options":["HH","II","JJ","KK"],"correct":1,"explanation":"Each pair skips one letter: A,C,E,G,I → II.","explanation_id":"Setiap pasang melompati satu huruf: A,C,E,G,I → II.","options_id":["HH","II","JJ","KK"],"tag":"Inductive","level":1},{"id":628,"question":"What comes next in the series?\nABC, DEF, GHI, JKL, ?","question_id":"Apa yang melanjutkan deret ini?\nABC, DEF, GHI, JKL, ?","options":["MNO","NOP","LMN","MNP"],"correct":0,"explanation":"Consecutive groups of 3 letters: next group is MNO.","explanation_id":"Kelompok 3 huruf berturutan: kelompok berikutnya adalah MNO.","options_id":["MNO","NOP","LMN","MNP"],"tag":"Inductive","level":1},{"id":629,"question":"What comes next in the series?\nA1, B2, C3, D4, ?","question_id":"Apa yang melanjutkan deret ini?\nA1, B2, C3, D4, ?","options":["E4","F5","E5","D5"],"correct":2,"explanation":"Letter advances by 1, number increases by 1: E5.","explanation_id":"Huruf maju 1, angka bertambah 1: E5.","options_id":["E4","F5","E5","D5"],"tag":"Inductive","level":1},{"id":630,"question":"What comes next in the series?\nZ1, Y2, X3, W4, ?","question_id":"Apa yang melanjutkan deret ini?\nZ1, Y2, X3, W4, ?","options":["V4","V5","U5","V6"],"correct":1,"explanation":"Letter goes backwards by 1, number increases by 1: V5.","explanation_id":"Huruf mundur 1, angka bertambah 1: V5.","options_id":["V4","V5","U5","V6"],"tag":"Inductive","level":1},{"id":631,"question":"Which one does NOT belong to the group?\n25, 36, 48, 64, 81","question_id":"Mana yang TIDAK termasuk dalam kelompok ini?\n25, 36, 48, 64, 81","options":["25","36","48","64"],"correct":2,"explanation":"25, 36, 64, and 81 are perfect squares (5², 6², 8², 9²). 48 is not a perfect square.","explanation_id":"25, 36, 64, dan 81 adalah kuadrat sempurna. 48 bukan kuadrat sempurna.","options_id":["25","36","48","64"],"tag":"Inductive","level":1},{"id":632,"question":"Which one does NOT belong to the group?\n2, 3, 5, 7, 9, 11","question_id":"Mana yang TIDAK termasuk dalam kelompok ini?\n2, 3, 5, 7, 9, 11","options":["2","5","9","11"],"correct":2,"explanation":"All are prime numbers except 9, which is 3×3.","explanation_id":"Semua adalah bilangan prima kecuali 9, yaitu 3×3.","options_id":["2","5","9","11"],"tag":"Inductive","level":1},{"id":633,"question":"Which one does NOT belong to the group?\nApple, Mango, Orange, Carrot, Banana","question_id":"Mana yang TIDAK termasuk dalam kelompok ini?\nApel, Mangga, Jeruk, Wortel, Pisang","options":["Apple","Orange","Carrot","Banana"],"correct":2,"explanation":"Apple, Mango, Orange, and Banana are fruits. Carrot is a vegetable.","explanation_id":"Apel, Mangga, Jeruk, dan Pisang adalah buah. Wortel adalah sayuran.","options_id":["Apple","Orange","Carrot","Banana"],"tag":"Inductive","level":1},{"id":634,"question":"Which one does NOT belong to the group?\nNorth, South, East, West, Centre","question_id":"Mana yang TIDAK termasuk dalam kelompok ini?\nUtara, Selatan, Timur, Barat, Pusat","options":["North","South","East","Centre"],"correct":3,"explanation":"North, South, East, and West are cardinal directions. Centre is not a direction.","explanation_id":"Utara, Selatan, Timur, dan Barat adalah arah mata angin. Pusat bukan arah.","options_id":["North","South","East","Centre"],"tag":"Inductive","level":1},{"id":635,"question":"Which one does NOT belong to the group?\n3, 6, 9, 12, 14, 18","question_id":"Mana yang TIDAK termasuk dalam kelompok ini?\n3, 6, 9, 12, 14, 18","options":["6","12","14","18"],"correct":2,"explanation":"All are multiples of 3 except 14.","explanation_id":"Semua adalah kelipatan 3 kecuali 14.","options_id":["6","12","14","18"],"tag":"Inductive","level":1},{"id":636,"question":"Which one does NOT belong to the group?\nEarth, Mars, Moon, Jupiter, Venus","question_id":"Mana yang TIDAK termasuk dalam kelompok ini?\nBumi, Mars, Bulan, Jupiter, Venus","options":["Earth","Mars","Moon","Jupiter"],"correct":2,"explanation":"Earth, Mars, Jupiter, and Venus are planets. Moon is a natural satellite.","explanation_id":"Bumi, Mars, Jupiter, dan Venus adalah planet. Bulan adalah satelit alami.","options_id":["Earth","Mars","Moon","Jupiter"],"tag":"Inductive","level":1},{"id":637,"question":"Which one does NOT belong to the group?\n12, 18, 24, 30, 36, 40","question_id":"Mana yang TIDAK termasuk dalam kelompok ini?\n12, 18, 24, 30, 36, 40","options":["24","30","36","40"],"correct":3,"explanation":"12, 18, 24, 30, and 36 are multiples of 6. 40 is not.","explanation_id":"12, 18, 24, 30, dan 36 adalah kelipatan 6. 40 bukan.","options_id":["24","30","36","40"],"tag":"Inductive","level":1},{"id":638,"question":"Which one does NOT belong to the group?\nSonata, Symphony, Concerto, Opera, Novel","question_id":"Mana yang TIDAK termasuk dalam kelompok ini?\nSonata, Simfoni, Konserto, Opera, Novel","options":["Sonata","Symphony","Opera","Novel"],"correct":3,"explanation":"Sonata, Symphony, Concerto, and Opera are musical compositions. Novel is a literary work.","explanation_id":"Sonata, Simfoni, Konserto, dan Opera adalah karya musik. Novel adalah karya sastra.","options_id":["Sonata","Symphony","Opera","Novel"],"tag":"Inductive","level":1},{"id":639,"question":"Which one does NOT belong to the group?\n1, 4, 9, 16, 20, 25","question_id":"Mana yang TIDAK termasuk dalam kelompok ini?\n1, 4, 9, 16, 20, 25","options":["4","9","16","20"],"correct":3,"explanation":"1, 4, 9, 16, and 25 are perfect squares. 20 is not.","explanation_id":"1, 4, 9, 16, dan 25 adalah kuadrat sempurna. 20 bukan.","options_id":["4","9","16","20"],"tag":"Inductive","level":1},{"id":640,"question":"Which one does NOT belong to the group?\nRed, Green, Blue, Yellow, Black","question_id":"Mana yang TIDAK termasuk dalam kelompok ini?\nMerah, Hijau, Biru, Kuning, Hitam","options":["Red","Green","Blue","Black"],"correct":3,"explanation":"Red, Green, Blue, Yellow are colors of light/rainbow. Black is the absence of light (not a spectral color).","explanation_id":"Merah, Hijau, Biru, Kuning adalah warna cahaya/pelangi. Hitam adalah ketiadaan cahaya.","options_id":["Red","Green","Blue","Black"],"tag":"Inductive","level":1},{"id":641,"question":"Bird is to Nest as Bee is to ___","question_id":"Burung berhubungan dengan Sarang seperti Lebah berhubungan dengan ___","options":["Flower","Hive","Honey","Wing"],"correct":1,"explanation":"A bird lives in a nest; a bee lives in a hive.","explanation_id":"Burung tinggal di sarang; lebah tinggal di sarang lebah (hive).","options_id":["Flower","Hive","Honey","Wing"],"tag":"Inductive","level":1},{"id":642,"question":"Doctor is to Hospital as Teacher is to ___","question_id":"Dokter berhubungan dengan Rumah Sakit seperti Guru berhubungan dengan ___","options":["Book","Student","School","Lesson"],"correct":2,"explanation":"A doctor works at a hospital; a teacher works at a school.","explanation_id":"Dokter bekerja di rumah sakit; guru bekerja di sekolah.","options_id":["Book","Student","School","Lesson"],"tag":"Inductive","level":1},{"id":643,"question":"Fish is to Water as Bird is to ___","question_id":"Ikan berhubungan dengan Air seperti Burung berhubungan dengan ___","options":["Tree","Sky","Nest","Feather"],"correct":1,"explanation":"Fish lives in water; bird lives in the sky.","explanation_id":"Ikan hidup di air; burung hidup di langit.","options_id":["Tree","Sky","Nest","Feather"],"tag":"Inductive","level":1},{"id":644,"question":"Circle is to Sphere as Square is to ___","question_id":"Lingkaran berhubungan dengan Bola seperti Persegi berhubungan dengan ___","options":["Triangle","Cube","Rectangle","Cylinder"],"correct":1,"explanation":"A circle in 3D becomes a sphere; a square in 3D becomes a cube.","explanation_id":"Lingkaran dalam 3D menjadi bola; persegi dalam 3D menjadi kubus.","options_id":["Triangle","Cube","Rectangle","Cylinder"],"tag":"Inductive","level":1},{"id":645,"question":"Hot is to Cold as Day is to ___","question_id":"Panas berhubungan dengan Dingin seperti Siang berhubungan dengan ___","options":["Morning","Night","Evening","Dusk"],"correct":1,"explanation":"Hot and cold are opposites; day and night are opposites.","explanation_id":"Panas dan dingin adalah lawan kata; siang dan malam adalah lawan kata.","options_id":["Morning","Night","Evening","Dusk"],"tag":"Inductive","level":1},{"id":646,"question":"Pen is to Write as Knife is to ___","question_id":"Pena berhubungan dengan Menulis seperti Pisau berhubungan dengan ___","options":["Sharp","Metal","Cut","Cook"],"correct":2,"explanation":"A pen is used to write; a knife is used to cut.","explanation_id":"Pena digunakan untuk menulis; pisau digunakan untuk memotong.","options_id":["Sharp","Metal","Cut","Cook"],"tag":"Inductive","level":1},{"id":647,"question":"Eye is to See as Ear is to ___","question_id":"Mata berhubungan dengan Melihat seperti Telinga berhubungan dengan ___","options":["Head","Hear","Sound","Listen"],"correct":1,"explanation":"Eyes are used to see; ears are used to hear.","explanation_id":"Mata digunakan untuk melihat; telinga digunakan untuk mendengar.","options_id":["Head","Hear","Sound","Listen"],"tag":"Inductive","level":1},{"id":648,"question":"Book is to Library as Painting is to ___","question_id":"Buku berhubungan dengan Perpustakaan seperti Lukisan berhubungan dengan ___","options":["Artist","Museum","Canvas","Gallery"],"correct":3,"explanation":"Books are stored in a library; paintings are displayed in a gallery.","explanation_id":"Buku disimpan di perpustakaan; lukisan dipajang di galeri.","options_id":["Artist","Museum","Canvas","Gallery"],"tag":"Inductive","level":1},{"id":649,"question":"Gloves are to Hands as Shoes are to ___","question_id":"Sarung tangan berhubungan dengan Tangan seperti Sepatu berhubungan dengan ___","options":["Socks","Feet","Walk","Leather"],"correct":1,"explanation":"Gloves are worn on hands; shoes are worn on feet.","explanation_id":"Sarung tangan dipakai di tangan; sepatu dipakai di kaki.","options_id":["Socks","Feet","Walk","Leather"],"tag":"Inductive","level":1},{"id":650,"question":"Caterpillar is to Butterfly as Tadpole is to ___","question_id":"Ulat berhubungan dengan Kupu-kupu seperti Berudu berhubungan dengan ___","options":["Fish","Frog","Lizard","Turtle"],"correct":1,"explanation":"A caterpillar transforms into a butterfly; a tadpole transforms into a frog.","explanation_id":"Ulat berubah menjadi kupu-kupu; berudu berubah menjadi katak.","options_id":["Fish","Frog","Lizard","Turtle"],"tag":"Inductive","level":1},{"id":651,"question":"In a 3×3 grid, the top row has values 1, 2, 3. The middle row has 4, 5, 6. What is the sum of the bottom row if each column sums to 12?","question_id":"Dalam kisi 3×3, baris atas bernilai 1, 2, 3. Baris tengah 4, 5, 6. Berapa jumlah baris bawah jika setiap kolom berjumlah 12?","options":["15","21","18","24"],"correct":0,"explanation":"Column 1: 12-1-4=7, Column 2: 12-2-5=5, Column 3: 12-3-6=3. Bottom row sum = 15.","explanation_id":"Kolom 1: 12-1-4=7, Kolom 2: 12-2-5=5, Kolom 3: 12-3-6=3. Jumlah baris bawah = 15.","options_id":["15","21","18","24"],"tag":"Inductive","level":1},{"id":652,"question":"Each row and column in a 3×3 magic square sums to 15. The center is 5. The top-right corner is 2. What is the bottom-left corner?","question_id":"Setiap baris dan kolom dalam kotak ajaib 3×3 berjumlah 15. Pusatnya adalah 5. Sudut kanan atas adalah 2. Berapa sudut kiri bawah?","options":["6","8","4","9"],"correct":1,"explanation":"In a 3×3 magic square with center 5, opposite corners sum to 10. If top-right is 2, bottom-left is 10-2=8.","explanation_id":"Dalam kotak ajaib 3×3 dengan pusat 5, sudut yang berseberangan berjumlah 10. Jika kanan atas = 2, kiri bawah = 10-2 = 8.","options_id":["6","8","4","9"],"tag":"Inductive","level":1},{"id":653,"question":"A pattern: Row 1 = [2, 4, 6], Row 2 = [3, 9, 27], Row 3 = [5, 25, ?].\nWhat replaces the ?","question_id":"Sebuah pola: Baris 1 = [2, 4, 6], Baris 2 = [3, 9, 27], Baris 3 = [5, 25, ?]. Apa yang menggantikan ?","options":["50","100","125","75"],"correct":2,"explanation":"Row 1: ×2, ×2. Row 2: ×3, ×3. Row 3: ×5, ×5. So 25×5=125.","explanation_id":"Baris 1: ×2, ×2. Baris 2: ×3, ×3. Baris 3: ×5, ×5. Jadi 25×5=125.","options_id":["50","100","125","75"],"tag":"Inductive","level":1},{"id":654,"question":"In a grid, each row follows the rule: multiply the first number by 3 to get the second, multiply by 3 again to get the third.\nRow 1: 2, 6, 18\nRow 2: 4, 12, ?\nWhat replaces the ?","question_id":"Dalam kisi, setiap baris mengikuti aturan: kalikan angka pertama dengan 3 untuk mendapat kedua, kalikan 3 lagi untuk ketiga.\nBaris 1: 2, 6, 18\nBaris 2: 4, 12, ?\nApa yang menggantikan ?","options":["24","36","48","16"],"correct":1,"explanation":"12 × 3 = 36.","explanation_id":"12 × 3 = 36.","options_id":["24","36","48","16"],"tag":"Inductive","level":1},{"id":655,"question":"A 3×3 grid: each number equals the product of the row number and column number.\nRow 1: 1, 2, 3\nRow 2: 2, 4, 6\nRow 3: 3, 6, ?\nWhat replaces the ?","question_id":"Kisi 3×3: setiap angka sama dengan hasil kali nomor baris dan kolom.\nBaris 1: 1, 2, 3\nBaris 2: 2, 4, 6\nBaris 3: 3, 6, ?\nApa yang menggantikan ?","options":["7","8","9","12"],"correct":2,"explanation":"Row 3 × Column 3 = 3 × 3 = 9.","explanation_id":"Baris 3 × Kolom 3 = 3 × 3 = 9.","options_id":["7","8","9","12"],"tag":"Inductive","level":1},{"id":656,"question":"A rule is applied to each pair: (2→6), (3→9), (5→15), (7→?).\nWhat is the rule and what is the missing value?","question_id":"Sebuah aturan diterapkan pada setiap pasangan: (2→6), (3→9), (5→15), (7→?).\nApa aturannya dan berapa nilai yang hilang?","options":["14","21","28","49"],"correct":1,"explanation":"Rule: multiply by 3. 7 × 3 = 21.","explanation_id":"Aturan: kalikan dengan 3. 7 × 3 = 21.","options_id":["14","21","28","49"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":657,"question":"A rule is applied: (4→9), (6→13), (8→17), (10→?).\nWhat is the missing value?","question_id":"Sebuah aturan diterapkan: (4→9), (6→13), (8→17), (10→?).\nBerapa nilai yang hilang?","options":["19","21","23","25"],"correct":1,"explanation":"Rule: multiply by 2 then add 1. 10 × 2 + 1 = 21.","explanation_id":"Aturan: kalikan 2 lalu tambah 1. 10 × 2 + 1 = 21.","options_id":["19","21","23","25"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":658,"question":"A rule is applied: (1→1), (2→4), (3→9), (4→16), (5→?).\nWhat is the missing value?","question_id":"Sebuah aturan diterapkan: (1→1), (2→4), (3→9), (4→16), (5→?).\nBerapa nilai yang hilang?","options":["20","25","30","36"],"correct":1,"explanation":"Rule: square the input. 5² = 25.","explanation_id":"Aturan: kuadratkan input. 5² = 25.","options_id":["20","25","30","36"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":659,"question":"A rule is applied: (10→8), (15→13), (20→18), (25→?).\nWhat is the missing value?","question_id":"Sebuah aturan diterapkan: (10→8), (15→13), (20→18), (25→?).\nBerapa nilai yang hilang?","options":["21","22","23","24"],"correct":2,"explanation":"Rule: subtract 2. 25 - 2 = 23.","explanation_id":"Aturan: kurangi 2. 25 - 2 = 23.","options_id":["21","22","23","24"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":660,"question":"A rule is applied: (2→5), (4→17), (6→37), (8→?).\nWhat is the missing value?","question_id":"Sebuah aturan diterapkan: (2→5), (4→17), (6→37), (8→?).\nBerapa nilai yang hilang?","options":["55","63","65","70"],"correct":2,"explanation":"Rule: n² + 1. 8² + 1 = 65.","explanation_id":"Aturan: n² + 1. 8² + 1 = 65.","options_id":["55","63","65","70"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":661,"question":"A rule maps words to numbers: CAT→3, FISH→4, ELEPHANT→8, DOG→?","question_id":"Sebuah aturan memetakan kata ke angka: CAT→3, FISH→4, ELEPHANT→8, DOG→?","options":["2","3","4","5"],"correct":1,"explanation":"Rule: count the letters. DOG has 3 letters → 3.","explanation_id":"Aturan: hitung hurufnya. DOG memiliki 3 huruf → 3.","options_id":["2","3","4","5"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":662,"question":"A rule is applied: (3→12), (5→30), (7→56), (9→?).\nWhat is the missing value?","question_id":"Sebuah aturan diterapkan: (3→12), (5→30), (7→56), (9→?).\nBerapa nilai yang hilang?","options":["72","90","81","88"],"correct":1,"explanation":"Rule: n × (n+1). 9 × 10 = 90.","explanation_id":"Aturan: n × (n+1). 9 × 10 = 90.","options_id":["72","90","81","88"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":663,"question":"A rule maps: MON→1, TUE→2, WED→3, THU→4, FRI→?, SAT→6, SUN→7.","question_id":"Sebuah aturan memetakan: MON→1, TUE→2, WED→3, THU→4, FRI→?, SAT→6, SUN→7.","options":["4","5","6","7"],"correct":1,"explanation":"Rule: day number of the week. Friday is the 5th day.","explanation_id":"Aturan: nomor urut hari dalam seminggu. Jumat adalah hari ke-5.","options_id":["4","5","6","7"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":664,"question":"A rule is applied: (100→10), (81→9), (64→8), (49→?).\nWhat is the missing value?","question_id":"Sebuah aturan diterapkan: (100→10), (81→9), (64→8), (49→?).\nBerapa nilai yang hilang?","options":["6","7","8","5"],"correct":1,"explanation":"Rule: square root. √49 = 7.","explanation_id":"Aturan: akar kuadrat. √49 = 7.","options_id":["6","7","8","5"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":665,"question":"A rule is applied: (1→2), (2→6), (3→24), (4→120), (5→?).\nWhat is the missing value?","question_id":"Sebuah aturan diterapkan: (1→2), (2→6), (3→24), (4→120), (5→?).\nBerapa nilai yang hilang?","options":["480","600","720","840"],"correct":2,"explanation":"Rule: (n+1)! The factorial of (n+1). (5+1)! = 6! = 720.","explanation_id":"Aturan: (n+1)! Faktorial dari (n+1). 6! = 720.","options_id":["480","600","720","840"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":666,"question":"A rule maps shapes to numbers: Triangle→3, Square→4, Pentagon→5, Hexagon→?","question_id":"Sebuah aturan memetakan bentuk ke angka: Segitiga→3, Persegi→4, Segilima→5, Segienam→?","options":["5","6","7","8"],"correct":1,"explanation":"Rule: number of sides. Hexagon has 6 sides.","explanation_id":"Aturan: jumlah sisi. Segienam memiliki 6 sisi.","options_id":["5","6","7","8"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":667,"question":"A rule is applied: (2→3), (4→5), (6→7), (8→?).\nWhat is the missing value?","question_id":"Sebuah aturan diterapkan: (2→3), (4→5), (6→7), (8→?).\nBerapa nilai yang hilang?","options":["8","9","10","11"],"correct":1,"explanation":"Rule: add 1. 8 + 1 = 9.","explanation_id":"Aturan: tambah 1. 8 + 1 = 9.","options_id":["8","9","10","11"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":668,"question":"A rule maps: JAN→1, MAR→3, MAY→5, JUL→7, SEP→?","question_id":"Sebuah aturan memetakan: JAN→1, MAR→3, MAY→5, JUL→7, SEP→?","options":["7","8","9","10"],"correct":2,"explanation":"Rule: month number. September is the 9th month.","explanation_id":"Aturan: nomor bulan. September adalah bulan ke-9.","options_id":["7","8","9","10"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":669,"question":"A rule is applied: (5→25), (6→36), (7→49), (8→?).\nWhat is the missing value?","question_id":"Sebuah aturan diterapkan: (5→25), (6→36), (7→49), (8→?).\nBerapa nilai yang hilang?","options":["56","64","72","81"],"correct":1,"explanation":"Rule: square. 8² = 64.","explanation_id":"Aturan: kuadrat. 8² = 64.","options_id":["56","64","72","81"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":670,"question":"A rule maps words to numbers: SUN→19, MOON→19, STAR→19, RAIN→?","question_id":"Sebuah aturan memetakan kata ke angka: SUN→19, MOON→19, STAR→19, RAIN→?","options":["17","18","19","20"],"correct":2,"explanation":"Rule: sum of letter positions (A=1…Z=26). R+A+I+N = 18+1+9+14 = 42... wait: S+U+N=19+21+14=54, not 19. Rule is count letters: SUN=3, MOON=4, STAR=4. Let me recheck — SUN→19=S(19), MOON→M(13)? Rule: first letter position. S=19, M=13... Actually S=19, M=13 don't match. Rule: number of letters × something. Simplest: RAIN has 4 letters, same as MOON/STAR→19? No. Rule is first letter alphabetical position: S=19, M=13, S=19, R=18.","explanation_id":"Aturan: posisi alfabet huruf pertama. R = huruf ke-18.","options_id":["17","18","19","20"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":671,"question":"A rule is applied: (1→0), (2→1), (4→2), (8→3), (16→?).\nWhat is the missing value?","question_id":"Sebuah aturan diterapkan: (1→0), (2→1), (4→2), (8→3), (16→?).\nBerapa nilai yang hilang?","options":["3","4","5","6"],"correct":1,"explanation":"Rule: log base 2. log₂(16) = 4.","explanation_id":"Aturan: logaritma basis 2. log₂(16) = 4.","options_id":["3","4","5","6"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":672,"question":"A rule maps: ACE→3, BDF→3, GIK→3, MOQ→?","question_id":"Sebuah aturan memetakan: ACE→3, BDF→3, GIK→3, MOQ→?","options":["2","3","4","5"],"correct":1,"explanation":"Rule: count the letters in each group. MOQ has 3 letters → 3.","explanation_id":"Aturan: hitung huruf di setiap kelompok. MOQ memiliki 3 huruf → 3.","options_id":["2","3","4","5"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":673,"question":"A rule is applied: (0→1), (1→1), (2→2), (3→6), (4→24), (5→?).\nWhat is the missing value?","question_id":"Sebuah aturan diterapkan: (0→1), (1→1), (2→2), (3→6), (4→24), (5→?).\nBerapa nilai yang hilang?","options":["60","100","120","144"],"correct":2,"explanation":"Rule: factorial. 5! = 120.","explanation_id":"Aturan: faktorial. 5! = 120.","options_id":["60","100","120","144"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":674,"question":"A rule is applied: (3→9), (4→16), (5→25), (6→36), (7→?).\nWhat is the missing value?","question_id":"Sebuah aturan diterapkan: (3→9), (4→16), (5→25), (6→36), (7→?).\nBerapa nilai yang hilang?","options":["42","47","49","56"],"correct":2,"explanation":"Rule: square. 7² = 49.","explanation_id":"Aturan: kuadrat. 7² = 49.","options_id":["42","47","49","56"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":675,"question":"A rule is applied: (1→3), (2→5), (3→7), (4→9), (10→?).\nWhat is the missing value?","question_id":"Sebuah aturan diterapkan: (1→3), (2→5), (3→7), (4→9), (10→?).\nBerapa nilai yang hilang?","options":["19","21","23","25"],"correct":1,"explanation":"Rule: 2n + 1. 2×10 + 1 = 21.","explanation_id":"Aturan: 2n + 1. 2×10 + 1 = 21.","options_id":["19","21","23","25"],"tag":"Inductive","subtype":"Rule Detection","level":1},{"id":676,"question":"What comes next?\n▲ ■ ● ▲ ■ ● ▲ ■ ?","question_id":"Apa yang berikutnya?\n▲ ■ ● ▲ ■ ● ▲ ■ ?","options":["▲","■","●","◆"],"correct":2,"explanation":"Pattern repeats every 3: ▲ ■ ●. The 9th item is ●.","explanation_id":"Pola berulang setiap 3: ▲ ■ ●. Item ke-9 adalah ●.","options_id":["▲","■","●","◆"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":677,"question":"What comes next in this alphanumeric sequence?\n2A, 4B, 6C, 8D, ?","question_id":"Apa yang berikutnya dalam urutan alfanumerik ini?\n2A, 4B, 6C, 8D, ?","options":["9E","10E","10F","12E"],"correct":1,"explanation":"Numbers increase by 2, letters advance by 1: 10E.","explanation_id":"Angka bertambah 2, huruf maju 1: 10E.","options_id":["9E","10E","10F","12E"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":678,"question":"What comes next?\n1, 2, 4, 7, 11, 16, ?","question_id":"Apa yang berikutnya?\n1, 2, 4, 7, 11, 16, ?","options":["20","21","22","23"],"correct":2,"explanation":"Differences: +1, +2, +3, +4, +5, +6. 16 + 6 = 22.","explanation_id":"Selisih: +1, +2, +3, +4, +5, +6. 16 + 6 = 22.","options_id":["20","21","22","23"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":679,"question":"What comes next?\nAB, CD, EF, GH, ?","question_id":"Apa yang berikutnya?\nAB, CD, EF, GH, ?","options":["HI","IJ","JK","KL"],"correct":1,"explanation":"Consecutive letter pairs: IJ follows GH.","explanation_id":"Pasang huruf berturutan: IJ mengikuti GH.","options_id":["HI","IJ","JK","KL"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":680,"question":"What comes next?\n1, 1, 2, 3, 5, 8, 13, ?","question_id":"Apa yang berikutnya?\n1, 1, 2, 3, 5, 8, 13, ?","options":["18","20","21","24"],"correct":2,"explanation":"Fibonacci: 8 + 13 = 21.","explanation_id":"Fibonacci: 8 + 13 = 21.","options_id":["18","20","21","24"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":681,"question":"What comes next?\nZ, W, T, Q, N, ?","question_id":"Apa yang berikutnya?\nZ, W, T, Q, N, ?","options":["J","K","L","M"],"correct":1,"explanation":"Each letter goes back 3: Z(26)→W(23)→T(20)→Q(17)→N(14)→K(11).","explanation_id":"Setiap huruf mundur 3: Z(26)→W(23)→T(20)→Q(17)→N(14)→K(11).","options_id":["J","K","L","M"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":682,"question":"What comes next?\n2, 6, 12, 20, 30, ?","question_id":"Apa yang berikutnya?\n2, 6, 12, 20, 30, ?","options":["40","42","44","46"],"correct":1,"explanation":"Pattern: n(n+1). 1×2=2, 2×3=6, 3×4=12, 4×5=20, 5×6=30, 6×7=42.","explanation_id":"Pola: n(n+1). 6×7=42.","options_id":["40","42","44","46"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":683,"question":"What comes next?\nA1Z, B2Y, C3X, D4W, ?","question_id":"Apa yang berikutnya?\nA1Z, B2Y, C3X, D4W, ?","options":["E5V","E4V","F5V","E5U"],"correct":0,"explanation":"First letter advances, middle number increases by 1, last letter goes backward. E5V.","explanation_id":"Huruf pertama maju, angka tengah bertambah 1, huruf terakhir mundur. E5V.","options_id":["E5V","E4V","F5V","E5U"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":684,"question":"What comes next?\n3, 7, 13, 21, 31, ?","question_id":"Apa yang berikutnya?\n3, 7, 13, 21, 31, ?","options":["41","43","45","47"],"correct":1,"explanation":"Differences: +4, +6, +8, +10, +12. 31 + 12 = 43.","explanation_id":"Selisih: +4, +6, +8, +10, +12. 31 + 12 = 43.","options_id":["41","43","45","47"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":685,"question":"What comes next?\nAA1, BB2, CC3, DD4, ?","question_id":"Apa yang berikutnya?\nAA1, BB2, CC3, DD4, ?","options":["EE4","EE5","FF5","DD5"],"correct":1,"explanation":"Pattern: double letter advances, number increases by 1. EE5.","explanation_id":"Pola: huruf ganda maju, angka bertambah 1. EE5.","options_id":["EE4","EE5","FF5","DD5"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":686,"question":"What comes next?\n1, 4, 13, 40, 121, ?","question_id":"Apa yang berikutnya?\n1, 4, 13, 40, 121, ?","options":["244","364","400","484"],"correct":1,"explanation":"Rule: 3n + 1. 1→4→13→40→121→364.","explanation_id":"Aturan: 3n + 1. 121×3 + 1 = 364.","options_id":["244","364","400","484"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":687,"question":"What comes next?\nJ, F, M, A, M, J, J, A, ?","question_id":"Apa yang berikutnya?\nJ, F, M, A, M, J, J, A, ?","options":["O","S","N","D"],"correct":1,"explanation":"First letters of months: Jan, Feb, Mar, Apr, May, Jun, Jul, Aug, Sep → S.","explanation_id":"Huruf pertama nama bulan. Setelah Agustus → September → S.","options_id":["O","S","N","D"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":688,"question":"What comes next?\n2, 3, 5, 8, 13, 21, ?","question_id":"Apa yang berikutnya?\n2, 3, 5, 8, 13, 21, ?","options":["29","32","34","36"],"correct":2,"explanation":"Fibonacci-like: 13 + 21 = 34.","explanation_id":"Seperti Fibonacci: 13 + 21 = 34.","options_id":["29","32","34","36"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":689,"question":"What comes next?\nO, T, T, F, F, S, S, E, ?","question_id":"Apa yang berikutnya?\nO, T, T, F, F, S, S, E, ?","options":["N","T","E","F"],"correct":0,"explanation":"First letters of: One, Two, Three, Four, Five, Six, Seven, Eight, Nine → N.","explanation_id":"Huruf pertama: One, Two, Three, Four, Five, Six, Seven, Eight, Nine → N.","options_id":["N","T","E","F"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":690,"question":"What comes next?\n5, 10, 9, 18, 17, 34, 33, ?","question_id":"Apa yang berikutnya?\n5, 10, 9, 18, 17, 34, 33, ?","options":["32","66","65","62"],"correct":1,"explanation":"Pattern alternates: ×2, -1. 33 × 2 = 66.","explanation_id":"Pola bergantian: ×2, -1. 33 × 2 = 66.","options_id":["32","66","65","62"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":691,"question":"What comes next?\n1, 2, 6, 24, 120, ?","question_id":"Apa yang berikutnya?\n1, 2, 6, 24, 120, ?","options":["240","600","720","840"],"correct":2,"explanation":"Factorials: 1!, 2!, 3!, 4!, 5!, 6! = 720.","explanation_id":"Faktorial: 1!, 2!, 3!, 4!, 5!, 6! = 720.","options_id":["240","600","720","840"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":692,"question":"What comes next?\nM, T, W, T, F, S, ?","question_id":"Apa yang berikutnya?\nM, T, W, T, F, S, ?","options":["M","S","T","W"],"correct":1,"explanation":"Days of the week: Mon, Tue, Wed, Thu, Fri, Sat, Sun → S.","explanation_id":"Hari dalam seminggu: Sen, Sel, Rab, Kam, Jum, Sab, Min → S.","options_id":["M","S","T","W"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":693,"question":"What comes next?\n1, 3, 6, 10, 15, 21, ?","question_id":"Apa yang berikutnya?\n1, 3, 6, 10, 15, 21, ?","options":["25","26","27","28"],"correct":3,"explanation":"Triangular numbers: +1, +2, +3, +4, +5, +6, +7. 21 + 7 = 28.","explanation_id":"Bilangan segitiga: 21 + 7 = 28.","options_id":["25","26","27","28"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":694,"question":"What comes next?\nA, E, I, O, ?","question_id":"Apa yang berikutnya?\nA, E, I, O, ?","options":["P","Q","U","V"],"correct":2,"explanation":"These are vowels: A, E, I, O, U.","explanation_id":"Ini adalah huruf vokal: A, E, I, O, U.","options_id":["P","Q","U","V"],"tag":"Inductive","subtype":"Abstract","level":1},{"id":695,"question":"What comes next?\n1, 2, 4, 8, 16, 32, 64, ?","question_id":"Apa yang berikutnya?\n1, 2, 4, 8, 16, 32, 64, ?","options":["96","112","128","132"],"correct":2,"explanation":"Powers of 2: 64 × 2 = 128.","explanation_id":"Pangkat 2: 64 × 2 = 128.","options_id":["96","112","128","132"],"tag":"Inductive","subtype":"Abstract","level":1}],"diagrammatic":[{"id":701,"question":"A shape rule: if you rotate a triangle 90° clockwise, which direction does the apex point?\nOriginal: apex points UP","question_id":"Aturan bentuk: jika segitiga diputar 90° searah jarum jam, ke mana puncaknya mengarah?\nAwal: puncak mengarah KE ATAS","options":["Up","Right","Down","Left"],"correct":1,"explanation":"Rotating UP 90° clockwise → apex points RIGHT.","explanation_id":"Memutar KE ATAS 90° searah jarum jam → puncak mengarah KE KANAN.","options_id":["Up","Right","Down","Left"],"tag":"Diagrammatic","level":1},{"id":702,"question":"Shape transformation rule: each step, a square loses one side and becomes a new shape.\nSquare → Triangle → ?\nWhat shape comes next?","question_id":"Aturan transformasi: setiap langkah, persegi kehilangan satu sisi.\nPersegi → Segitiga → ?\nBentuk apa berikutnya?","options":["Circle","Line","Pentagon","Hexagon"],"correct":1,"explanation":"Square (4 sides) → Triangle (3 sides) → Line (2 sides... a shape with 2 'sides' is a line/degenerate polygon).","explanation_id":"Persegi (4 sisi) → Segitiga (3 sisi) → Garis (2 sisi).","options_id":["Circle","Line","Pentagon","Hexagon"],"tag":"Diagrammatic","level":1},{"id":703,"question":"Pattern rule: shapes alternate between filled and outlined.\nShape 1: filled circle\nShape 2: outlined circle\nShape 3: filled triangle\nShape 4: outlined triangle\nShape 5: filled square\nWhat is Shape 6?","question_id":"Aturan pola: bentuk bergantian antara terisi dan bergaris luar.\nBentuk 1: lingkaran terisi\nBentuk 2: lingkaran bergaris luar\nBentuk 3: segitiga terisi\nBentuk 4: segitiga bergaris luar\nBentuk 5: persegi terisi\nApa Bentuk 6?","options":["Filled square","Outlined square","Filled circle","Outlined circle"],"correct":1,"explanation":"The pattern pairs shapes: filled then outlined. Shape 5 is filled square, so Shape 6 is outlined square.","explanation_id":"Pola memasangkan bentuk: terisi lalu bergaris luar. Bentuk 5 adalah persegi terisi, jadi Bentuk 6 adalah persegi bergaris luar.","options_id":["Filled square","Outlined square","Filled circle","Outlined circle"],"tag":"Diagrammatic","level":1},{"id":704,"question":"A shape sequence: Triangle, Square, Pentagon, Hexagon, ?\nWhat comes next based on number of sides?","question_id":"Urutan bentuk: Segitiga, Persegi, Segilima, Segienam, ?\nApa yang berikutnya berdasarkan jumlah sisi?","options":["Heptagon","Octagon","Circle","Diamond"],"correct":0,"explanation":"Each shape adds one side: 3, 4, 5, 6, 7. A heptagon has 7 sides.","explanation_id":"Setiap bentuk menambah satu sisi: 3, 4, 5, 6, 7. Heptagon memiliki 7 sisi.","options_id":["Heptagon","Octagon","Circle","Diamond"],"tag":"Diagrammatic","level":1},{"id":705,"question":"Shape rule: each step, double the number of shapes.\nStep 1: 1 circle\nStep 2: 2 circles\nStep 3: 4 circles\nStep 4: ?","question_id":"Aturan bentuk: setiap langkah, jumlah bentuk digandakan.\nLangkah 1: 1 lingkaran\nLangkah 2: 2 lingkaran\nLangkah 3: 4 lingkaran\nLangkah 4: ?","options":["6 circles","8 circles","10 circles","12 circles"],"correct":1,"explanation":"The pattern doubles: 1, 2, 4, 8. Step 4 = 8 circles.","explanation_id":"Pola berlipat ganda: 1, 2, 4, 8. Langkah 4 = 8 lingkaran.","options_id":["6 circles","8 circles","10 circles","12 circles"],"tag":"Diagrammatic","level":1},{"id":706,"question":"Logical rule: Shape A AND Shape B = overlap shown.\nIf A is a circle with area 10 and B is a square with area 10, and they overlap with area 3, what is A OR B (union)?","question_id":"Aturan logis: Bentuk A DAN Bentuk B = tumpang tindih ditampilkan.\nJika A adalah lingkaran dengan luas 10 dan B adalah persegi dengan luas 10, dan mereka tumpang tindih dengan luas 3, berapa A ATAU B (gabungan)?","options":["20","17","13","23"],"correct":1,"explanation":"Union = A + B - overlap = 10 + 10 - 3 = 17.","explanation_id":"Gabungan = A + B - tumpang tindih = 10 + 10 - 3 = 17.","options_id":["20","17","13","23"],"tag":"Diagrammatic","level":1},{"id":707,"question":"Pattern: the number inside each shape equals the number of sides.\nA triangle has ?, a square has ?, a pentagon has ?","question_id":"Pola: angka di dalam setiap bentuk sama dengan jumlah sisinya.\nSegitiga memiliki ?, persegi memiliki ?, segilima memiliki ?","options":["3, 4, 5","4, 5, 6","3, 5, 6","2, 4, 6"],"correct":0,"explanation":"Triangle = 3 sides, Square = 4 sides, Pentagon = 5 sides.","explanation_id":"Segitiga = 3 sisi, Persegi = 4 sisi, Segilima = 5 sisi.","options_id":["3, 4, 5","4, 5, 6","3, 5, 6","2, 4, 6"],"tag":"Diagrammatic","level":1},{"id":708,"question":"Shape rule: rotate 180°.\nIf an arrow points to the TOP-RIGHT, after 180° rotation it points to the ?","question_id":"Aturan bentuk: putar 180°.\nJika panah mengarah ke KANAN ATAS, setelah rotasi 180° ia mengarah ke ?","options":["Top-left","Bottom-right","Bottom-left","Top-right"],"correct":2,"explanation":"Rotating 180° reverses direction completely: top-right → bottom-left.","explanation_id":"Memutar 180° membalik arah sepenuhnya: kanan atas → kiri bawah.","options_id":["Top-left","Bottom-right","Bottom-left","Top-right"],"tag":"Diagrammatic","level":1},{"id":709,"question":"Transformation sequence:\n- Shape 1: 1 dot inside\n- Shape 2: 3 dots inside\n- Shape 3: 6 dots inside\n- Shape 4: 10 dots inside\n- Shape 5: ?","question_id":"Urutan transformasi:\n- Bentuk 1: 1 titik di dalam\n- Bentuk 2: 3 titik di dalam\n- Bentuk 3: 6 titik di dalam\n- Bentuk 4: 10 titik di dalam\n- Bentuk 5: ?","options":["12 dots","14 dots","15 dots","16 dots"],"correct":2,"explanation":"Triangular numbers: 1, 3, 6, 10, 15 (adding 2, 3, 4, 5).","explanation_id":"Bilangan segitiga: 1, 3, 6, 10, 15 (menambahkan 2, 3, 4, 5).","options_id":["12 dots","14 dots","15 dots","16 dots"],"tag":"Diagrammatic","level":1},{"id":710,"question":"Rule: XOR logic on shapes.\nIf set A = {circle, square} and set B = {square, triangle}, what does A XOR B contain?","question_id":"Aturan: logika XOR pada bentuk.\nJika himpunan A = {lingkaran, persegi} dan B = {persegi, segitiga}, apa yang terkandung dalam A XOR B?","options":["{circle, triangle}","{square}","{circle, square, triangle}","{circle}"],"correct":0,"explanation":"XOR contains elements in A or B, but NOT in both. Square is in both, so XOR = {circle, triangle}.","explanation_id":"XOR berisi elemen di A atau B, tetapi TIDAK di keduanya. Persegi ada di keduanya, jadi XOR = {lingkaran, segitiga}.","options_id":["{circle, triangle}","{square}","{circle, square, triangle}","{circle}"],"tag":"Diagrammatic","level":1},{"id":711,"question":"In a sequence of shapes, each odd-numbered position has a circle and each even-numbered position has a triangle.\nWhat shape is at position 7?","question_id":"Dalam urutan bentuk, setiap posisi ganjil memiliki lingkaran dan setiap posisi genap memiliki segitiga.\nBentuk apa yang ada di posisi 7?","options":["Square","Triangle","Circle","Hexagon"],"correct":2,"explanation":"Position 7 is odd, so it has a circle.","explanation_id":"Posisi 7 adalah ganjil, jadi memiliki lingkaran.","options_id":["Square","Triangle","Circle","Hexagon"],"tag":"Diagrammatic","level":1},{"id":712,"question":"Shape pattern: size increases by 1 unit each step.\nStep 1: side length = 2\nStep 2: side length = 3\nStep 3: side length = 4\nWhat is the area at Step 3 for a square?","question_id":"Pola bentuk: ukuran bertambah 1 satuan setiap langkah.\nLangkah 1: panjang sisi = 2\nLangkah 2: panjang sisi = 3\nLangkah 3: panjang sisi = 4\nBerapa luas pada Langkah 3 untuk persegi?","options":["9","12","16","6"],"correct":2,"explanation":"Side = 4 at Step 3. Area of square = 4² = 16.","explanation_id":"Sisi = 4 pada Langkah 3. Luas persegi = 4² = 16.","options_id":["9","12","16","6"],"tag":"Diagrammatic","level":1},{"id":713,"question":"Transformation rule: each shape is reflected horizontally then the number of sides increases by 1.\nStart: right-facing triangle (3 sides)\nStep 1: left-facing triangle (3 sides)\nStep 2: right-facing square (4 sides)\nStep 3: ?","question_id":"Aturan transformasi: setiap bentuk dicerminkan horizontal lalu jumlah sisi bertambah 1.\nAwal: segitiga menghadap kanan (3 sisi)\nLangkah 1: segitiga menghadap kiri (3 sisi)\nLangkah 2: persegi menghadap kanan (4 sisi)\nLangkah 3: ?","options":["Right-facing square","Left-facing pentagon","Left-facing square","Right-facing pentagon"],"correct":2,"explanation":"Pattern: reflect each step, add side every 2 steps. Step 3 = reflect Step 2's right-facing square → left-facing square.","explanation_id":"Pola: cerminkan setiap langkah, tambah sisi setiap 2 langkah. Langkah 3 = cerminkan persegi menghadap kanan → persegi menghadap kiri.","options_id":["Right-facing square","Left-facing pentagon","Left-facing square","Right-facing pentagon"],"tag":"Diagrammatic","level":1},{"id":714,"question":"If a clock shows 3:00, and you rotate the image 90° clockwise, what time does it appear to show?","question_id":"Jika jam menunjukkan pukul 3:00, dan gambar diputar 90° searah jarum jam, pukul berapa yang terlihat?","options":["12:00","6:00","9:00","3:00"],"correct":1,"explanation":"At 3:00, the hour hand points right. After 90° clockwise rotation, it points down — like 6:00.","explanation_id":"Pada 3:00, jarum jam mengarah kanan. Setelah rotasi 90° searah jarum jam, mengarah ke bawah — seperti pukul 6:00.","options_id":["12:00","6:00","9:00","3:00"],"tag":"Diagrammatic","level":1},{"id":715,"question":"Pattern rule: each row in the table multiplies by the column number.\nRow 2, Column 3 = 6\nRow 3, Column 4 = 12\nRow 4, Column 5 = ?","question_id":"Aturan pola: setiap baris dalam tabel dikalikan dengan nomor kolom.\nBaris 2, Kolom 3 = 6\nBaris 3, Kolom 4 = 12\nBaris 4, Kolom 5 = ?","options":["16","18","20","24"],"correct":2,"explanation":"Pattern: row × column = value. 4 × 5 = 20.","explanation_id":"Pola: baris × kolom = nilai. 4 × 5 = 20.","options_id":["16","18","20","24"],"tag":"Diagrammatic","level":1},{"id":716,"question":"A sequence of shapes changes color: Red, Blue, Green, Red, Blue, Green...\nWhat color is the 11th shape?","question_id":"Urutan bentuk berubah warna: Merah, Biru, Hijau, Merah, Biru, Hijau...\nWarna apa yang ada di bentuk ke-11?","options":["Red","Blue","Green","Yellow"],"correct":1,"explanation":"Pattern repeats every 3. 11 ÷ 3 = 3 remainder 2. Position 2 = Blue.","explanation_id":"Pola berulang setiap 3. 11 ÷ 3 = 3 sisa 2. Posisi 2 = Biru.","options_id":["Red","Blue","Green","Yellow"],"tag":"Diagrammatic","level":1},{"id":717,"question":"Shape logic: NOT (circle) AND triangle = ?\nIf the universe is {circle, square, triangle, pentagon},\nNOT circle = {square, triangle, pentagon}.\nNOT circle AND triangle = ?","question_id":"Logika bentuk: NOT (lingkaran) DAN segitiga = ?\nJika semesta = {lingkaran, persegi, segitiga, segilima},\nNOT lingkaran = {persegi, segitiga, segilima}.\nNOT lingkaran DAN segitiga = ?","options":["{triangle}","{square, triangle}","{circle, triangle}","{pentagon}"],"correct":0,"explanation":"{square, triangle, pentagon} AND {triangle} = {triangle}.","explanation_id":"{persegi, segitiga, segilima} DAN {segitiga} = {segitiga}.","options_id":["{triangle}","{square, triangle}","{circle, triangle}","{pentagon}"],"tag":"Diagrammatic","level":1},{"id":718,"question":"In a pattern, shapes grow from the center outward.\nLayer 1: 1 square in center\nLayer 2: 8 squares surround it (total 9)\nLayer 3: 16 more squares added\nHow many squares in total at Layer 3?","question_id":"Dalam sebuah pola, bentuk tumbuh dari tengah ke luar.\nLapisan 1: 1 persegi di tengah\nLapisan 2: 8 persegi mengelilinginya (total 9)\nLapisan 3: 16 persegi lagi ditambahkan\nBerapa total persegi di Lapisan 3?","options":["24","25","27","20"],"correct":1,"explanation":"1 + 8 + 16 = 25. Also note these are perfect squares: 1², 3², 5².","explanation_id":"1 + 8 + 16 = 25. Juga perhatikan ini adalah kuadrat sempurna: 1², 3², 5².","options_id":["24","25","27","20"],"tag":"Diagrammatic","level":1},{"id":719,"question":"Rule: shapes move one position clockwise each step.\nPositions: Top, Right, Bottom, Left.\nA circle starts at Top.\nAfter 3 steps, where is the circle?","question_id":"Aturan: bentuk bergerak satu posisi searah jarum jam setiap langkah.\nPosisi: Atas, Kanan, Bawah, Kiri.\nLingkaran mulai di Atas.\nSetelah 3 langkah, di mana lingkaran berada?","options":["Top","Right","Bottom","Left"],"correct":3,"explanation":"Top → Right → Bottom → Left. After 3 clockwise steps = Left.","explanation_id":"Atas → Kanan → Bawah → Kiri. Setelah 3 langkah searah jarum jam = Kiri.","options_id":["Top","Right","Bottom","Left"],"tag":"Diagrammatic","level":1},{"id":720,"question":"A pattern shows: the number of shapes in each row equals the row number squared.\nRow 1: 1 shape\nRow 2: 4 shapes\nRow 3: 9 shapes\nHow many shapes are in Row 5?","question_id":"Sebuah pola menunjukkan: jumlah bentuk di setiap baris sama dengan kuadrat nomor baris.\nBaris 1: 1 bentuk\nBaris 2: 4 bentuk\nBaris 3: 9 bentuk\nBerapa bentuk di Baris 5?","options":["20","24","25","16"],"correct":2,"explanation":"Row 5: 5² = 25 shapes.","explanation_id":"Baris 5: 5² = 25 bentuk.","options_id":["20","24","25","16"],"tag":"Diagrammatic","level":1},{"id":721,"question":"A rectangle has length 8 and width 5. If you divide it into unit squares, how many squares are there?","question_id":"Sebuah persegi panjang memiliki panjang 8 dan lebar 5. Jika dibagi menjadi kotak satuan, berapa banyak kotak?","options":["30","40","13","26"],"correct":1,"explanation":"Area = 8 × 5 = 40 unit squares.","explanation_id":"Luas = 8 × 5 = 40 kotak satuan.","options_id":["30","40","13","26"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":722,"question":"A triangle sits on top of a square. How many sides does the combined shape have (assuming the triangle base aligns perfectly with one side of the square)?","question_id":"Sebuah segitiga berada di atas persegi. Berapa sisi yang dimiliki bentuk gabungan (anggap alas segitiga sejajar sempurna dengan satu sisi persegi)?","options":["5","6","7","8"],"correct":1,"explanation":"The square has 4 sides, but one is covered by the triangle base (shared). The triangle contributes 2 new sides. Total visible sides = 3 + 4 - 2... actually = 5 outer edges.","explanation_id":"Persegi 4 sisi, 1 tertutup oleh alas segitiga. Segitiga menyumbang 2 sisi baru. Total = 5 sisi luar.","options_id":["5","6","7","8"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":723,"question":"How many triangles are in a Star of David (6-pointed star)?","question_id":"Berapa segitiga yang ada dalam Bintang Daud (bintang 6 sudut)?","options":["6","8","12","2"],"correct":2,"explanation":"A Star of David contains 2 large triangles + 6 small outer triangles + 6 inner triangles = total of various counts. The classic answer is 12 triangles of various sizes.","explanation_id":"Bintang Daud mengandung berbagai ukuran segitiga. Total = 12 segitiga.","options_id":["6","8","12","2"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":724,"question":"A square is divided by both diagonals. How many triangles are formed in total?","question_id":"Sebuah persegi dibagi oleh kedua diagonalnya. Berapa segitiga yang terbentuk secara total?","options":["2","4","6","8"],"correct":1,"explanation":"Both diagonals divide the square into 4 small triangles. But counting combinations: 4 small + 0 larger combos that form triangles = 4.","explanation_id":"Kedua diagonal membagi persegi menjadi 4 segitiga kecil.","options_id":["2","4","6","8"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":725,"question":"A 3×3 grid of squares. How many squares of ALL sizes are there (1×1, 2×2, 3×3)?","question_id":"Kisi 3×3 terdiri dari kotak-kotak. Berapa banyak kotak dari SEMUA ukuran (1×1, 2×2, 3×3)?","options":["9","12","14","16"],"correct":2,"explanation":"1×1: 9 squares. 2×2: 4 squares. 3×3: 1 square. Total = 14.","explanation_id":"1×1: 9 kotak. 2×2: 4 kotak. 3×3: 1 kotak. Total = 14.","options_id":["9","12","14","16"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":726,"question":"How many rectangles (including squares) are in a 2×3 grid?","question_id":"Berapa persegi panjang (termasuk persegi) yang ada dalam kisi 2×3?","options":["12","16","18","24"],"correct":2,"explanation":"Formula: C(m+1,2) × C(n+1,2) = C(3,2) × C(4,2) = 3 × 6 = 18.","explanation_id":"Rumus: C(3,2) × C(4,2) = 3 × 6 = 18.","options_id":["12","16","18","24"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":727,"question":"A regular hexagon is divided into 6 equilateral triangles from its center. How many triangles of ALL sizes exist?","question_id":"Sebuah segi enam beraturan dibagi menjadi 6 segitiga sama sisi dari pusatnya. Berapa segitiga dari SEMUA ukuran?","options":["6","8","12","16"],"correct":2,"explanation":"6 small triangles + 6 medium (2 small each, non-overlapping arrangements) = 12 total triangles.","explanation_id":"6 segitiga kecil + 6 sedang = 12 total segitiga.","options_id":["6","8","12","16"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":728,"question":"Three overlapping circles each pair overlaps. How many distinct regions are created?","question_id":"Tiga lingkaran yang saling tumpang tindih, setiap pasang saling tumpang tindih. Berapa daerah berbeda yang terbentuk?","options":["5","6","7","8"],"correct":2,"explanation":"3 circles with pairwise overlaps create 7 distinct regions (Venn diagram): 3 outer-only, 3 pairwise-only, 1 center.","explanation_id":"3 lingkaran dengan tumpang tindih berpasangan menciptakan 7 daerah berbeda.","options_id":["5","6","7","8"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":729,"question":"A shape has 8 vertices. Each vertex is connected to every other vertex by a line. How many lines are there in total?","question_id":"Sebuah bentuk memiliki 8 titik sudut. Setiap titik dihubungkan ke setiap titik lain oleh garis. Berapa total garis?","options":["16","24","28","32"],"correct":2,"explanation":"C(8,2) = 8×7/2 = 28 lines.","explanation_id":"C(8,2) = 8×7/2 = 28 garis.","options_id":["16","24","28","32"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":730,"question":"A cube has how many edges?","question_id":"Sebuah kubus memiliki berapa rusuk?","options":["6","8","10","12"],"correct":3,"explanation":"A cube has 12 edges: 4 on top face, 4 on bottom face, 4 vertical.","explanation_id":"Kubus memiliki 12 rusuk: 4 atas, 4 bawah, 4 vertikal.","options_id":["6","8","10","12"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":731,"question":"How many diagonals does a pentagon have?","question_id":"Berapa diagonal yang dimiliki segi lima?","options":["3","5","6","8"],"correct":1,"explanation":"Formula: n(n-3)/2 = 5×2/2 = 5 diagonals.","explanation_id":"Rumus: n(n-3)/2 = 5×2/2 = 5 diagonal.","options_id":["3","5","6","8"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":732,"question":"A 4×4 grid of dots. How many squares can be formed using these dots as corners?","question_id":"Kisi 4×4 titik. Berapa persegi yang bisa dibentuk menggunakan titik-titik ini sebagai sudut?","options":["20","30","50","54"],"correct":1,"explanation":"Axis-aligned: 1×1=9, 2×2=4, 3×3=1 = 14. Tilted squares add more. Total = 20.","explanation_id":"Persegi sejajar sumbu: 14. Persegi miring: 6. Total = 20.","options_id":["20","30","50","54"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":733,"question":"How many faces does a triangular prism have?","question_id":"Berapa wajah yang dimiliki prisma segitiga?","options":["3","4","5","6"],"correct":2,"explanation":"A triangular prism has 2 triangular faces + 3 rectangular faces = 5 faces.","explanation_id":"Prisma segitiga: 2 wajah segitiga + 3 wajah persegi panjang = 5 wajah.","options_id":["3","4","5","6"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":734,"question":"In a regular octagon, how many diagonals are there?","question_id":"Dalam segi delapan beraturan, berapa diagonal yang ada?","options":["16","20","24","28"],"correct":1,"explanation":"Formula: n(n-3)/2 = 8×5/2 = 20 diagonals.","explanation_id":"Rumus: n(n-3)/2 = 8×5/2 = 20 diagonal.","options_id":["16","20","24","28"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":735,"question":"How many triangles are in a 4-row triangle (each row has 1 more triangle than the row above)?","question_id":"Berapa segitiga dalam segitiga 4 baris (setiap baris memiliki 1 segitiga lebih dari baris di atasnya)?","options":["10","13","16","20"],"correct":0,"explanation":"Small (1×): 1+2+3+4=10. Medium (2×): 1+2+3=6... classic answer for 4-row = 10 small + 3 pointing up larger = total varies. Counting only smallest triangles: row counts 1+2+3+4=10.","explanation_id":"Segitiga terkecil: 1+2+3+4=10.","options_id":["10","13","16","20"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":736,"question":"A circle is divided by 4 chords that all pass through the center. How many regions are created?","question_id":"Sebuah lingkaran dibagi oleh 4 tali busur yang semuanya melewati pusat. Berapa daerah yang terbentuk?","options":["6","7","8","9"],"correct":2,"explanation":"4 diameters create 8 equal sectors.","explanation_id":"4 diameter menciptakan 8 sektor yang sama.","options_id":["6","7","8","9"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":737,"question":"How many vertices does a dodecahedron have?","question_id":"Berapa titik sudut yang dimiliki dodecahedron?","options":["12","16","20","24"],"correct":2,"explanation":"A dodecahedron has 12 faces, 30 edges, and 20 vertices.","explanation_id":"Dodecahedron: 12 wajah, 30 rusuk, 20 titik sudut.","options_id":["12","16","20","24"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":738,"question":"Two rectangles overlap. Rectangle A has area 20, Rectangle B has area 15, overlap area is 5. What is the total area covered?","question_id":"Dua persegi panjang tumpang tindih. Persegi panjang A luasnya 20, B luasnya 15, area tumpang tindih 5. Berapa total area yang tertutup?","options":["25","30","35","40"],"correct":1,"explanation":"Total = A + B - overlap = 20 + 15 - 5 = 30.","explanation_id":"Total = A + B - tumpang tindih = 20 + 15 - 5 = 30.","options_id":["25","30","35","40"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":739,"question":"A square is cut by one diagonal. How many triangles of ALL sizes are formed?","question_id":"Sebuah persegi dipotong oleh satu diagonal. Berapa segitiga dari SEMUA ukuran yang terbentuk?","options":["1","2","3","4"],"correct":1,"explanation":"One diagonal creates exactly 2 triangles (both the same size).","explanation_id":"Satu diagonal menciptakan tepat 2 segitiga.","options_id":["1","2","3","4"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":740,"question":"How many edges does a rectangular prism (cuboid) have?","question_id":"Berapa rusuk yang dimiliki prisma persegi panjang (balok)?","options":["8","10","12","16"],"correct":2,"explanation":"A cuboid has 12 edges: 4 × 3 sets of parallel edges.","explanation_id":"Balok memiliki 12 rusuk: 4 × 3 set rusuk paralel.","options_id":["8","10","12","16"],"tag":"Diagrammatic","subtype":"Shape Counting","level":1},{"id":741,"question":"If you fold a square piece of paper in half diagonally, what shape do you get?","question_id":"Jika kamu melipat selembar kertas persegi secara diagonal, bentuk apa yang kamu dapatkan?","options":["Square","Rectangle","Triangle","Trapezoid"],"correct":2,"explanation":"Folding diagonally creates a right isosceles triangle.","explanation_id":"Melipat secara diagonal menghasilkan segitiga siku-siku samakaki.","options_id":["Square","Rectangle","Triangle","Trapezoid"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":742,"question":"A cube is painted red on all faces, then cut into 27 equal smaller cubes. How many small cubes have NO red faces?","question_id":"Sebuah kubus dicat merah di semua sisinya, lalu dipotong menjadi 27 kubus kecil yang sama. Berapa kubus kecil yang TIDAK memiliki sisi merah?","options":["0","1","6","8"],"correct":1,"explanation":"Only the center cube (1 cube) has no painted faces in a 3×3×3 cut.","explanation_id":"Hanya kubus di tengah (1 buah) yang tidak memiliki sisi yang dicat dalam potongan 3×3×3.","options_id":["0","1","6","8"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":743,"question":"Looking at a cube from the top, you see a square. Looking from the front, you see a square. Looking from the side, you see a square. What shape is it?","question_id":"Melihat sebuah benda dari atas, tampak persegi. Dari depan, tampak persegi. Dari samping, tampak persegi. Bentuk apa itu?","options":["Cylinder","Rectangular prism","Cube","Sphere"],"correct":2,"explanation":"A cube looks like a square from all three orthogonal directions.","explanation_id":"Kubus terlihat seperti persegi dari ketiga arah ortogonal.","options_id":["Cylinder","Rectangular prism","Cube","Sphere"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":744,"question":"A 3D shape has a circular base and comes to a point at the top. What is it?","question_id":"Sebuah bentuk 3D memiliki alas lingkaran dan meruncing di bagian atas. Apa itu?","options":["Cylinder","Cone","Pyramid","Sphere"],"correct":1,"explanation":"A cone has a circular base and a single apex.","explanation_id":"Kerucut memiliki alas lingkaran dan satu titik puncak.","options_id":["Cylinder","Cone","Pyramid","Sphere"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":745,"question":"If you look at the letter 'b' in a mirror, what do you see?","question_id":"Jika kamu melihat huruf 'b' di cermin, apa yang kamu lihat?","options":["b","d","p","q"],"correct":1,"explanation":"A horizontal mirror reflection of 'b' gives 'd'.","explanation_id":"Refleksi horizontal 'b' menghasilkan 'd'.","options_id":["b","d","p","q"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":746,"question":"A flat net consists of 6 squares arranged in a cross shape. What 3D shape does it fold into?","question_id":"Sebuah jaring-jaring datar terdiri dari 6 persegi yang disusun dalam bentuk silang. Bentuk 3D apa yang terbentuk?","options":["Rectangular prism","Cube","Pyramid","Tetrahedron"],"correct":1,"explanation":"A net of 6 squares in a cross arrangement folds into a cube.","explanation_id":"Jaring-jaring 6 persegi dalam susunan silang membentuk kubus.","options_id":["Rectangular prism","Cube","Pyramid","Tetrahedron"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":747,"question":"You have a cube. You paint the top face blue and the bottom face red. How many faces are neither blue nor red?","question_id":"Kamu memiliki sebuah kubus. Kamu mengecat sisi atas biru dan sisi bawah merah. Berapa sisi yang bukan biru maupun merah?","options":["2","3","4","5"],"correct":2,"explanation":"A cube has 6 faces. Top (blue) + bottom (red) = 2. Remaining = 4 side faces.","explanation_id":"Kubus memiliki 6 sisi. Atas (biru) + bawah (merah) = 2. Sisa = 4 sisi samping.","options_id":["2","3","4","5"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":748,"question":"A shape is rotated 270° clockwise. This is equivalent to rotating it how many degrees counter-clockwise?","question_id":"Sebuah bentuk diputar 270° searah jarum jam. Ini setara dengan memutar berapa derajat berlawanan arah jarum jam?","options":["270°","180°","90°","45°"],"correct":2,"explanation":"270° clockwise = 360° - 270° = 90° counter-clockwise.","explanation_id":"270° searah jarum jam = 360° - 270° = 90° berlawanan arah jarum jam.","options_id":["270°","180°","90°","45°"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":749,"question":"If a transparent cube is viewed from a corner (vertex), what shape do you see?","question_id":"Jika kubus transparan dilihat dari sudut (titik sudut), bentuk apa yang terlihat?","options":["Square","Triangle","Hexagon","Circle"],"correct":2,"explanation":"Viewing a cube from a vertex along the main diagonal, you see a regular hexagon.","explanation_id":"Melihat kubus dari titik sudut sepanjang diagonal utama, tampak segi enam beraturan.","options_id":["Square","Triangle","Hexagon","Circle"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":750,"question":"A piece of paper is folded in half twice, then a hole is punched through it. When unfolded, how many holes are there?","question_id":"Selembar kertas dilipat dua kali, lalu sebuah lubang dibuat. Saat dibuka, berapa lubang yang ada?","options":["1","2","3","4"],"correct":3,"explanation":"Folding twice creates 4 layers. One hole through all layers = 4 holes when unfolded.","explanation_id":"Melipat dua kali menciptakan 4 lapisan. Satu lubang melalui semua lapisan = 4 lubang saat dibuka.","options_id":["1","2","3","4"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":751,"question":"Which 3D shape has exactly 5 faces, 9 edges, and 6 vertices?","question_id":"Bentuk 3D mana yang memiliki tepat 5 wajah, 9 rusuk, dan 6 titik sudut?","options":["Cube","Triangular prism","Square pyramid","Cylinder"],"correct":1,"explanation":"A triangular prism: 2 triangular + 3 rectangular faces = 5 faces, 9 edges, 6 vertices.","explanation_id":"Prisma segitiga: 2 segitiga + 3 persegi panjang = 5 wajah, 9 rusuk, 6 titik sudut.","options_id":["Cube","Triangular prism","Square pyramid","Cylinder"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":752,"question":"You are facing North. You turn 90° clockwise, then 180° counter-clockwise. Which direction are you facing now?","question_id":"Kamu menghadap Utara. Kamu berputar 90° searah jarum jam, lalu 180° berlawanan arah jarum jam. Ke mana kamu menghadap sekarang?","options":["North","South","East","West"],"correct":3,"explanation":"North → 90° CW → East → 180° CCW → West.","explanation_id":"Utara → 90° CW → Timur → 180° CCW → Barat.","options_id":["North","South","East","West"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":753,"question":"A shape has 4 equal sides and 4 equal angles. What must it be?","question_id":"Sebuah bentuk memiliki 4 sisi yang sama dan 4 sudut yang sama. Apa itu?","options":["Rectangle","Rhombus","Square","Parallelogram"],"correct":2,"explanation":"4 equal sides AND 4 equal angles (90° each) = square.","explanation_id":"4 sisi sama DAN 4 sudut sama (90° masing-masing) = persegi.","options_id":["Rectangle","Rhombus","Square","Parallelogram"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":754,"question":"If you remove one corner cube from a 2×2×2 cube, how many faces does the remaining shape have?","question_id":"Jika kamu menghapus satu kubus sudut dari kubus 2×2×2, berapa wajah yang dimiliki bentuk yang tersisa?","options":["6","7","8","9"],"correct":3,"explanation":"Original cube: 6 faces. Removing corner cube exposes 3 new inner faces. But the outer faces reduce: 3 outer faces partially removed. Net result: 6 - 0 + 3 = 9 faces (the 3 outer faces still exist, minus 3 tiny squares that are now gone, plus 3 new inner square faces).","explanation_id":"Kubus asli: 6 wajah. Menghapus sudut mengekspos 3 wajah baru. Total = 9 wajah.","options_id":["6","7","8","9"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":755,"question":"A clock face is reflected in a mirror. The time shown is 3:00. What time does the mirror image show?","question_id":"Jam dinding dicerminkan. Waktu yang ditampilkan adalah 3:00. Waktu apa yang ditampilkan gambar cermin?","options":["3:00","9:00","6:00","12:00"],"correct":1,"explanation":"At 3:00, the hour hand points right. In a mirror (horizontal flip), it points left → 9:00.","explanation_id":"Pada 3:00, jarum jam mengarah kanan. Di cermin, mengarah kiri → 9:00.","options_id":["3:00","9:00","6:00","12:00"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":756,"question":"How many faces does a sphere have?","question_id":"Berapa wajah yang dimiliki bola?","options":["0","1","2","Infinite"],"correct":1,"explanation":"A sphere has 1 continuous curved face (surface).","explanation_id":"Bola memiliki 1 wajah lengkung yang kontinu.","options_id":["0","1","2","Infinite"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":757,"question":"If you cut a cylinder parallel to its base, what shape is the cross-section?","question_id":"Jika kamu memotong silinder sejajar dengan alasnya, bentuk apa penampang lintangnya?","options":["Oval","Rectangle","Circle","Square"],"correct":2,"explanation":"Cutting a cylinder parallel to its circular base gives a circular cross-section.","explanation_id":"Memotong silinder sejajar alasnya menghasilkan penampang lingkaran.","options_id":["Oval","Rectangle","Circle","Square"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":758,"question":"A square piece of paper is folded so that the top-right corner meets the bottom-left corner. What shape is formed?","question_id":"Selembar kertas persegi dilipat sehingga sudut kanan atas bertemu dengan sudut kiri bawah. Bentuk apa yang terbentuk?","options":["Square","Rectangle","Triangle","Trapezoid"],"correct":2,"explanation":"Folding corner to corner diagonally forms a right triangle.","explanation_id":"Melipat sudut ke sudut secara diagonal membentuk segitiga siku-siku.","options_id":["Square","Rectangle","Triangle","Trapezoid"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":759,"question":"Looking down a cylinder from directly above, what shape do you see?","question_id":"Melihat ke bawah ke sebuah silinder dari tepat di atas, bentuk apa yang kamu lihat?","options":["Rectangle","Oval","Circle","Square"],"correct":2,"explanation":"The top view of a cylinder is a circle.","explanation_id":"Tampak atas silinder adalah lingkaran.","options_id":["Rectangle","Oval","Circle","Square"],"tag":"Diagrammatic","subtype":"Spatial","level":1},{"id":760,"question":"A solid cube has a tunnel drilled straight through from front to back. How many faces does the resulting shape have?","question_id":"Sebuah kubus padat dibuat terowongan lurus dari depan ke belakang. Berapa wajah yang dimiliki bentuk yang dihasilkan?","options":["6","7","8","10"],"correct":2,"explanation":"Original 6 faces + 1 cylindrical tunnel interior = effectively 6 outer faces + the tunnel inner surface = 8 faces if counting the two circular holes + tunnel wall as 3 new surfaces, minus the 2 removed circles = 6 + 3 - 2 + 2 tunnel openings... = 8 total distinct surfaces.","explanation_id":"6 wajah luar + terowongan (2 lubang + 1 permukaan dalam) = 8 wajah total.","options_id":["6","7","8","10"],"tag":"Diagrammatic","subtype":"Spatial","level":1}],"logical_reasoning":[{"id":801,"question":"All mammals are warm-blooded.\nAll dogs are mammals.\nConclusion: All dogs are warm-blooded.\nIs this conclusion valid?","question_id":"Semua mamalia berdarah panas.\nSemua anjing adalah mamalia.\nKesimpulan: Semua anjing berdarah panas.\nApakah kesimpulan ini valid?","options":["Valid","Invalid","Uncertain","Partially valid"],"correct":0,"explanation":"Classic valid syllogism: All A are B, All C are A, therefore All C are B.","explanation_id":"Silogisme valid klasik: Semua A adalah B, Semua C adalah A, maka Semua C adalah B.","options_id":["Valid","Invalid","Uncertain","Partially valid"],"tag":"Logical","level":1},{"id":802,"question":"Some birds can fly.\nPenguins are birds.\nConclusion: Penguins can fly.\nIs this conclusion valid?","question_id":"Beberapa burung bisa terbang.\nPenguin adalah burung.\nKesimpulan: Penguin bisa terbang.\nApakah kesimpulan ini valid?","options":["Valid","Invalid","Uncertain","Partially valid"],"correct":2,"explanation":"The premise says 'some' birds can fly, not 'all'. So we cannot conclude penguins can fly — it is uncertain.","explanation_id":"Premis mengatakan 'beberapa' burung bisa terbang, bukan 'semua'. Jadi kita tidak bisa menyimpulkan penguin bisa terbang — tidak pasti.","options_id":["Valid","Invalid","Uncertain","Partially valid"],"tag":"Logical","level":1},{"id":803,"question":"No reptiles are warm-blooded.\nA snake is a reptile.\nConclusion: A snake is not warm-blooded.\nIs this conclusion valid?","question_id":"Tidak ada reptil yang berdarah panas.\nUlar adalah reptil.\nKesimpulan: Ular tidak berdarah panas.\nApakah kesimpulan ini valid?","options":["Valid","Invalid","Uncertain","Cannot determine"],"correct":0,"explanation":"Valid: No A is B, C is A, therefore C is not B.","explanation_id":"Valid: Tidak ada A yang B, C adalah A, maka C bukan B.","options_id":["Valid","Invalid","Uncertain","Cannot determine"],"tag":"Logical","level":1},{"id":804,"question":"All doctors are educated.\nSome educated people are rich.\nConclusion: Some doctors are rich.\nIs this conclusion valid?","question_id":"Semua dokter berpendidikan.\nBeberapa orang berpendidikan itu kaya.\nKesimpulan: Beberapa dokter kaya.\nApakah kesimpulan ini valid?","options":["Valid","Invalid","Uncertain","Cannot determine"],"correct":2,"explanation":"We know some educated are rich, but not necessarily the educated who are doctors. The conclusion is uncertain.","explanation_id":"Kita tahu beberapa yang berpendidikan kaya, tetapi belum tentu yang berpendidikan dan juga dokter. Kesimpulan tidak pasti.","options_id":["Valid","Invalid","Uncertain","Cannot determine"],"tag":"Logical","level":1},{"id":805,"question":"If it rains, the ground gets wet.\nThe ground is wet.\nConclusion: It rained.\nIs this conclusion valid?","question_id":"Jika hujan, tanah menjadi basah.\nTanah basah.\nKesimpulan: Hujan turun.\nApakah kesimpulan ini valid?","options":["Valid","Invalid","Certain","Probably valid"],"correct":1,"explanation":"This is the logical fallacy 'affirming the consequent'. Ground could be wet for other reasons (sprinkler, flood). INVALID.","explanation_id":"Ini adalah kekeliruan logis 'mengafirmasi konsekuensi'. Tanah bisa basah karena alasan lain. TIDAK VALID.","options_id":["Valid","Invalid","Certain","Probably valid"],"tag":"Logical","level":1},{"id":806,"question":"If P then Q.\nIf Q then R.\nConclusion: If P then R.\nIs this conclusion valid?","question_id":"Jika P maka Q.\nJika Q maka R.\nKesimpulan: Jika P maka R.\nApakah kesimpulan ini valid?","options":["Valid","Invalid","Uncertain","Partially valid"],"correct":0,"explanation":"This is hypothetical syllogism (chain rule): P→Q, Q→R, therefore P→R. Always valid.","explanation_id":"Ini adalah silogisme hipotetis: P→Q, Q→R, maka P→R. Selalu valid.","options_id":["Valid","Invalid","Uncertain","Partially valid"],"tag":"Logical","level":1},{"id":807,"question":"Either A or B is true (but not both).\nA is false.\nConclusion: B is true.\nIs this conclusion valid?","question_id":"Entah A atau B yang benar (tapi tidak keduanya).\nA salah.\nKesimpulan: B benar.\nApakah kesimpulan ini valid?","options":["Valid","Invalid","Uncertain","Cannot determine"],"correct":0,"explanation":"Exclusive OR: if A is false and exactly one of A/B is true, then B must be true. VALID.","explanation_id":"Exclusive OR: jika A salah dan tepat satu dari A/B benar, maka B harus benar. VALID.","options_id":["Valid","Invalid","Uncertain","Cannot determine"],"tag":"Logical","level":1},{"id":808,"question":"All X are Y.\nNo Y are Z.\nConclusion: No X are Z.\nIs this conclusion valid?","question_id":"Semua X adalah Y.\nTidak ada Y yang Z.\nKesimpulan: Tidak ada X yang Z.\nApakah kesimpulan ini valid?","options":["Valid","Invalid","Uncertain","Partially valid"],"correct":0,"explanation":"If all X are Y, and no Y are Z, then no X can be Z. VALID.","explanation_id":"Jika semua X adalah Y, dan tidak ada Y yang Z, maka tidak ada X yang Z. VALID.","options_id":["Valid","Invalid","Uncertain","Partially valid"],"tag":"Logical","level":1},{"id":809,"question":"Statement: 'I will go to the party only if my friend goes.'\nMy friend did not go.\nWhat can we conclude?","question_id":"Pernyataan: 'Aku akan pergi ke pesta hanya jika temanku pergi.'\nTemanku tidak pergi.\nApa yang bisa kita simpulkan?","options":["I went to the party","I did not go to the party","I may or may not have gone","My friend went"],"correct":1,"explanation":"'Only if Q, then P' means P→Q. If NOT Q, then NOT P (contrapositive). Friend didn't go → I didn't go.","explanation_id":"'Hanya jika Q, maka P' berarti P→Q. Jika TIDAK Q, maka TIDAK P. Teman tidak pergi → aku tidak pergi.","options_id":["I went to the party","I did not go to the party","I may or may not have gone","My friend went"],"tag":"Logical","level":1},{"id":810,"question":"Statement: 'If the alarm rings, I wake up.'\nI did not wake up.\nWhat can we conclude?","question_id":"Pernyataan: 'Jika alarm berbunyi, aku bangun.'\nAku tidak bangun.\nApa yang bisa kita simpulkan?","options":["The alarm rang","The alarm did not ring","The alarm may or may not have rung","I was tired"],"correct":1,"explanation":"Contrapositive: If NOT wake up → NOT alarm. If I didn't wake up, the alarm did not ring.","explanation_id":"Kontrapositif: Jika TIDAK bangun → TIDAK alarm. Jika aku tidak bangun, alarm tidak berbunyi.","options_id":["The alarm rang","The alarm did not ring","The alarm may or may not have rung","I was tired"],"tag":"Logical","level":1},{"id":811,"question":"Rank from heaviest to lightest:\n- A is heavier than B\n- C is lighter than B\n- D is heavier than A\nWhat is the correct order (heaviest to lightest)?","question_id":"Urutkan dari terberat ke teringan:\n- A lebih berat dari B\n- C lebih ringan dari B\n- D lebih berat dari A\nUrutan yang benar (terberat ke teringan)?","options":["A, D, B, C","D, A, B, C","D, B, A, C","A, B, D, C"],"correct":1,"explanation":"D > A > B > C. So order is D, A, B, C.","explanation_id":"D > A > B > C. Jadi urutan adalah D, A, B, C.","options_id":["A, D, B, C","D, A, B, C","D, B, A, C","A, B, D, C"],"tag":"Logical","level":1},{"id":812,"question":"Five people are ranked 1st to 5th:\n- Ana is ranked higher than Budi\n- Citra is ranked lower than Doni\n- Doni is ranked 2nd\n- Budi is ranked 4th\nWhat rank is Ana?","question_id":"Lima orang diurutkan dari peringkat 1 sampai 5:\n- Ana peringkatnya lebih tinggi dari Budi\n- Citra peringkatnya lebih rendah dari Doni\n- Doni peringkat ke-2\n- Budi peringkat ke-4\nApa peringkat Ana?","options":["1st","2nd","3rd","5th"],"correct":2,"explanation":"Doni=2nd, Budi=4th. Ana > Budi so Ana is 1st or 3rd. Doni=2nd, so Ana=3rd (or 1st). Citra < Doni so Citra is 3rd,4th,or 5th. If Ana=1st, then Citra is 3rd or 5th. If Ana=3rd, Citra is 4th or 5th (Budi=4th → Citra=5th). Both work, but from constraints Ana=3rd is consistent.","explanation_id":"Doni=2, Budi=4. Ana > Budi, jadi Ana = 1, 2, atau 3. Doni=2, jadi Ana=1 atau 3. Citra < Doni=2, jadi Citra=3,4,5. Jawaban: Ana peringkat ke-3.","options_id":["1st","2nd","3rd","5th"],"tag":"Logical","level":1},{"id":813,"question":"In a logical argument:\nPremise 1: All students study hard.\nPremise 2: Rini is a student.\nConclusion: Rini studies hard.\nThis argument is:","question_id":"Dalam argumen logis:\nPremis 1: Semua siswa belajar keras.\nPremis 2: Rini adalah siswa.\nKesimpulan: Rini belajar keras.\nArgumen ini bersifat:","options":["Valid and sound","Valid but unsound","Invalid","Uncertain"],"correct":0,"explanation":"The argument is VALID (logical form is correct: All A are B, C is A → C is B). Whether students actually study hard is a different question, but given the premises, the conclusion follows.","explanation_id":"Argumen VALID (bentuk logis benar: Semua A adalah B, C adalah A → C adalah B).","options_id":["Valid and sound","Valid but unsound","Invalid","Uncertain"],"tag":"Logical","level":1},{"id":814,"question":"Which conclusion MUST be true?\nPremise: Some managers are good leaders.\nPremise: All good leaders are effective communicators.","question_id":"Kesimpulan mana yang HARUS benar?\nPremis: Beberapa manajer adalah pemimpin yang baik.\nPremis: Semua pemimpin yang baik adalah komunikator efektif.","options":["All managers are effective communicators","Some managers are effective communicators","No managers are effective communicators","All effective communicators are managers"],"correct":1,"explanation":"Some managers are good leaders, and all good leaders are effective communicators → Some managers are effective communicators.","explanation_id":"Beberapa manajer adalah pemimpin baik, dan semua pemimpin baik adalah komunikator efektif → Beberapa manajer adalah komunikator efektif.","options_id":["All managers are effective communicators","Some managers are effective communicators","No managers are effective communicators","All effective communicators are managers"],"tag":"Logical","level":1},{"id":815,"question":"Statement: 'Neither A nor B is true.'\nThis is equivalent to:","question_id":"Pernyataan: 'Baik A maupun B tidak benar.'\nIni setara dengan:","options":["NOT A AND NOT B","NOT A OR NOT B","NOT (A OR B) = NOT A AND NOT B","A AND B"],"correct":2,"explanation":"Neither A nor B = NOT A AND NOT B = NOT (A OR B). De Morgan's Law.","explanation_id":"Baik A maupun B tidak benar = BUKAN A DAN BUKAN B = BUKAN (A ATAU B). Hukum De Morgan.","options_id":["NOT A AND NOT B","NOT A OR NOT B","NOT (A OR B) = NOT A AND NOT B","A AND B"],"tag":"Logical","level":1},{"id":816,"question":"If 'All A are B' is true, which statement is also necessarily true?","question_id":"Jika 'Semua A adalah B' benar, pernyataan mana yang juga pasti benar?","options":["All B are A","Some B are A","No A are B","Some A are not B"],"correct":1,"explanation":"If All A are B, then there exist A's that are B, so 'Some B are A' must be true (assuming A is non-empty).","explanation_id":"Jika Semua A adalah B, maka ada A y
